          ${p ? raw(`<a class="rtm-lesson-open" href="#/live/${escape(l.project_id)}">→ เปิด project</a>`) : ""}
        </div>
      `;
    };

    // ===== DERIVED · scoreboard (Step 9 · North Star reward loop) =====
    const monthBounds = (ref = new Date()) => ({
      start: new Date(ref.getFullYear(), ref.getMonth(), 1, 0, 0, 0, 0),
      end:   new Date(ref.getFullYear(), ref.getMonth() + 1, 0, 23, 59, 59, 999),
    });
    const periodBounds = (period) => {
      if (period === "month") return monthBounds();
      const { mon, sun } = weekBounds();
      return { start: mon, end: sun };
    };
    const inPeriod = (ts, period) => {
      const d = toDate(ts); if (!d) return false;
      const { start, end } = periodBounds(period);
      return d >= start && d <= end;
    };
    const periodLabel = (period) => {
      if (period === "month") return `${TH_MONTHS[new Date().getMonth()]} ${new Date().getFullYear() + 543}`;
      return weekLabel();
    };

    const scoreboardStats = (period = "week") => {
      const projects = store.get("projects") || [];
      const closed = projects
        .filter(p => (p.status === "closed" || p.status === "killed") && inPeriod(p.closed_at, period))
        .sort((a, b) => (toDate(b.closed_at)?.getTime() ?? 0) - (toDate(a.closed_at)?.getTime() ?? 0));
      const tally = { win: 0, partial: 0, miss: 0 };
      const impactByUnit = {}; // unit -> { total, verified, count } · แยกหน่วย (ห้ามบวกรวมข้ามหน่วย)
      closed.forEach(p => {
        const v = computeVerdict(p).code; if (tally[v] != null) tally[v]++;
        if (p.impact_actual_value != null && p.impact_actual_value > 0) {
          const unit = (p.impact_actual_unit || "—").trim() || "—";
          const bucket = impactByUnit[unit] || (impactByUnit[unit] = { total: 0, verified: 0, count: 0 });
          bucket.total += p.impact_actual_value;
          bucket.count += 1;
          if (p.impact_verified_by_uid) bucket.verified += p.impact_actual_value;
        }
      });
      return { period, closed, tally, impactByUnit };
    };

    // idea funnel — รับ → do_now → promote / park / kill (created ในช่วง)
    const ideaFunnel = (period = "week") => {
      const inP = (store.get("ideas") || []).filter(i => inPeriod(i.created_at, period));
      const count = st => inP.filter(i => i.status === st).length;
      return {
        received: inP.length,
        newCount: count("new"),
        do_now:   count("do_now"),
        promoted: count("promoted"),
        park:     count("park"),
        kill:     count("kill"),
      };
    };

    // ===== VIEW · scoreboard =====
    const viewScoreboard = () => {
      const outlet = document.querySelector("#route-outlet");
      if (!store.get("scorePeriod")) store.set("scorePeriod", "week");
      outlet.innerHTML = html`<div id="score-root"></div>`;
      const renderAll = () => renderScoreboard();
      renderAll();
      const unsubs = [
        store.subscribe("projects", renderAll),
        store.subscribe("ideas", renderAll),
        store.subscribe("users", renderAll),
        store.subscribe("scorePeriod", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const nf = (n) => (Math.round(n * 100) / 100).toLocaleString("en-US");

    const renderScoreboard = () => {
      const root = document.querySelector("#score-root");
      if (!root) return;
      const period = store.get("scorePeriod") || "week";
      const st = scoreboardStats(period);
      const fn = ideaFunnel(period);
      const total = st.tally.win + st.tally.partial + st.tally.miss;

      const impactRows = Object.entries(st.impactByUnit)
        .sort((a, b) => b[1].count - a[1].count)
        .map(([unit, b]) => `
          <div class="rtm-sb-impact-row">
            <span class="rtm-sb-impact-val">${escape(nf(b.total))} <span class="rtm-sb-impact-unit">${escape(unit)}</span></span>
            <span class="rtm-sb-impact-meta">${b.count} project · verified ${escape(nf(b.verified))}</span>
          </div>`).join("");

      const closedList = st.closed.length
        ? st.closed.map(p => `
            <a class="rtm-sb-closed-row" href="#/live/${escape(p.id)}">
              ${verdictBadge(p, "sm")}
              <span class="rtm-sb-closed-title">${escape(p.title)}</span>
              <span class="rtm-sb-closed-impact">${p.impact_actual_value != null ? escape(nf(p.impact_actual_value)) + " " + escape(p.impact_actual_unit || "") : "—"}</span>
              <span class="rtm-sb-closed-date">${escape(fmtDate(p.closed_at))}</span>
            </a>`).join("")
        : `<div class="rtm-empty">ยังไม่มี project ปิดใน${period === "month" ? "เดือน" : "สัปดาห์"}นี้</div>`;

      root.innerHTML = html`${raw(`
        <div class="rtm-sb-head">
          <h1>📊 Scoreboard</h1>
          <div class="rtm-sb-controls no-print">
            <div class="rtm-filter-row" style="margin-bottom:0">
              <button class="rtm-pill ${period === 'week' ? 'active' : ''}" data-period="week">สัปดาห์นี้</button>
              <button class="rtm-pill ${period === 'month' ? 'active' : ''}" data-period="month">เดือนนี้</button>
            </div>
            <button class="btn-secondary" id="btn-print-sb" style="padding:8px 14px">🖨 Print / PDF</button>
          </div>
        </div>
        <p class="rtm-sb-period">${escape(periodLabel(period))}</p>

        <div class="rtm-sb-tally">
          <div class="rtm-sb-tile rtm-vd-win"><div class="rtm-sb-num">${st.tally.win}</div><div class="rtm-sb-lbl">🟢 Win</div></div>
          <div class="rtm-sb-tile rtm-vd-partial"><div class="rtm-sb-num">${st.tally.partial}</div><div class="rtm-sb-lbl">🟡 Partial</div></div>
          <div class="rtm-sb-tile rtm-vd-miss"><div class="rtm-sb-num">${st.tally.miss}</div><div class="rtm-sb-lbl">🔴 Miss</div></div>
          <div class="rtm-sb-tile rtm-sb-tile-total"><div class="rtm-sb-num">${total}</div><div class="rtm-sb-lbl">ปิดทั้งหมด</div></div>
        </div>

        <div class="rtm-sb-grid">
          <div class="rtm-sb-panel">
            <h3>💰 Impact verified (แยกหน่วย)</h3>
            ${impactRows || `<div class="rtm-empty" style="padding:16px">ยังไม่มี impact ที่วัดได้ในช่วงนี้</div>`}
            <div class="rtm-sb-note">* ไม่บวกรวมข้ามหน่วย — ฿ กับ % กับ ร้าน คนละเรื่อง</div>
          </div>
          <div class="rtm-sb-panel">
            <h3>🔀 Idea funnel</h3>
            <div class="rtm-sb-funnel">
              <div class="rtm-sb-fn-row"><span>💡 รับเข้า</span><b>${fn.received}</b></div>
              <div class="rtm-sb-fn-row"><span>🎯 Do Now</span><b>${fn.do_now}</b></div>
              <div class="rtm-sb-fn-row"><span>🚀 Promote</span><b>${fn.promoted}</b></div>
              <div class="rtm-sb-fn-row"><span>🅿️ Park</span><b>${fn.park}</b></div>
              <div class="rtm-sb-fn-row"><span>🗑 Kill</span><b>${fn.kill}</b></div>
            </div>
          </div>
        </div>

        <div class="rtm-sb-panel">
          <h3>🔒 Project ปิดในช่วงนี้ (${st.closed.length})</h3>
          <div class="rtm-sb-closed-list">${closedList}</div>
        </div>
      `)}`;

      root.querySelectorAll("[data-period]").forEach(b =>
        b.addEventListener("click", () => store.set("scorePeriod", b.dataset.period)));
      root.querySelector("#btn-print-sb")?.addEventListener("click", () => window.print());
      root.querySelectorAll(".rtm-sb-closed-row").forEach(a =>
        a.addEventListener("click", (e) => { e.preventDefault(); go("/live/" + a.getAttribute("href").split("/").pop()); }));
    };

    // ===== STUB VIEWS =====
    const stub = name => () => {
      const el = document.querySelector("#route-outlet");
      if (el) el.innerHTML = `<h1>${name}</h1><p style="color:var(--ink-tertiary);margin-top:16px">กำลังพัฒนา</p>`;
      return () => {};
    };

    route("/ideas",    viewIdeas);
    route("/decide",   viewDecide);
    route("/live",     viewLive);
    route("/live/:id", viewProject);
    route("/my",       viewMy);
    route("/team",     viewTeam);
    route("/scoreboard", viewScoreboard);
    route("/lessons",  viewLessons);

    // ===== MODAL · session-start =====
    const renderSessionStartModal = () => html`
      <div class="rtm-modal-backdrop" data-close-modal>
        <div class="rtm-modal">
          <h2>▶ เริ่ม Idea Session</h2>
          <p class="rtm-modal-hint">ตั้งชื่อประชุมนี้ · ไอเดียที่โยนช่วงนี้จะ tag ด้วยชื่อนี้อัตโนมัติ</p>
          <input id="modal-session-name" placeholder="RTM Kick-off ก.ค." autocomplete="off" maxlength="80" />
          <div class="rtm-modal-actions">
            <button class="btn-secondary" data-close-modal>ยกเลิก</button>
            <button class="btn-primary" id="btn-modal-start">▶ เริ่ม</button>
          </div>
        </div>
      </div>
    `;

    // ===== MODAL · session-end =====
    const renderSessionEndModal = () => {
      const active = store.get("activeSession");
      if (!active) return "";
      const all = store.get("ideas") || [];
      const inSession = all.filter(i => i.session_tag === active.name);
      const cnt = { new: 0, do_now: 0, park: 0, kill: 0, promoted: 0 };
      inSession.forEach(i => { cnt[i.status] = (cnt[i.status] || 0) + 1; });
      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal">
            <h2>🏁 End Session</h2>
            <p class="rtm-modal-hint">"${active.name}"</p>
            <div class="rtm-summary">
              <div>Ideas ในประชุม: <b>${inSession.length}</b></div>
              <div>· ยังไม่ triage: ${cnt.new}</div>
              <div>· Do Now: ${cnt.do_now}</div>
              <div>· Park: ${cnt.park}</div>
              <div>· Kill: ${cnt.kill}</div>
              ${cnt.promoted ? raw(`<div>· Promoted: ${cnt.promoted}</div>`) : ""}
            </div>
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>กลับ</button>
              <button class="btn-primary" id="btn-modal-end">🏁 จบ Session</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · session-picker =====
    const renderSessionPickerModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const sessions = store.get("sessions") || [];
      const current = idea.session_tag;
      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal">
            <h2>🏷 Assign Session</h2>
            <p class="rtm-modal-hint">"${idea.title}"</p>
            <div class="rtm-session-picker">
              <label class="rtm-session-option">
                <input type="radio" name="session-pick" value="" ${!current ? "checked" : ""} />
                <span style="color:var(--ink-tertiary)">— ไม่มี tag —</span>
              </label>
              ${sessions.length === 0
                ? raw(`<div style="padding:16px;text-align:center;color:var(--ink-tertiary);font-size:var(--text-sm)">ยังไม่มี session</div>`)
                : sessions.map(s => html`
                <label class="rtm-session-option">
                  <input type="radio" name="session-pick" value="${s.name}" ${current === s.name ? "checked" : ""} />
                  <span>${s.name}</span>
                  ${!s.ended_at ? raw('<span class="rtm-tag-active">🟢 active</span>') : ""}
                </label>
              `)}
            </div>
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
              <button class="btn-primary" id="btn-modal-savetag">บันทึก</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · triage =====
    const IMPACT_UNITS = ["฿/เดือน", "%", "ชั่วโมง/สัปดาห์", "ร้าน", "อื่นๆ"];

    const renderTriageModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const iv = idea.impact_value ?? "";
      const iu = idea.impact_unit ?? "฿/เดือน";
      const inote = idea.impact_note ?? "";
      const ef = idea.effort_person_weeks ?? "";

      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px" data-modal-inner>
            <h2>🎯 Triage</h2>
            <p class="rtm-modal-hint">"${idea.title}"</p>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Impact <span class="req">*</span></label>
              <div class="rtm-form-row-inline">
                <input type="number" id="tr-impact" placeholder="เช่น 500000" step="0.01" value="${iv}" />
                <select id="tr-unit">
                  ${IMPACT_UNITS.map(u => `<option value="${escape(u)}" ${u === iu ? "selected" : ""}>${escape(u)}</option>`)}
                </select>
              </div>
              <div class="rtm-form-hint">ตัวเลขเท่านั้น · ห้าม "สูง/กลาง/ต่ำ"</div>
              <div class="rtm-form-error" id="err-impact">กรอกตัวเลข impact</div>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Impact note (optional)</label>
              <input type="text" id="tr-note" placeholder="เช่น ลด stockout 30%" value="${escape(inote)}" />
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Effort · person-weeks <span class="req">*</span></label>
              <input type="number" id="tr-effort" placeholder="เช่น 2" step="0.5" min="0.5" value="${ef}" />
              <div class="rtm-form-error" id="err-effort">กรอกตัวเลข effort</div>
            </div>

            <div class="rtm-pareto-display">
              Pareto score: <b id="tr-pareto">—</b>
              <span style="font-size:var(--text-xs);color:var(--ink-tertiary);margin-left:8px">(impact / effort · สูง = คุ้ม)</span>
            </div>

            <div class="rtm-kill-reason" id="tr-kill-reason-wrap">
              <label class="rtm-form-label">เหตุผลที่ Kill <span class="req">*</span></label>
              <textarea id="tr-kill-reason" placeholder="ทำไมถึงตัดออก" rows="2"></textarea>
              <div class="rtm-form-error" id="err-kill">กรอกเหตุผล</div>
            </div>

            <div class="rtm-triage-actions">
              <button class="rtm-btn-donow" data-action="do_now">🚀 Do Now</button>
              <button class="rtm-btn-park" data-action="park">⏸ Park</button>
              <button class="rtm-btn-kill" data-action="kill">✕ Kill</button>
            </div>

            <div style="text-align:right;margin-top:16px">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · promote =====
    const DELIVERABLE_TYPES = [
      { v: "dashboard", label: "📊 Dashboard" },
      { v: "powerbi", label: "📊 Power BI" },
      { v: "sop", label: "📋 SOP" },
      { v: "excel", label: "📈 Excel" },
      { v: "report", label: "📄 Report" },
      { v: "training", label: "🎓 Training" },
    ];

    const renderPromoteModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const users = store.get("users") || [];

      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px">
            <h2>🚀 Promote to Project</h2>
            <p class="rtm-modal-hint">จาก idea: "${idea.title}"</p>

            <div class="rtm-form-row">
              <label class="rtm-form-label">ชื่อ Project <span class="req">*</span></label>
              <input type="text" id="pr-name" maxlength="120" value="${escape(idea.title)}" placeholder="ตั้งชื่อให้อ่านรู้เรื่อง" />
              <div class="rtm-form-hint">แก้ให้สื่อความ · idea ดิบมักตั้งชื่ออ่านยาก</div>
              <div class="rtm-form-error" id="err-name">ใส่ชื่อ project</div>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Why (recommended · ไม่บังคับ)</label>

    // ===== MODAL · close-project =====

    // ===== MODAL · edit-closed (แก้ close report เฉพาะจุด · ไม่เปิดใหม่) =====
    const renderEditClosedModal = () => {
      const m = store.get("modal");

      if (!p) return "";
      const users = store.get("users") || [];

      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px">
            <h2>✏️ แก้ Close Report</h2>
            <p class="rtm-modal-hint">"${p.title}" · ยังปิดอยู่ (ไม่เปิดใหม่) · verdict คำนวณใหม่ตาม impact</p>

            <div class="rtm-form-row">

              <select id="ec-verified">
                <option value="">— ไม่ระบุ —</option>
                ${users.map(u => `<option value="${escape(u.uid)}" ${u.uid === p.impact_verified_by_uid ? "selected" : ""}>${escape(u.display_name || u.email)} (${escape(u.short_code || "?")})</option>`)}

              <div class="rtm-form-hint">ลบข้อความให้ว่าง = เอา lesson ออกจาก Library</div>

            <div class="rtm-form-row">

    // ===== MODAL · edit-project =====
    const renderEditProjectModal = () => {
      const m = store.get("modal");
      const p = (store.get("projects") || []).find(x => x.id === m.projectId);
      if (!p) return "";
      const users = store.get("users") || [];
      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px">
            <h2>✏️ Edit Project</h2>
            <p class="rtm-modal-hint">"${p.title}"</p>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Why</label>
              <textarea id="ep-why" rows="2" placeholder="ทำเพราะอะไร">${escape(p.why || "")}</textarea>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Deliverable <span class="req">*</span></label>
              <select id="ep-deliverable">
                ${DELIVERABLE_TYPES.map(d => `<option value="${d.v}" ${d.v === p.deliverable_type ? "selected" : ""}>${d.label}</option>`)}
              </select>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">KPI <span class="req">*</span> · ต้องมีตัวเลข</label>
              <input type="text" id="ep-kpi" value="${escape(p.kpi_text || "")}" />
              <div class="rtm-form-error" id="err-ep-kpi">KPI ต้องมีตัวเลข</div>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Owner Lead <span class="req">*</span></label>
              <select id="ep-owner">
                ${users.map(u => `<option value="${escape(u.uid)}" ${u.uid === p.owner_lead_uid ? "selected" : ""}>${escape(u.display_name || u.email)} (${escape(u.short_code || "?")})</option>`)}
              </select>
            </div>

            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
              <button class="btn-primary" id="btn-modal-edit-project">บันทึก</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL RENDERER =====
    const closeModal = () => store.set("modal", null);

    const mountModal = () => {
      const root = document.querySelector("#modal-root");
      const m = store.get("modal");
      if (!m) { root.innerHTML = ""; return; }
      let content = "";
      if (m.name === "session-start") content = renderSessionStartModal();
      else if (m.name === "session-end") content = renderSessionEndModal();
      else if (m.name === "session-picker") content = renderSessionPickerModal();
      else if (m.name === "triage") content = renderTriageModal();
      else if (m.name === "promote") content = renderPromoteModal();
      else if (m.name === "close-project") content = renderCloseProjectModal();
      else if (m.name === "edit-closed") content = renderEditClosedModal();
      else if (m.name === "edit-project") content = renderEditProjectModal();
      root.innerHTML = content;
      wireModalEvents();
    };

    const wireModalEvents = () => {
      document.querySelectorAll("[data-close-modal]").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target === el || e.currentTarget === e.target) closeModal();
        });
      });

      const startInput = document.querySelector("#modal-session-name");
      if (startInput) {
        startInput.focus();
        startInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") document.querySelector("#btn-modal-start")?.click();
          if (e.key === "Escape") closeModal();
        });
      }

      document.querySelector("#btn-modal-start")?.addEventListener("click", async () => {
        const name = document.querySelector("#modal-session-name").value.trim();
        if (!name) { document.querySelector("#modal-session-name").focus(); return; }
        const btn = document.querySelector("#btn-modal-start");
        btn.disabled = true;
        try { await startSession(name); closeModal(); }
        catch (e) { toastErr("ผิดพลาด", e); btn.disabled = false; }
      });

      document.querySelector("#btn-modal-end")?.addEventListener("click", async () => {
        const active = store.get("activeSession");
        if (!active) return;
        const btn = document.querySelector("#btn-modal-end");
        btn.disabled = true;
        try { await endSession(active.id); closeModal(); }
        catch (e) { toastErr("ผิดพลาด", e); btn.disabled = false; }
      });

      document.querySelector("#btn-modal-savetag")?.addEventListener("click", async () => {
        const selected = document.querySelector('input[name="session-pick"]:checked')?.value ?? "";
        const tag = selected === "" ? null : selected;
        const m = store.get("modal");
        const btn = document.querySelector("#btn-modal-savetag");
        btn.disabled = true;
        try { await updateIdeaSessionTag(m.ideaId, tag); closeModal(); }
        catch (e) { toastErr("ผิดพลาด", e); btn.disabled = false; }
      });

      // ===== TRIAGE WIRE =====
      const impactEl = document.querySelector("#tr-impact");
      const effortEl = document.querySelector("#tr-effort");
      const paretoEl = document.querySelector("#tr-pareto");

      const updatePareto = () => {
        if (!paretoEl) return;
        const iv = parseFloat(impactEl.value);
        const ef = parseFloat(effortEl.value);
        if (iv > 0 && ef > 0) {
          paretoEl.textContent = (iv / ef).toFixed(1);
        } else {
          paretoEl.textContent = "—";
        }
      };
      impactEl?.addEventListener("input", updatePareto);
      effortEl?.addEventListener("input", updatePareto);
      if (impactEl) updatePareto();

      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const action = btn.dataset.action;
          const iv = parseFloat(impactEl.value);
          const ef = parseFloat(effortEl.value);
          const unit = document.querySelector("#tr-unit").value;
          const note = document.querySelector("#tr-note").value.trim();

          // Validate
          let ok = true;
          document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
          if (!(iv > 0)) { document.querySelector("#err-impact")?.classList.add("show"); ok = false; }
          if (!(ef > 0)) { document.querySelector("#err-effort")?.classList.add("show"); ok = false; }

          let killReason = null;
          if (action === "kill") {
            const wrap = document.querySelector("#tr-kill-reason-wrap");
            if (!wrap.classList.contains("show")) {
              wrap.classList.add("show");
              document.querySelector("#tr-kill-reason").focus();
              return; // reveal + wait for another click
            }
            killReason = document.querySelector("#tr-kill-reason").value.trim();
            if (!killReason) { document.querySelector("#err-kill")?.classList.add("show"); ok = false; }
          }
          if (!ok) return;

          const pareto = iv / ef;
          const m = store.get("modal");
          const extra = {
            impact_value: iv,
            impact_unit: unit,
            impact_note: note || null,
            effort_person_weeks: ef,
            pareto_score: pareto,
          };
          if (action === "kill") extra.kill_reason = killReason;

          btn.disabled = true;
          try { await updateIdeaStatus(m.ideaId, action, extra); closeModal(); }
          catch (e) { toastErr("ผิดพลาด", e); btn.disabled = false; }
        });
      });

      // ===== PROMOTE WIRE =====
      document.querySelector("#btn-modal-promote")?.addEventListener("click", async () => {
        const name = document.querySelector("#pr-name").value.trim();
        const why = document.querySelector("#pr-why").value.trim();
        const deliverable = document.querySelector("#pr-deliverable").value;
        const kpi = document.querySelector("#pr-kpi").value.trim();
        const owner = document.querySelector("#pr-owner").value;

        let ok = true;
        document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
        if (!name) { document.querySelector("#err-name")?.classList.add("show"); ok = false; }
        if (!/\d/.test(kpi)) { document.querySelector("#err-kpi")?.classList.add("show"); ok = false; }
        if (!owner) { document.querySelector("#err-owner")?.classList.add("show"); ok = false; }
        if (!ok) return;

        const m = store.get("modal");
        const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
        if (!idea) return;

        const btn = document.querySelector("#btn-modal-promote");
        btn.disabled = true;
        try {
          const projectId = await promoteIdeaToProject(idea, {
            title: name,
            why: why || null,
            deliverable_type: deliverable,
            kpi_text: kpi,
            owner_lead_uid: owner,
          });
          closeModal();
          toastOk("สร้าง project แล้ว · ไปที่ Live → ดู project");
        } catch (e) {
          toastErr("ผิดพลาด", e);
          btn.disabled = false;
        }
      });

      // ===== CLOSE PROJECT WIRE =====
      document.querySelector("#btn-modal-close-project")?.addEventListener("click", async () => {
        const m = store.get("modal");
        const p = (store.get("projects") || []).find(x => x.id === m.projectId);
        if (!p) return;
        const result = document.querySelector("#cp-result").value.trim();
        const impact = parseFloat(document.querySelector("#cp-impact").value);
        const unit = document.querySelector("#cp-unit").value;
        const verified = document.querySelector("#cp-verified").value || null;
        const lesson = document.querySelector("#cp-lesson").value.trim();
        const tags = document.querySelector("#cp-tags").value.split(",").map(t => t.trim()).filter(Boolean);

        let ok = true;
        document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
        if (!/\d/.test(result)) { document.querySelector("#err-cp-result")?.classList.add("show"); ok = false; }
        // อนุญาตค่าลบ + ศูนย์ — project ที่ผลแย่ลง (เช่น ASO -2%) = Miss จริง ต้องบันทึกตรง ๆ ได้ (North Star: honest verdict)
        if (!Number.isFinite(impact)) { document.querySelector("#err-cp-impact")?.classList.add("show"); ok = false; }
        if (!ok) return;

        const btn = document.querySelector("#btn-modal-close-project");
        btn.disabled = true;
        try {
          await closeProject(p, {
            result_text: result,
            impact_actual_value: impact,
            impact_actual_unit: unit,
            impact_verified_by_uid: verified,
            lesson_learned: lesson || null,
            lesson_tags: tags,
          });
          closeModal();
          // North Star: แทน alert เด้ง Live ด้วยหน้าทวน — เปิด project detail ที่โชว์ verdict badge + result
          go("/live/" + p.id);
        } catch (e) { toastErr("ปิดไม่สำเร็จ", e); btn.disabled = false; }
      });

      // ===== EDIT CLOSED REPORT WIRE (แก้เฉพาะจุด · คง closed) =====
      document.querySelector("#btn-modal-edit-closed")?.addEventListener("click", async () => {
        const m = store.get("modal");
        const p = (store.get("projects") || []).find(x => x.id === m.projectId);
        if (!p) return;
        const result = document.querySelector("#ec-result").value.trim();
        const impact = parseFloat(document.querySelector("#ec-impact").value);
        const unit = document.querySelector("#ec-unit").value;
        const verified = document.querySelector("#ec-verified").value || null;
        const lesson = document.querySelector("#ec-lesson").value.trim();
        const tags = document.querySelector("#ec-tags").value.split(",").map(t => t.trim()).filter(Boolean);

        let ok = true;
        document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
        if (!/\d/.test(result)) { document.querySelector("#err-ec-result")?.classList.add("show"); ok = false; }
        if (!Number.isFinite(impact)) { document.querySelector("#err-ec-impact")?.classList.add("show"); ok = false; }
        if (!ok) return;

        const btn = document.querySelector("#btn-modal-edit-closed");
        btn.disabled = true;
        try {
          await updateClosedReport(p, {
            result_text: result,
            impact_actual_value: impact,
            impact_actual_unit: unit,
            impact_verified_by_uid: verified,
            lesson_learned: lesson || null,
            lesson_tags: tags,
          });
          closeModal();
        } catch (e) { toastErr("บันทึกไม่สำเร็จ", e); btn.disabled = false; }
      });

      // ===== EDIT PROJECT WIRE =====
      document.querySelector("#btn-modal-edit-project")?.addEventListener("click", async () => {
        const m = store.get("modal");
        const why = document.querySelector("#ep-why").value.trim();
        const deliverable = document.querySelector("#ep-deliverable").value;
        const kpi = document.querySelector("#ep-kpi").value.trim();
        const owner = document.querySelector("#ep-owner").value;

        document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
        if (!/\d/.test(kpi)) { document.querySelector("#err-ep-kpi")?.classList.add("show"); return; }

        const btn = document.querySelector("#btn-modal-edit-project");
        btn.disabled = true;
        try {
          await updateProject(m.projectId, {
            why: why || null,
            deliverable_type: deliverable,
            kpi_text: kpi,
            owner_lead_uid: owner,
          });
          closeModal();
        } catch (e) { toastErr("บันทึกไม่สำเร็จ", e); btn.disabled = false; }
      });
    };

    // ===== BOOT =====
    let bootedShell = false;
    let routerStarted = false;
    let listenersUp = false;

    const bootShell = async (user) => {
      const profile = await loadUserProfile(user.uid);
      store.set("auth", { user, profile, ready: true, blocked: false });

      if (!listenersUp) {
        listenersUp = true;
        subscribeUsers();
        subscribeActiveSession();
        subscribeAllSessions();
        subscribeIdeas();
        subscribeProjects();
        subscribeAllMilestones();
        subscribeAllActions();
        subscribeAllCheckins();
        subscribeLessons();
        store.subscribe("modal", mountModal);
        store.subscribe("toasts", mountToasts);
        mountModal();
        mountToasts();
      }

      if (!bootedShell) {
        bootedShell = true;
        mountShell();
        if (!routerStarted) {
          routerStarted = true;
          window.addEventListener("hashchange", renderRoute);
        }
        renderRoute();
      } else {
        mountShell();
      }
    };

    document.querySelector("#app").innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--ink-tertiary)">กำลังโหลด...</div>`;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        bootedShell = false;
        shellSubscribed = false;
        store.set("auth", { user: null, profile: null, ready: true, blocked: false });
        mountAuthGate();
        return;
      }
      if (!ALLOWLIST.has(user.email)) {
        store.set("auth", { user, profile: null, ready: true, blocked: true });
        mountAuthGate({ blocked: true, blockedEmail: user.email });
        return;
      }
      await bootShell(user);
    });

    // Debug
    window.__RTM = { store, go, state, auth, db,
      toast, dismissToast, toastErr, toastOk, mountToasts,
      confirmModal, promptModal, fsErr, fsErrors, mountErrBanner,
      viewTeam, teamMembers, activeActionsOf, checkinFor, isoWeekStr, uiTeam,
