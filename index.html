<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTM Hub</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg-primary: #FAF7F2;
      --bg-elevated: #FFFFFF;
      --bg-subtle: #F2EDE3;
      --border: #E6DFD1;
      --border-strong: #C9BFA8;

      --ink-primary: #2C2A26;
      --ink-secondary: #6B655A;
      --ink-tertiary: #A39B8A;

      --sage: #7A9B7E;      --sage-soft: #DCE7DD;
      --peach: #E8A67C;     --peach-soft: #F7E3D2;
      --terracotta: #C87565;--terra-soft: #F2DDD5;
      --plum: #8B6B8E;      --plum-soft: #E4D9E5;
      --ink-dot: #4A4741;

      --good-fg: #4F7A5A;
      --warn-fg: #A8622A;
      --danger-fg: #8C3E30;
      --danger-bg: #F2DDD5;

      --font-body: "IBM Plex Sans Thai", system-ui, sans-serif;

      --text-xs: .75rem;   --text-sm: .875rem;  --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.375rem; --text-2xl: 1.75rem;

      --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
      --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --space-8: 48px;

      --radius-sm: 6px;  --radius-md: 10px;
      --radius-lg: 16px; --radius-xl: 20px;
    }

    /* ===== BASE ===== */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--ink-primary);
      background: var(--bg-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-weight: 600; line-height: 1.25; margin: 0; }
    h1 { font-size: var(--text-2xl); }
    h2 { font-size: var(--text-xl); }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ===== SHELL ===== */
    .app-shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--bg-subtle);
      border-right: 1px solid var(--border);
      padding: var(--space-5) var(--space-3);
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      padding: 0 12px 24px;
      font-weight: 600;
    }
    .sidebar .brand small {
      font-size: 12px;
      color: var(--ink-tertiary);
      display: block;
      font-weight: 400;
    }
    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: block;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      color: var(--ink-secondary);
      margin-bottom: var(--space-1);
    }
    .sidebar nav a.active {
      background: var(--bg-elevated);
      color: var(--ink-primary);
      font-weight: 500;
      border-left: 3px solid var(--sage);
    }
    .sidebar .user {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-2);
      border-top: 1px solid var(--border);
      margin-top: var(--space-4);
    }
    .sidebar .user-info { flex: 1; min-width: 0; }
    .sidebar .user-name {
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
    }
    .sidebar .user button {
      color: var(--ink-tertiary);
      padding: var(--space-2);
      font-size: var(--text-xs);
    }
    .sidebar .user button:hover { color: var(--danger-fg); }
    .main {
      padding: var(--space-6);
      max-width: 1280px;
    }

    /* ===== AVATAR ===== */
    .rtm-avatar {
      width: 28px; height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: var(--text-sm);
      font-weight: 600;
      flex-shrink: 0;
    }
    .rtm-avatar-sm {
      width: 22px; height: 22px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ===== AUTH GATE ===== */
    .auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-6);
    }
    .auth-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-6);
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(44,42,38,.06);
    }
    .auth-card h1 { margin-bottom: var(--space-2); }
    .auth-card p {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-6);
    }
    .btn-primary {
      background: var(--sage);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-weight: 500;
    }
    .btn-primary:hover { background: #6B8B70; }
    .btn-primary:disabled { background: var(--ink-tertiary); cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--border-strong);
      color: var(--ink-primary);
      padding: 10px 20px;
      border-radius: var(--radius-md);
    }
    .btn-secondary:hover { background: var(--bg-subtle); }
    .auth-error {
      color: var(--danger-fg);
      font-size: var(--text-sm);
      margin-top: var(--space-4);
    }

    /* ===== IDEA WALL ===== */
    .rtm-session-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      margin: var(--space-4) 0;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .rtm-session-active {
      background: var(--sage-soft);
      border-color: var(--sage);
    }
    .rtm-session-idle {
      background: var(--bg-subtle);
      color: var(--ink-secondary);
    }
    .rtm-session-dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,155,126,0.2);
      animation: rtm-pulse 2s infinite;
    }
    @keyframes rtm-pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .rtm-session-count {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin-left: auto;
      margin-right: var(--space-2);
    }
    .rtm-btn-inline {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      color: var(--ink-primary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
    }
    .rtm-btn-inline:hover { background: var(--bg-primary); }

    .rtm-quick-add {
      margin: var(--space-4) 0 var(--space-2);
    }
    .rtm-quick-add input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      font: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rtm-quick-add input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-quick-add input:disabled { opacity: 0.5; }

    .rtm-filter-row {
      display: flex;
      gap: var(--space-2);
      margin: var(--space-4) 0;
    }
    .rtm-pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--ink-secondary);
      font-size: var(--text-sm);
    }
    .rtm-pill:hover { background: var(--bg-subtle); }
    .rtm-pill.active {
      background: var(--ink-primary);
      color: var(--bg-primary);
      border-color: var(--ink-primary);
    }

    .rtm-idea-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-3);
    }
    .rtm-idea-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04));
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .rtm-idea-card:hover {
      box-shadow: 0 2px 8px rgba(44,42,38,.08);
      transform: translateY(-1px);
    }
    .rtm-idea-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
      flex-wrap: wrap;
    }
    .rtm-idea-actions {
      margin-left: auto;
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .rtm-idea-card:hover .rtm-idea-actions,
    .rtm-idea-card:focus-within .rtm-idea-actions {
      opacity: 1;
    }
    .rtm-icon-btn {
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--ink-secondary);
      opacity: 0.7;
    }
    .rtm-icon-btn:hover {
      background: var(--bg-subtle);
      opacity: 1;
    }
    .rtm-inline-edit {
      width: 100%;
      padding: 4px 6px;
      border: 1.5px solid var(--sage);
      border-radius: var(--radius-sm);
      font: inherit;
      font-size: var(--text-base);
      outline: none;
      background: var(--bg-elevated);
    }
    .rtm-session-picker {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin: var(--space-3) 0;
    }
    .rtm-session-option {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .rtm-session-option:last-child { border-bottom: none; }
    .rtm-session-option:hover { background: var(--bg-subtle); }
    .rtm-session-option input { margin: 0; flex-shrink: 0; }
    .rtm-tag-active {
      margin-left: auto;
      font-size: var(--text-xs);
      color: var(--good-fg);
    }

    /* ===== DECIDE VIEW ===== */
    .rtm-decide-section {
      margin-bottom: var(--space-6);
    }
    .rtm-decide-section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .rtm-decide-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    .rtm-decide-col {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
    }
    .rtm-decide-col-header {
      font-weight: 600;
      margin-bottom: var(--space-3);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rtm-decide-col-donow .rtm-decide-col-header { border-color: var(--sage); color: var(--good-fg); }
    .rtm-decide-col-park .rtm-decide-col-header { border-color: var(--peach); color: var(--warn-fg); }
    .rtm-decide-col-kill .rtm-decide-col-header { border-color: var(--border-strong); color: var(--ink-tertiary); }
    .rtm-decide-col-count {
      font-size: var(--text-sm);
      color: var(--ink-tertiary);
      font-weight: 400;
    }
    .rtm-decide-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      margin-bottom: var(--space-2);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .rtm-decide-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .rtm-decide-card-title {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: var(--text-sm);
    }
    .rtm-decide-card-meta {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .rtm-decide-card-pareto {
      color: var(--good-fg);
      font-weight: 600;
    }
    .rtm-decide-card-park-days {
      color: var(--warn-fg);
      font-size: var(--text-xs);
    }
    .rtm-decide-card-park-days.warn {
      color: var(--danger-fg);
      font-weight: 600;
    }
    .rtm-decide-card-kill-reason {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      font-style: italic;
      margin-top: 4px;
    }
    .rtm-decide-untriaged {
      background: var(--peach-soft);
      border: 1px solid var(--peach);
      padding: var(--space-4);
      border-radius: var(--radius-md);
    }
    .rtm-decide-untriaged-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--space-2);
    }
    .rtm-btn-promote {
      background: var(--sage);
      color: #fff;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 500;
    }
    .rtm-btn-promote:hover { background: #6B8B70; }
    .rtm-decide-card-actions {
      margin-top: var(--space-2);
      display: flex;
      gap: var(--space-1);
      justify-content: flex-end;
    }

    /* ===== FORM ===== */
    .rtm-form-row { margin-bottom: var(--space-3); }
    .rtm-form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .rtm-form-label .req { color: var(--danger-fg); }
    .rtm-form-hint {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      margin-top: 2px;
    }
    .rtm-form-error {
      font-size: var(--text-xs);
      color: var(--danger-fg);
      margin-top: 4px;
      display: none;
    }
    .rtm-form-error.show { display: block; }
    .rtm-form-row-inline {
      display: flex;
      gap: var(--space-2);
      align-items: end;
    }
    .rtm-form-row-inline > * { flex: 1; }
    .rtm-modal input[type="number"],
    .rtm-modal input[type="text"],
    .rtm-modal select,
    .rtm-modal textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      outline: none;
      background: var(--bg-elevated);
    }
    .rtm-modal input:focus,
    .rtm-modal select:focus,
    .rtm-modal textarea:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-modal textarea { resize: vertical; min-height: 60px; }
    .rtm-pareto-display {
      padding: var(--space-3);
      background: var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--ink-secondary);
      margin-bottom: var(--space-3);
    }
    .rtm-pareto-display b {
      color: var(--good-fg);
      font-size: var(--text-base);
    }
    .rtm-triage-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }
    .rtm-btn-donow, .rtm-btn-park, .rtm-btn-kill {
      padding: 12px;
      border-radius: var(--radius-md);
      font-weight: 500;
      border: 1.5px solid;
      transition: all 0.15s;
    }
    .rtm-btn-donow {
      background: var(--sage-soft);
      color: var(--good-fg);
      border-color: var(--sage);
    }
    .rtm-btn-donow:hover { background: var(--sage); color: #fff; }
    .rtm-btn-park {
      background: var(--peach-soft);
      color: var(--warn-fg);
      border-color: var(--peach);
    }
    .rtm-btn-park:hover { background: var(--peach); color: #fff; }
    .rtm-btn-kill {
      background: var(--bg-subtle);
      color: var(--ink-secondary);
      border-color: var(--border-strong);
    }
    .rtm-btn-kill:hover {
      background: var(--danger-bg);
      color: var(--danger-fg);
      border-color: var(--danger-fg);
    }
    .rtm-kill-reason {
      margin-top: var(--space-3);
      display: none;
    }
    .rtm-kill-reason.show { display: block; }

    @media (max-width: 767px) {
      .rtm-decide-cols { grid-template-columns: 1fr; }
      .rtm-triage-actions { grid-template-columns: 1fr; }
    }
    .rtm-session-tag {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      padding: 2px 8px;
      background: var(--bg-subtle);
      border-radius: 999px;
    }
    .rtm-idea-title {
      font-size: var(--text-base);
      color: var(--ink-primary);
      line-height: 1.4;
    }
    .rtm-idea-time {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      margin-top: var(--space-2);
    }

    .rtm-empty {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--ink-tertiary);
      background: var(--bg-elevated);
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
    }

    /* ===== MODAL ===== */
    .rtm-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44,42,38,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      z-index: 200;
    }
    .rtm-modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(44,42,38,.15);
    }
    .rtm-modal h2 { margin-bottom: var(--space-3); }
    .rtm-modal-hint {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-4);
    }
    .rtm-modal input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      outline: none;
    }
    .rtm-modal input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }
    .rtm-summary {
      background: var(--bg-subtle);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin: var(--space-2) 0 var(--space-4);
      font-size: var(--text-sm);
    }
    .rtm-summary > div { margin: 2px 0; }

    /* ===== MOBILE ===== */
    @media (max-width: 767px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; bottom: 0; left: 0; right: 0; top: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: var(--space-2);
        z-index: 100;
        border-top: 1px solid var(--border);
        border-right: none;
      }
      .sidebar .brand, .sidebar .user { display: none; }
      .sidebar nav { display: flex; width: 100%; justify-content: space-around; }
      .sidebar nav a { margin: 0; padding: var(--space-2); text-align: center; font-size: var(--text-xs); }
      .main { padding: var(--space-4); padding-bottom: 80px; }
      .rtm-idea-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module">
    // ==========================================================
    // RTM Hub · Single HTML
    // อ่านก่อนแก้: 00_MASTER_SPEC · 01_DATA_MODEL · 04_APP_SKELETON
    // ==========================================================

    // ===== FIREBASE =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, getDoc, getDocs,
      onSnapshot, query, where, orderBy, limit, serverTimestamp, increment
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {

    const app = initializeApp(firebaseConfig);

    // ===== HELPERS =====
    const escape = s => String(s ?? "").replace(/[&<>"']/g,
      c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

    const html = (strings, ...values) => strings.reduce((acc, str, i) => {
      const v = values[i];
      if (v == null) return acc + str;
      if (Array.isArray(v)) return acc + str + v.join("");
      if (typeof v === "object" && v.__raw) return acc + str + v.__raw;
      return acc + str + escape(v);
    }, "");

    const raw = s => ({ __raw: s });

    const fmtRelTime = (ts) => {
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return "เมื่อกี้";
      if (diff < 3600) return `${Math.floor(diff/60)} นาทีที่แล้ว`;
      if (diff < 86400) return `${Math.floor(diff/3600)} ชม.ที่แล้ว`;
      return `${Math.floor(diff/86400)} วันที่แล้ว`;
    };

    // ===== STORE =====
    const state = {
      auth: { user: null, profile: null, ready: false, blocked: false },
      route: { path: "/ideas", params: {} },
      ideas: [], projects: [], users: [], sessions: [], activeSession: null,
      currentProject: null, myActions: [], lessons: [],
      modal: null, toasts: [],
      ideasFilter: "all",
    };
    const subs = new Map();
    const store = {
      get: key => state[key],
      set(key, value) {
        state[key] = value;
        (subs.get(key) || []).forEach(fn => fn(value));
      },
      subscribe(key, fn) {
        if (!subs.has(key)) subs.set(key, new Set());
        subs.get(key).add(fn);
        return () => subs.get(key).delete(fn);
      },
    };

    // ===== ROUTER =====
    const routes = [];
    let currentCleanup = null;
    const route = (pattern, view) => routes.push({ pattern, view });

    const matchRoute = hash => {
      const path = hash.replace(/^#/, "") || "/ideas";
      for (const { pattern, view } of routes) {
        const parts = pattern.split("/"), got = path.split("/");
        if (parts.length !== got.length) continue;
        const params = {};
        const ok = parts.every((p, i) =>
          p.startsWith(":") ? (params[p.slice(1)] = got[i], true) : p === got[i]);
        if (ok) return { view, params, path };
      }
      return null;
    };

    const renderRoute = () => {
      if (typeof currentCleanup === "function") currentCleanup();
      const m = matchRoute(location.hash);
      store.set("route", { path: m?.path || "404", params: m?.params || {} });
      currentCleanup = m ? m.view(m.params) : renderNotFound();
    };

    const renderNotFound = () => {
      const el = document.querySelector("#route-outlet");
      if (el) el.innerHTML =
        `<div style="padding:48px;text-align:center;color:var(--ink-secondary)">404 · ไม่พบหน้านี้</div>`;
      return null;

    const go = path => { location.hash = path; };

    // ===== VIEW · auth-gate =====
    const mountAuthGate = ({ blocked = false, blockedEmail = "" } = {}) => {
      document.querySelector("#app").innerHTML = html`
        <div class="auth-gate">
          <div class="auth-card">
            <h1>RTM Hub</h1>
            <p>Execution tool สำหรับทีม RTM · THA</p>
            ${raw(blocked ? `
              <div class="auth-error">
                Email <b>${escape(blockedEmail)}</b> ไม่มีสิทธิ์เข้าใช้<br />
                ติดต่อ manager
              </div>
              <div style="margin-top:24px">
                <button id="btn-signout" class="btn-secondary">ออกจากระบบ</button>
              </div>
            ` : `
              <button id="btn-signin" class="btn-primary">เข้าสู่ระบบด้วย Google</button>
            `)}
          </div>
        </div>
      `;
      document.querySelector("#btn-signin")?.addEventListener("click", handleSignIn);
      document.querySelector("#btn-signout")?.addEventListener("click", handleSignOut);
    };

    const handleSignIn = async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) {
        console.error("sign-in failed:", e);
        alert("Sign in ล้มเหลว · " + e.message);
      }
    };
    const handleSignOut = () => signOut(auth);

    // ===== SHELL =====
    const NAV = [
      { href: "#/ideas",   icon: "💡", label: "Ideas" },
      { href: "#/decide",  icon: "🎯", label: "Decide" },
      { href: "#/live",    icon: "🚀", label: "Live" },
      { href: "#/my",      icon: "📅", label: "My Week" },
      { href: "#/team",    icon: "👥", label: "Team" },
      { href: "#/lessons", icon: "📚", label: "Lessons" },
    ];

    let shellSubscribed = false;
    const mountShell = () => {
      const currentPath = "#" + store.get("route").path;
      const u = store.get("auth").user || {};
      const profile = store.get("auth").profile || {};
      const avatarBg = profile.color || "var(--ink-dot)";
      const shortCode = profile.short_code || (u.email || "?")[0].toUpperCase();
      const displayName = profile.display_name || u.displayName || u.email || "";
      const role = profile.role || "member";

      document.querySelector("#app").innerHTML = html`
        <div class="app-shell">
          <aside class="sidebar">
            <div class="brand">RTM Hub<small>THA</small></div>
            <nav>
              ${NAV.map(n => `<a href="${n.href}" class="${currentPath.startsWith(n.href) ? "active" : ""}">${n.icon} ${n.label}</a>`)}
            </nav>
            <div class="user">
              <div class="rtm-avatar" style="background:${escape(avatarBg)}">${escape(shortCode)}</div>
              <div class="user-info">
                <div class="user-name">${escape(displayName)}</div>
                <div class="user-role">${escape(role)}</div>
              </div>
              <button id="btn-signout-shell" title="ออกจากระบบ">↪</button>
            </div>
          </aside>
          <main class="main" id="route-outlet">
            <div style="color:var(--ink-tertiary)">loading...</div>
          </main>
        </div>
      `;
      document.querySelector("#btn-signout-shell")?.addEventListener("click", handleSignOut);
      if (!shellSubscribed) {
        shellSubscribed = true;
        store.subscribe("route", () => mountShell());
      }
    };

    // ===== DATA · users =====
    const loadUserProfile = async (uid) => {
      try {
        const snap = await getDoc(doc(db, "users", uid));
        return snap.exists() ? snap.data() : null;
      } catch (e) { console.error("loadUserProfile:", e); return null; }
    };

    const subscribeUsers = () => {
      return onSnapshot(collection(db, "users"), snap => {
        const list = [];
        snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
        store.set("users", list);
      });
    };

    const userByUid = (uid) =>
      (store.get("users") || []).find(u => u.uid === uid);

    // ===== DATA · sessions =====
    const subscribeActiveSession = () => {
      const q = query(collection(db, "sessions"), where("ended_at", "==", null), limit(1));
      return onSnapshot(q, snap => {
        if (snap.empty) { store.set("activeSession", null); return; }
        const d = snap.docs[0];
        store.set("activeSession", { id: d.id, ...d.data() });
      });
    };

    const subscribeAllSessions = () => {
      const q = query(collection(db, "sessions"), orderBy("started_at", "desc"));
      return onSnapshot(q, snap => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
        store.set("sessions", list);
      });
    };

    const startSession = async (name) => {
      const user = store.get("auth").user;
      await addDoc(collection(db, "sessions"), {
        name: name.trim(),
        started_at: serverTimestamp(),
        ended_at: null,
        started_by_uid: user.uid,
        idea_count: 0,
        tenant_id: TENANT_ID,
        dc_id: DC_ID,
      });
    };

    const endSession = async (sessionId) => {
      await updateDoc(doc(db, "sessions", sessionId), {
        ended_at: serverTimestamp(),
      });
    };

    // ===== DATA · ideas =====
    const subscribeIdeas = () => {
      const q = query(collection(db, "ideas"), orderBy("created_at", "desc"));
      return onSnapshot(q, snap => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
        store.set("ideas", list);
      });
    };

    const updateIdeaTitle = async (id, title) => {
      await updateDoc(doc(db, "ideas", id), { title: title.trim() });
    };

    const updateIdeaSessionTag = async (id, tag) => {
      await updateDoc(doc(db, "ideas", id), { session_tag: tag });
    };

    const deleteIdea = async (id) => {
      await deleteDoc(doc(db, "ideas", id));
    };

    const updateIdeaStatus = async (id, status, extra = {}) => {
      const patch = { status, ...extra };
      if (status === "park") patch.parked_at = serverTimestamp();
      if (status === "do_now" || status === "new") { patch.parked_at = null; patch.kill_reason = null; }
      await updateDoc(doc(db, "ideas", id), patch);
    };

    const createIdea = async (title) => {
      const user = store.get("auth").user;
      const active = store.get("activeSession");
      await addDoc(collection(db, "ideas"), {
        title: title.trim(),
        problem_solved: "",
        session_tag: active ? active.name : null,
        status: "new",
        impact_value: null,
        impact_unit: null,
        impact_note: null,
        effort_person_weeks: null,
        pareto_score: null,
        kill_reason: null,
        promoted_project_id: null,
        created_by: user.uid,
        created_at: serverTimestamp(),
        parked_at: null,
        tenant_id: TENANT_ID,
        dc_id: DC_ID,
      });
      if (active) {
        try {
          await updateDoc(doc(db, "sessions", active.id), {
            idea_count: increment(1),
          });
        } catch(e) { console.warn("session count bump failed:", e); }
      }
    };

    // ===== DATA · projects =====
    const subscribeProjects = () => {
      const q = query(collection(db, "projects"), orderBy("created_at", "desc"));
      return onSnapshot(q, snap => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
        store.set("projects", list);
      });
    };

    const promoteIdeaToProject = async (idea, projectData) => {
      // 1. Create project doc
      const projectRef = await addDoc(collection(db, "projects"), {
        title: idea.title,
        origin_idea_id: idea.id,
        origin_session_tag: idea.session_tag || null,
        why: projectData.why || null,
        deliverable_type: projectData.deliverable_type,
        kpi_text: projectData.kpi_text,
        owner_lead_uid: projectData.owner_lead_uid,
        impact_projected_value: idea.impact_value || null,
        impact_projected_unit: idea.impact_unit || null,
        impact_actual_value: null,
        impact_actual_unit: null,
        impact_verified_by_uid: null,
        impact_verified_at: null,
        status: "active",
        result_text: null,
        lesson_learned: null,
        lesson_tags: [],
        created_at: serverTimestamp(),
        closed_at: null,
        tenant_id: TENANT_ID,
        dc_id: DC_ID,
      });

      // 2. Init 3-step milestone template
      const now = Date.now();
      const oneWeek = 7 * 24 * 60 * 60 * 1000;
      const milestones = [
        { title: "Analysis", template_source: "analysis", offset: oneWeek },
        { title: "Build", template_source: "build", offset: 2 * oneWeek },
        { title: "Rollout", template_source: "rollout", offset: 3 * oneWeek },
      ];
      for (let i = 0; i < milestones.length; i++) {
        const m = milestones[i];
        await addDoc(collection(db, "projects", projectRef.id, "milestones"), {
          title: m.title,
          target_date: new Date(now + m.offset),
          order: i,
          status: "not_yet",
          closed_at: null,
          template_source: m.template_source,
        });
      }

      // 3. Update idea → promoted
      await updateDoc(doc(db, "ideas", idea.id), {
        status: "promoted",
        promoted_project_id: projectRef.id,
      });

      return projectRef.id;
    };

    // ===== VIEW · ideas =====
    const viewIdeas = () => {
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <h1>💡 Idea Wall</h1>
        <div id="session-bar-wrap"></div>
        <div class="rtm-quick-add">
          <input id="idea-input" placeholder="พิมพ์ไอเดีย... กด Enter เพื่อโยน" autocomplete="off" maxlength="200" />
        </div>
        <div class="rtm-filter-row" id="filter-row"></div>
        <div id="ideas-list"></div>
      `;

      const input = document.querySelector("#idea-input");
      input.focus();
      input.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter") return;
        const val = input.value.trim();
        if (!val) return;
        input.value = "";
        input.disabled = true;
        try { await createIdea(val); }
        catch (err) {
          console.error(err);
          alert("โยนไอเดียไม่สำเร็จ · " + err.message);
          input.value = val;
        }
        input.disabled = false;
        input.focus();
      });

      const renderAll = () => {
        renderSessionBar();
        renderFilterRow();
        renderIdeasList();
      };
      renderAll();

      const unsubs = [
        store.subscribe("ideas", renderAll),
        store.subscribe("activeSession", renderAll),
        store.subscribe("users", renderAll),
        store.subscribe("ideasFilter", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const renderSessionBar = () => {
      const el = document.querySelector("#session-bar-wrap");
      if (!el) return;
      const active = store.get("activeSession");
      el.innerHTML = active ? html`
        <div class="rtm-session-bar rtm-session-active">
          <span class="rtm-session-dot"></span>
          <span>Session: <b>${active.name}</b></span>
          <span class="rtm-session-count">${active.idea_count || 0} ideas</span>
          <button class="rtm-btn-inline" id="btn-end-session">🏁 End Session</button>
        </div>
      ` : html`
        <div class="rtm-session-bar rtm-session-idle">
          <span>ไม่มี session ที่กำลังทำอยู่</span>
          <span style="margin-left:auto"></span>
          <button class="rtm-btn-inline" id="btn-start-session">▶ เริ่ม Session</button>
        </div>
      `;
      document.querySelector("#btn-start-session")?.addEventListener("click",
        () => store.set("modal", { name: "session-start" }));

        () => store.set("modal", { name: "session-end" }));
    };

    // Idea Wall shows ONLY status=new ideas (untriaged)

    const getNewIdeas = () => (store.get("ideas") || []).filter(i => i.status === "new");

    const renderFilterRow = () => {
      const el = document.querySelector("#filter-row");
      if (!el) return;
      const filter = store.get("ideasFilter") || "all";
      const uid = store.get("auth").user?.uid;
      const all = getNewIdeas();
      const mineCount = all.filter(i => i.created_by === uid).length;
      el.innerHTML = html`
        <button class="rtm-pill ${filter === 'all' ? 'active' : ''}" data-filter="all">ทั้งหมด · ${all.length}</button>
        <button class="rtm-pill ${filter === 'mine' ? 'active' : ''}" data-filter="mine">ของฉัน · ${mineCount}</button>
        <a href="#/decide" class="rtm-pill" style="margin-left:auto;background:var(--sage-soft);color:var(--good-fg);border-color:var(--sage)">🎯 ไป Decide →</a>
      `;
      el.querySelectorAll("[data-filter]").forEach(b => {
        b.addEventListener("click", () => store.set("ideasFilter", b.dataset.filter));
      });
    };

    const renderIdeasList = () => {
      const el = document.querySelector("#ideas-list");
      if (!el) return;
      const filter = store.get("ideasFilter") || "all";
      const uid = store.get("auth").user?.uid;
      const all = getNewIdeas();
      const ideas = filter === "mine" ? all.filter(i => i.created_by === uid) : all;
      if (ideas.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">${filter === "mine" ? "คุณไม่มีไอเดียที่รอ triage" : "ยังไม่มีไอเดีย — พิมพ์บรรทัดแรกด้านบน"}</div>`;
        return;
      }
      el.innerHTML = html`<div class="rtm-idea-grid">${ideas.map(renderIdeaCard)}</div>`;
      wireIdeaCardEvents();
    };

    const renderIdeaCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      return html`
        <div class="rtm-idea-card" data-idea-id="${idea.id}" style="border-left-color:${escape(color)}">
          <div class="rtm-idea-header">
            <div class="rtm-avatar-sm" style="background:${escape(color)}">${escape(short)}</div>
            ${idea.session_tag ? raw(`<span class="rtm-session-tag">🏷 ${escape(idea.session_tag)}</span>`) : ""}
            <div class="rtm-idea-actions">
              <button class="rtm-icon-btn" data-action="tag" title="Assign session">🏷</button>
              <button class="rtm-icon-btn" data-action="edit" title="แก้ไข">✏️</button>
              <button class="rtm-icon-btn" data-action="delete" title="ลบ">🗑</button>
            </div>
          </div>
          <div class="rtm-idea-title" data-title>${idea.title}</div>
          <div class="rtm-idea-time">${fmtRelTime(idea.created_at)}</div>
        </div>
      `;
    };

    // ===== INTERACTIONS · idea card =====
    const wireIdeaCardEvents = () => {
      document.querySelectorAll(".rtm-idea-card").forEach(card => {
        const id = card.dataset.ideaId;
        card.querySelector('[data-action="tag"]')?.addEventListener("click", (e) => {
          e.stopPropagation();
          store.set("modal", { name: "session-picker", ideaId: id });
        });
        card.querySelector('[data-action="edit"]')?.addEventListener("click", (e) => {
          e.stopPropagation();
          startInlineEdit(card, id);
        });
        card.querySelector('[data-action="delete"]')?.addEventListener("click", async (e) => {
          e.stopPropagation();
          const title = card.querySelector("[data-title]")?.textContent || "";
          if (!confirm(`ลบไอเดีย "${title}" ?`)) return;
          try { await deleteIdea(id); }
          catch (err) { alert("ลบไม่สำเร็จ · " + err.message); }
        });
      });
    };

    const startInlineEdit = (card, id) => {
      const titleEl = card.querySelector("[data-title]");
      const current = titleEl.textContent;
      const input = document.createElement("input");
      input.type = "text";
      input.value = current;
      input.className = "rtm-inline-edit";
      input.maxLength = 200;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      const commit = async () => {
        const val = input.value.trim();
        if (!val || val === current) { input.replaceWith(titleEl); return; }
        try { await updateIdeaTitle(id, val); }
        catch (err) { alert("แก้ไขไม่สำเร็จ · " + err.message); input.replaceWith(titleEl); }
      };
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(); }
        if (e.key === "Escape") { input.replaceWith(titleEl); }
      });
      input.addEventListener("blur", commit);
    };

    // ===== VIEW · decide =====
    const viewDecide = () => {
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <h1>🎯 Decision Board</h1>
        <p style="color:var(--ink-secondary);margin-top:8px">ประเมิน impact/effort · ตัดสิน Do Now / Park / Kill</p>
        <div id="decide-content" style="margin-top:24px"></div>
      `;

      const renderAll = () => renderDecideContent();
      renderAll();

      const unsubs = [
        store.subscribe("ideas", renderAll),
        store.subscribe("users", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const renderDecideContent = () => {
      const el = document.querySelector("#decide-content");
      if (!el) return;
      const all = store.get("ideas") || [];
      const untriaged = all.filter(i => i.status === "new");
      const doNow = all.filter(i => i.status === "do_now").sort((a,b) => (b.pareto_score||0) - (a.pareto_score||0));
      const park = all.filter(i => i.status === "park").sort((a,b) => (b.pareto_score||0) - (a.pareto_score||0));
      const kill = all.filter(i => i.status === "kill");

      el.innerHTML = html`
        ${untriaged.length > 0 ? raw(`
          <div class="rtm-decide-section">
            <div class="rtm-decide-section-title">🆕 ยังไม่ตัดสิน · ${untriaged.length}</div>
            <div class="rtm-decide-untriaged">
              <div class="rtm-decide-untriaged-grid">
                ${untriaged.map(renderDecideUntriagedCard).join("")}
              </div>
            </div>
          </div>
        `) : ""}
        <div class="rtm-decide-cols">
          <div class="rtm-decide-col rtm-decide-col-donow">
            <div class="rtm-decide-col-header">
              <span>🚀 Do Now</span>
              <span class="rtm-decide-col-count">${doNow.length}</span>
            </div>
            ${doNow.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(doNow.map(renderDecideCard).join(""))}
          </div>
          <div class="rtm-decide-col rtm-decide-col-park">
            <div class="rtm-decide-col-header">
              <span>⏸ Park</span>
              <span class="rtm-decide-col-count">${park.length}</span>
            </div>
            ${park.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(park.map(renderDecideCard).join(""))}
          </div>
          <div class="rtm-decide-col rtm-decide-col-kill">
            <div class="rtm-decide-col-header">
              <span>✕ Kill</span>
              <span class="rtm-decide-col-count">${kill.length}</span>
            </div>
            ${kill.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(kill.map(renderDecideCard).join(""))}
          </div>
        </div>
      `;

      // Wire clicks
      el.querySelectorAll("[data-triage-idea]").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("[data-promote]")) return; // let promote button handle
          const id = card.dataset.triageIdea;
          store.set("modal", { name: "triage", ideaId: id });
        });
      });
      el.querySelectorAll("[data-promote]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const id = btn.dataset.promote;
          store.set("modal", { name: "promote", ideaId: id });
        });
      });
    };

    const renderDecideUntriagedCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      return html`
        <div class="rtm-decide-card" data-triage-idea="${idea.id}">
          <div class="rtm-decide-card-title">${idea.title}</div>
          <div class="rtm-decide-card-meta">
            <span><span class="rtm-avatar-sm" style="background:${escape(color)};width:16px;height:16px;font-size:9px">${escape(short)}</span> ${idea.session_tag ? raw(`· 🏷 ${escape(idea.session_tag)}`) : ""}</span>
            <span style="color:var(--sage);font-weight:500">→ triage</span>
          </div>
        </div>
      `;
    };

    const renderDecideCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      const impact = idea.impact_value != null
        ? `${idea.impact_value} ${idea.impact_unit || ""}`
        : "—";
      const effort = idea.effort_person_weeks != null ? `${idea.effort_person_weeks}w` : "—";
      const pareto = idea.pareto_score != null ? idea.pareto_score.toFixed(1) : "—";
      const parkDays = idea.parked_at ? Math.floor((Date.now() - (idea.parked_at.toDate ? idea.parked_at.toDate().getTime() : idea.parked_at)) / 86400000) : null;

      return html`
        <div class="rtm-decide-card" data-triage-idea="${idea.id}">
          <div class="rtm-decide-card-title">${idea.title}</div>
          <div class="rtm-decide-card-meta">
            <span><span class="rtm-avatar-sm" style="background:${escape(color)};width:16px;height:16px;font-size:9px">${escape(short)}</span> Impact: ${impact} · Effort: ${effort}</span>
            <span class="rtm-decide-card-pareto">${pareto}</span>
          </div>
          ${idea.status === "park" && parkDays != null ? raw(`
            <div class="rtm-decide-card-park-days ${parkDays > 30 ? 'warn' : ''}">Parked ${parkDays} วัน${parkDays > 30 ? ' · แนะนำ kill' : ''}</div>
          `) : ""}
          ${idea.status === "kill" && idea.kill_reason ? raw(`<div class="rtm-decide-card-kill-reason">"${escape(idea.kill_reason)}"</div>`) : ""}
          ${idea.status === "do_now" ? raw(`
            <div class="rtm-decide-card-actions">
              <button class="rtm-btn-promote" data-promote="${idea.id}">🚀 Promote</button>
            </div>
          `) : ""}
        </div>
      `;
    };

    // ===== STUB VIEWS =====
    const stub = name => () => {
      const el = document.querySelector("#route-outlet");
      if (el) el.innerHTML = `<h1>${name}</h1><p style="color:var(--ink-tertiary);margin-top:16px">กำลังพัฒนา</p>`;
      return () => {};
    };

    route("/ideas",    viewIdeas);
    route("/decide",   viewDecide);
    route("/live",     stub("🚀 Live Projects"));
    route("/live/:id", p => stub(`🚀 Project ${p.id}`)());
    route("/my",       stub("📅 My Week"));
    route("/team",     stub("👥 Team Board"));
    route("/lessons",  stub("📚 Lessons"));

    // ===== MODAL · session-start =====
    const renderSessionStartModal = () => html`
      <div class="rtm-modal-backdrop" data-close-modal>
        <div class="rtm-modal">
          <h2>▶ เริ่ม Idea Session</h2>
          <p class="rtm-modal-hint">ตั้งชื่อประชุมนี้ · ไอเดียที่โยนช่วงนี้จะ tag ด้วยชื่อนี้อัตโนมัติ</p>
          <input id="modal-session-name" placeholder="RTM Kick-off ก.ค." autocomplete="off" maxlength="80" />
          <div class="rtm-modal-actions">
            <button class="btn-secondary" data-close-modal>ยกเลิก</button>
            <button class="btn-primary" id="btn-modal-start">▶ เริ่ม</button>
          </div>
        </div>
      </div>
    `;

    // ===== MODAL · session-end =====
    const renderSessionEndModal = () => {
      const active = store.get("activeSession");
      if (!active) return "";
      const all = store.get("ideas") || [];
      const inSession = all.filter(i => i.session_tag === active.name);
      const cnt = { new: 0, do_now: 0, park: 0, kill: 0, promoted: 0 };
      inSession.forEach(i => { cnt[i.status] = (cnt[i.status] || 0) + 1; });
      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal">
            <h2>🏁 End Session</h2>
            <p class="rtm-modal-hint">"${active.name}"</p>
            <div class="rtm-summary">
              <div>Ideas ในประชุม: <b>${inSession.length}</b></div>
              <div>· ยังไม่ triage: ${cnt.new}</div>
              <div>· Do Now: ${cnt.do_now}</div>
              <div>· Park: ${cnt.park}</div>
              <div>· Kill: ${cnt.kill}</div>
              ${cnt.promoted ? raw(`<div>· Promoted: ${cnt.promoted}</div>`) : ""}
            </div>
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>กลับ</button>
              <button class="btn-primary" id="btn-modal-end">🏁 จบ Session</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · session-picker =====
    const renderSessionPickerModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const sessions = store.get("sessions") || [];
      const current = idea.session_tag;
      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal">
            <h2>🏷 Assign Session</h2>
            <p class="rtm-modal-hint">"${idea.title}"</p>
            <div class="rtm-session-picker">
              <label class="rtm-session-option">
                <input type="radio" name="session-pick" value="" ${!current ? "checked" : ""} />
                <span style="color:var(--ink-tertiary)">— ไม่มี tag —</span>
              </label>
              ${sessions.length === 0
                ? raw(`<div style="padding:16px;text-align:center;color:var(--ink-tertiary);font-size:var(--text-sm)">ยังไม่มี session</div>`)
                : sessions.map(s => html`
                <label class="rtm-session-option">
                  <input type="radio" name="session-pick" value="${s.name}" ${current === s.name ? "checked" : ""} />
                  <span>${s.name}</span>
                  ${!s.ended_at ? raw('<span class="rtm-tag-active">🟢 active</span>') : ""}
                </label>
              `)}
            </div>
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
              <button class="btn-primary" id="btn-modal-savetag">บันทึก</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · triage =====
    const IMPACT_UNITS = ["฿/เดือน", "%", "ชั่วโมง/สัปดาห์", "ร้าน", "อื่นๆ"];

    const renderTriageModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const iv = idea.impact_value ?? "";
      const iu = idea.impact_unit ?? "฿/เดือน";
      const inote = idea.impact_note ?? "";
      const ef = idea.effort_person_weeks ?? "";

      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px" data-modal-inner>
            <h2>🎯 Triage</h2>
            <p class="rtm-modal-hint">"${idea.title}"</p>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Impact <span class="req">*</span></label>
              <div class="rtm-form-row-inline">
                <input type="number" id="tr-impact" placeholder="เช่น 500000" step="0.01" value="${iv}" />
                <select id="tr-unit">
                  ${IMPACT_UNITS.map(u => `<option value="${escape(u)}" ${u === iu ? "selected" : ""}>${escape(u)}</option>`)}
                </select>
              </div>
              <div class="rtm-form-hint">ตัวเลขเท่านั้น · ห้าม "สูง/กลาง/ต่ำ"</div>
              <div class="rtm-form-error" id="err-impact">กรอกตัวเลข impact</div>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Impact note (optional)</label>
              <input type="text" id="tr-note" placeholder="เช่น ลด stockout 30%" value="${escape(inote)}" />
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Effort · person-weeks <span class="req">*</span></label>
              <input type="number" id="tr-effort" placeholder="เช่น 2" step="0.5" min="0.5" value="${ef}" />
              <div class="rtm-form-error" id="err-effort">กรอกตัวเลข effort</div>
            </div>

            <div class="rtm-pareto-display">
              Pareto score: <b id="tr-pareto">—</b>
              <span style="font-size:var(--text-xs);color:var(--ink-tertiary);margin-left:8px">(impact / effort · สูง = คุ้ม)</span>
            </div>

            <div class="rtm-kill-reason" id="tr-kill-reason-wrap">
              <label class="rtm-form-label">เหตุผลที่ Kill <span class="req">*</span></label>
              <textarea id="tr-kill-reason" placeholder="ทำไมถึงตัดออก" rows="2"></textarea>
              <div class="rtm-form-error" id="err-kill">กรอกเหตุผล</div>
            </div>

            <div class="rtm-triage-actions">
              <button class="rtm-btn-donow" data-action="do_now">🚀 Do Now</button>
              <button class="rtm-btn-park" data-action="park">⏸ Park</button>
              <button class="rtm-btn-kill" data-action="kill">✕ Kill</button>
            </div>

            <div style="text-align:right;margin-top:16px">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL · promote =====
    const DELIVERABLE_TYPES = [
      { v: "dashboard", label: "📊 Dashboard" },
      { v: "powerbi", label: "📊 Power BI" },
      { v: "sop", label: "📋 SOP" },
      { v: "excel", label: "📈 Excel" },
      { v: "report", label: "📄 Report" },
    ];

    const renderPromoteModal = () => {
      const m = store.get("modal");
      const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
      if (!idea) return "";
      const users = store.get("users") || [];

      return html`
        <div class="rtm-modal-backdrop" data-close-modal>
          <div class="rtm-modal" style="max-width:560px">
            <h2>🚀 Promote to Project</h2>
            <p class="rtm-modal-hint">"${idea.title}"</p>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Why (recommended · ไม่บังคับ)</label>
              <textarea id="pr-why" placeholder="ทำเพราะอะไร" rows="2"></textarea>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Deliverable <span class="req">*</span></label>
              <select id="pr-deliverable">
                ${DELIVERABLE_TYPES.map(d => `<option value="${d.v}">${d.label}</option>`)}
              </select>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">KPI <span class="req">*</span> · ต้องมีตัวเลข</label>
              <input type="text" id="pr-kpi" placeholder="เช่น ลด stockout 30% ภายใน Q4" />
              <div class="rtm-form-hint">❌ "ลด stockout" · ✓ "ลด stockout 30%"</div>
              <div class="rtm-form-error" id="err-kpi">KPI ต้องมีตัวเลข</div>
            </div>

            <div class="rtm-form-row">
              <label class="rtm-form-label">Owner Lead <span class="req">*</span></label>
              <select id="pr-owner">
                <option value="">— เลือก owner —</option>
                ${users.map(u => `<option value="${escape(u.uid)}">${escape(u.display_name || u.email)} (${escape(u.short_code || "?")})</option>`)}
              </select>
              <div class="rtm-form-error" id="err-owner">เลือก owner</div>
            </div>

            <div style="background:var(--bg-subtle);padding:12px;border-radius:var(--radius-sm);font-size:var(--text-sm);color:var(--ink-secondary);margin-top:16px">
              📅 Milestones เริ่มต้น: Analysis (+1wk) · Build (+2wk) · Rollout (+3wk)
              <div style="font-size:var(--text-xs);margin-top:4px">แก้ทีหลังได้ในหน้า Project</div>
            </div>

            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-close-modal>ยกเลิก</button>
              <button class="btn-primary" id="btn-modal-promote">🚀 Launch Project</button>
            </div>
          </div>
        </div>
      `;
    };

    // ===== MODAL RENDERER =====
    const closeModal = () => store.set("modal", null);

    const mountModal = () => {
      const root = document.querySelector("#modal-root");
      const m = store.get("modal");
      if (!m) { root.innerHTML = ""; return; }
      let content = "";
      if (m.name === "session-start") content = renderSessionStartModal();
      else if (m.name === "session-end") content = renderSessionEndModal();
      else if (m.name === "session-picker") content = renderSessionPickerModal();
      else if (m.name === "triage") content = renderTriageModal();
      else if (m.name === "promote") content = renderPromoteModal();
      root.innerHTML = content;
      wireModalEvents();
    };

    const wireModalEvents = () => {
      document.querySelectorAll("[data-close-modal]").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target === el || e.currentTarget === e.target) closeModal();
        });
      });

      const startInput = document.querySelector("#modal-session-name");
      if (startInput) {
        startInput.focus();
        startInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") document.querySelector("#btn-modal-start")?.click();
          if (e.key === "Escape") closeModal();
        });
      }

      document.querySelector("#btn-modal-start")?.addEventListener("click", async () => {
        const name = document.querySelector("#modal-session-name").value.trim();
        if (!name) { document.querySelector("#modal-session-name").focus(); return; }
        const btn = document.querySelector("#btn-modal-start");
        btn.disabled = true;
        try { await startSession(name); closeModal(); }
        catch (e) { alert("Error: " + e.message); btn.disabled = false; }
      });

      document.querySelector("#btn-modal-end")?.addEventListener("click", async () => {
        const active = store.get("activeSession");
        if (!active) return;
        const btn = document.querySelector("#btn-modal-end");
        btn.disabled = true;
        try { await endSession(active.id); closeModal(); }
        catch (e) { alert("Error: " + e.message); btn.disabled = false; }
      });

      document.querySelector("#btn-modal-savetag")?.addEventListener("click", async () => {
        const selected = document.querySelector('input[name="session-pick"]:checked')?.value ?? "";
        const tag = selected === "" ? null : selected;
        const m = store.get("modal");
        const btn = document.querySelector("#btn-modal-savetag");
        btn.disabled = true;
        try { await updateIdeaSessionTag(m.ideaId, tag); closeModal(); }
        catch (e) { alert("Error: " + e.message); btn.disabled = false; }
      });

      // ===== TRIAGE WIRE =====
      const impactEl = document.querySelector("#tr-impact");
      const effortEl = document.querySelector("#tr-effort");
      const paretoEl = document.querySelector("#tr-pareto");

      const updatePareto = () => {
        if (!paretoEl) return;
        const iv = parseFloat(impactEl.value);
        const ef = parseFloat(effortEl.value);
        if (iv > 0 && ef > 0) {
          paretoEl.textContent = (iv / ef).toFixed(1);
        } else {
          paretoEl.textContent = "—";
        }
      };
      impactEl?.addEventListener("input", updatePareto);
      effortEl?.addEventListener("input", updatePareto);
      if (impactEl) updatePareto();

      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const action = btn.dataset.action;
          const iv = parseFloat(impactEl.value);
          const ef = parseFloat(effortEl.value);
          const unit = document.querySelector("#tr-unit").value;
          const note = document.querySelector("#tr-note").value.trim();

          // Validate
          let ok = true;
          document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
          if (!(iv > 0)) { document.querySelector("#err-impact")?.classList.add("show"); ok = false; }
          if (!(ef > 0)) { document.querySelector("#err-effort")?.classList.add("show"); ok = false; }

          let killReason = null;
          if (action === "kill") {
            const wrap = document.querySelector("#tr-kill-reason-wrap");
            if (!wrap.classList.contains("show")) {
              wrap.classList.add("show");
              document.querySelector("#tr-kill-reason").focus();
              return; // reveal + wait for another click
            }
            killReason = document.querySelector("#tr-kill-reason").value.trim();
            if (!killReason) { document.querySelector("#err-kill")?.classList.add("show"); ok = false; }
          }
          if (!ok) return;

          const pareto = iv / ef;
          const m = store.get("modal");
          const extra = {
            impact_value: iv,
            impact_unit: unit,
            impact_note: note || null,
            effort_person_weeks: ef,
            pareto_score: pareto,
          };
          if (action === "kill") extra.kill_reason = killReason;

          btn.disabled = true;
          try { await updateIdeaStatus(m.ideaId, action, extra); closeModal(); }
          catch (e) { alert("Error: " + e.message); btn.disabled = false; }
        });
      });

      // ===== PROMOTE WIRE =====
      document.querySelector("#btn-modal-promote")?.addEventListener("click", async () => {
        const why = document.querySelector("#pr-why").value.trim();
        const deliverable = document.querySelector("#pr-deliverable").value;
        const kpi = document.querySelector("#pr-kpi").value.trim();
        const owner = document.querySelector("#pr-owner").value;

        let ok = true;
        document.querySelectorAll(".rtm-form-error").forEach(e => e.classList.remove("show"));
        if (!/\d/.test(kpi)) { document.querySelector("#err-kpi")?.classList.add("show"); ok = false; }
        if (!owner) { document.querySelector("#err-owner")?.classList.add("show"); ok = false; }
        if (!ok) return;

        const m = store.get("modal");
        const idea = (store.get("ideas") || []).find(i => i.id === m.ideaId);
        if (!idea) return;

        const btn = document.querySelector("#btn-modal-promote");
        btn.disabled = true;
        try {
          const projectId = await promoteIdeaToProject(idea, {
            why: why || null,
            deliverable_type: deliverable,
            kpi_text: kpi,
            owner_lead_uid: owner,
          });
          closeModal();
          alert("✓ สร้าง project แล้ว · ไปที่ Live → ดู project");
        } catch (e) {
          alert("Error: " + e.message);
          btn.disabled = false;
        }
      });
    };

    // ===== BOOT =====
    let bootedShell = false;
    let routerStarted = false;
    let listenersUp = false;

    const bootShell = async (user) => {
      const profile = await loadUserProfile(user.uid);
      store.set("auth", { user, profile, ready: true, blocked: false });

      if (!listenersUp) {
        listenersUp = true;
        subscribeUsers();
        subscribeActiveSession();
        subscribeAllSessions();
        subscribeIdeas();
        subscribeProjects();
        store.subscribe("modal", mountModal);
        mountModal();
      }

      if (!bootedShell) {
        bootedShell = true;
        mountShell();
        if (!routerStarted) {
          routerStarted = true;
          window.addEventListener("hashchange", renderRoute);
        }
        renderRoute();
      } else {
        mountShell();
      }
    };

    document.querySelector("#app").innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--ink-tertiary)">กำลังโหลด...</div>`;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        bootedShell = false;
        shellSubscribed = false;
        store.set("auth", { user: null, profile: null, ready: true, blocked: false });
        mountAuthGate();
        return;
      }
      if (!ALLOWLIST.has(user.email)) {
        store.set("auth", { user, profile: null, ready: true, blocked: true });
        mountAuthGate({ blocked: true, blockedEmail: user.email });
        return;
      }
      await bootShell(user);
    });

    // Debug
    window.__RTM = { store, go, state, auth, db };
  </script>
</body>
</html>
