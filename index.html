      return () => unsubs.forEach(u => u());
    };

    const renderDecideContent = () => {
      const el = document.querySelector("#decide-content");
      if (!el) return;
      const all = store.get("ideas") || [];
      const untriaged = all.filter(i => i.status === "new");
      const doNow = all.filter(i => i.status === "do_now").sort((a,b) => (b.pareto_score||0) - (a.pareto_score||0));
      const park = all.filter(i => i.status === "park").sort((a,b) => (b.pareto_score||0) - (a.pareto_score||0));
      const kill = all.filter(i => i.status === "kill");

      el.innerHTML = html`
        ${untriaged.length > 0 ? raw(`
          <div class="rtm-decide-section">
            <div class="rtm-decide-section-title">🆕 ยังไม่ตัดสิน · ${untriaged.length}</div>
            <div class="rtm-decide-untriaged">
              <div class="rtm-decide-untriaged-grid">
                ${untriaged.map(renderDecideUntriagedCard).join("")}
              </div>
            </div>
          </div>
        `) : ""}
        <div class="rtm-decide-cols">
          <div class="rtm-decide-col rtm-decide-col-donow">
            <div class="rtm-decide-col-header">
              <span>🚀 Do Now</span>
              <span class="rtm-decide-col-count">${doNow.length}</span>
            </div>
            ${doNow.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(doNow.map(renderDecideCard).join(""))}
          </div>
          <div class="rtm-decide-col rtm-decide-col-park">
            <div class="rtm-decide-col-header">
              <span>⏸ Park</span>
              <span class="rtm-decide-col-count">${park.length}</span>
            </div>
            ${park.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(park.map(renderDecideCard).join(""))}
          </div>
          <div class="rtm-decide-col rtm-decide-col-kill">
            <div class="rtm-decide-col-header">
              <span>✕ Kill</span>
              <span class="rtm-decide-col-count">${kill.length}</span>
            </div>
            ${kill.length === 0 ? raw(`<div style="color:var(--ink-tertiary);font-size:var(--text-sm);text-align:center;padding:24px 0">ยังไม่มี</div>`) : raw(kill.map(renderDecideCard).join(""))}
          </div>
        </div>
      `;

      // Wire clicks
      el.querySelectorAll("[data-triage-idea]").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("[data-promote]")) return; // let promote button handle
          const id = card.dataset.triageIdea;
          store.set("modal", { name: "triage", ideaId: id });
        });
      });
      el.querySelectorAll("[data-promote]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const id = btn.dataset.promote;
          store.set("modal", { name: "promote", ideaId: id });
        });
      });
    };

    const renderDecideUntriagedCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      return html`
        <div class="rtm-decide-card" data-triage-idea="${idea.id}">
          <div class="rtm-decide-card-title">${idea.title}</div>
          <div class="rtm-decide-card-meta">
            <span><span class="rtm-avatar-sm" style="background:${escape(color)};width:16px;height:16px;font-size:9px">${escape(short)}</span> ${idea.session_tag ? raw(`· 🏷 ${escape(idea.session_tag)}`) : ""}</span>
            <span style="color:var(--sage);font-weight:500">→ triage</span>
          </div>
        </div>
      `;
    };

    const renderDecideCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      const impact = idea.impact_value != null
        ? `${idea.impact_value} ${idea.impact_unit || ""}`
        : "—";
      const effort = idea.effort_person_weeks != null ? `${idea.effort_person_weeks}w` : "—";
      const pareto = idea.pareto_score != null ? idea.pareto_score.toFixed(1) : "—";
      const parkDays = idea.parked_at ? Math.floor((Date.now() - (idea.parked_at.toDate ? idea.parked_at.toDate().getTime() : idea.parked_at)) / 86400000) : null;

      return html`
        <div class="rtm-decide-card" data-triage-idea="${idea.id}">
          <div class="rtm-decide-card-title">${idea.title}</div>
          <div class="rtm-decide-card-meta">
            <span><span class="rtm-avatar-sm" style="background:${escape(color)};width:16px;height:16px;font-size:9px">${escape(short)}</span> Impact: ${impact} · Effort: ${effort}</span>
            <span class="rtm-decide-card-pareto">${pareto}</span>
          </div>
          ${idea.status === "park" && parkDays != null ? raw(`
            <div class="rtm-decide-card-park-days ${parkDays > 30 ? 'warn' : ''}">Parked ${parkDays} วัน${parkDays > 30 ? ' · แนะนำ kill' : ''}</div>
          `) : ""}
          ${idea.status === "kill" && idea.kill_reason ? raw(`<div class="rtm-decide-card-kill-reason">"${escape(idea.kill_reason)}"</div>`) : ""}
          ${idea.status === "do_now" ? raw(`
            <div class="rtm-decide-card-actions">
              <button class="rtm-btn-promote" data-promote="${idea.id}">🚀 Promote</button>
            </div>
          `) : ""}
        </div>
      `;
    };

    // ===== VIEW · live =====
    const viewLive = () => {
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap">
          <h1>🚀 Live Projects</h1>
          <a href="#/decide" class="rtm-pill" style="background:var(--sage-soft);color:var(--good-fg);border-color:var(--sage)">+ New from Decision →</a>
        </div>
        <div id="live-wip"></div>
        <div class="rtm-live-controls" id="live-controls"></div>
        <div id="live-list" style="margin-top:var(--space-4)"></div>
      `;
      const renderAll = () => { renderLiveControls(); renderLiveList(); renderWipBanner(); };
      renderAll();
      const unsubs = [
        store.subscribe("projects", renderAll),
        store.subscribe("allActions", renderAll),
        store.subscribe("allMilestones", renderAll),
        store.subscribe("users", renderAll),
        store.subscribe("liveFilter", renderAll),
        store.subscribe("liveSort", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const activeProjects = () => (store.get("projects") || []).filter(p => p.status === "active");
    // closed OR killed — งานที่ปิดแล้วต้องมีทางเข้าถึงจาก UI (ไม่งั้นปิดแล้วหาย = ทีมไม่กล้าปิด)
    const closedProjects = () => (store.get("projects") || [])
      .filter(p => p.status === "closed" || p.status === "killed")
      .sort((a, b) => (toDate(b.closed_at)?.getTime() ?? 0) - (toDate(a.closed_at)?.getTime() ?? 0));

    const renderWipBanner = () => {
      const el = document.querySelector("#live-wip");
      if (!el) return;
      const n = activeProjects().length;
      el.innerHTML = n > 5 ? html`
        <div class="rtm-wip-banner">⚠ WIP ${n} projects (limit 5) — โฟกัสไม่พอ · ปิดของเก่าก่อนเปิดใหม่</div>
      ` : "";
    };

    const renderLiveControls = () => {
      const el = document.querySelector("#live-controls");
      if (!el) return;
      const f = store.get("liveFilter") || "all";
      const s = store.get("liveSort") || "due";
      const uid = store.get("auth").user?.uid;
      const all = activeProjects();
      const mineCount = all.filter(p => p.owner_lead_uid === uid || actionsOf(p.id).some(a => a.owner_uid === uid)).length;
      const blockerCount = all.filter(p => projectSummary(p.id).hasBlocker).length;
      const closedCount = closedProjects().length;
      el.innerHTML = html`
        <div class="rtm-filter-row" style="margin-bottom:0">
          <button class="rtm-pill ${f==='all'?'active':''}" data-lfilter="all">All · ${all.length}</button>
          <button class="rtm-pill ${f==='mine'?'active':''}" data-lfilter="mine">ของฉัน · ${mineCount}</button>
          <button class="rtm-pill ${f==='blocker'?'active':''}" data-lfilter="blocker">🚩 Blocker · ${blockerCount}</button>
          <button class="rtm-pill ${f==='closed'?'active':''}" data-lfilter="closed">🔒 Closed · ${closedCount}</button>
          <span style="margin-left:auto;display:flex;gap:var(--space-2);align-items:center">
            <span style="font-size:var(--text-sm);color:var(--ink-tertiary)">Sort:</span>
            <button class="rtm-pill ${s==='due'?'active':''}" data-lsort="due">Due soon</button>
            <button class="rtm-pill ${s==='recent'?'active':''}" data-lsort="recent">ล่าสุด</button>
          </span>
        </div>
      `;
      el.querySelectorAll("[data-lfilter]").forEach(b => b.addEventListener("click", () => store.set("liveFilter", b.dataset.lfilter)));
      el.querySelectorAll("[data-lsort]").forEach(b => b.addEventListener("click", () => store.set("liveSort", b.dataset.lsort)));
    };

    const renderLiveList = () => {
      const el = document.querySelector("#live-list");
      if (!el) return;
      const uid = store.get("auth").user?.uid;
      const f = store.get("liveFilter") || "all";
      const s = store.get("liveSort") || "due";

      // Closed lane — งานที่ปิดแล้ว + verdict badge (fix: ปิดแล้วเคยหายจาก UI)
      if (f === "closed") {
        const closed = closedProjects();
        if (closed.length === 0) {
          el.innerHTML = html`<div class="rtm-empty">ยังไม่มี project ปิด · ปิดงานแรกจาก card แล้วจะมาอยู่ที่นี่พร้อม verdict</div>`;
          return;
        }
        el.innerHTML = html`<div class="rtm-live-grid">${closed.map(renderClosedCard)}</div>`;
        el.querySelectorAll("[data-open-project]").forEach(card =>
          card.addEventListener("click", () => go("/live/" + card.dataset.openProject)));
        return;
      }

      let list = activeProjects();
      if (f === "mine") list = list.filter(p => p.owner_lead_uid === uid || actionsOf(p.id).some(a => a.owner_uid === uid));
      if (f === "blocker") list = list.filter(p => projectSummary(p.id).hasBlocker);

      list = list.map(p => ({ p, sum: projectSummary(p.id) }));
      if (s === "due") {
        list.sort((a, b) =>
          (toDate(a.sum.nextAction?.due_date)?.getTime() ?? Infinity) -
          (toDate(b.sum.nextAction?.due_date)?.getTime() ?? Infinity));
      } else {
        list.sort((a, b) => (toDate(b.p.created_at)?.getTime() ?? 0) - (toDate(a.p.created_at)?.getTime() ?? 0));
      }

      if (list.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">${f === "all"
          ? "ยังไม่มี project กำลังทำ · ไปที่ Decision Board เลือก 'Do Now'"
          : "ไม่มี project ในตัวกรองนี้"}</div>`;
        return;
      }
      el.innerHTML = html`<div class="rtm-live-grid">${list.map(({ p, sum }) => renderProjectCard(p, sum))}</div>`;
      el.querySelectorAll("[data-open-project]").forEach(card =>
        card.addEventListener("click", () => go("/live/" + card.dataset.openProject)));
    };

    const renderProjectCard = (p, sum) => {
      const lead = userByUid(p.owner_lead_uid);
      const border = sum.hasBlocker ? "var(--terracotta)" : sum.stalled ? "var(--peach)" : "var(--sage)";
      const milBar = sum.mils.map(m => {
        const acts = actionsOf(p.id, m.id);
        const st = acts.some(a => a.blocker_flag) ? "blocker" : milestoneDisplayStatus(acts);
        return `<span class="rtm-mil-chip" title="${escape(m.title)}">${MILESTONE_ICON[st]} ${escape(m.title)}</span>`;
      }).join("");
      const na = sum.nextAction;
      let nextLine = "";
      if (na) {
        const d = daysUntil(na.due_date);
        const owner = userByUid(na.owner_uid);
        const dueTxt = na.due_date ? (d < 0 ? `เลย ${Math.abs(d)} วัน` : d === 0 ? "วันนี้" : `${d} วัน`) : "ไม่ตั้ง due";
        const overdue = na.due_date && d < 0;
        nextLine = `<div class="rtm-card-next">Next: <b>${escape(na.title)}</b> · ${escape(owner?.short_code || "?")} · ${fmtDate(na.due_date)} <span style="color:${overdue ? "var(--danger-fg)" : "var(--ink-tertiary)"}">(${escape(dueTxt)})</span></div>`;
      }
      const badges = [];
      if (sum.hasBlocker) badges.push(`<span class="rtm-badge rtm-badge-blocker">🚩 blocker</span>`);
      if (sum.stalled) badges.push(`<span class="rtm-badge rtm-badge-stalled">⏱ stalled ${sum.stalledDays} วัน</span>`);
      return html`
        <div class="rtm-project-card" data-open-project="${p.id}" style="border-left-color:${escape(border)}">
          <div class="rtm-card-top">
            <div class="rtm-card-title">${p.title}</div>
            <div class="rtm-avatar-sm" style="background:${escape(lead?.color || "#4A4741")}" title="${escape(lead?.display_name || "lead")}">${escape(lead?.short_code || "?")}</div>
          </div>
          ${badges.length ? raw(`<div class="rtm-card-badges">${badges.join("")}</div>`) : ""}
          <div class="rtm-card-kpi">🎯 ${p.kpi_text}</div>
          <div class="rtm-card-meta">
            <span>${raw(DELIVERABLE_LABELS[p.deliverable_type] || escape(p.deliverable_type || "—"))}</span>
            ${p.impact_projected_value != null ? raw(`<span>· ${escape(p.impact_projected_value)} ${escape(p.impact_projected_unit || "")} (projected)</span>`) : ""}
          </div>
          <div class="rtm-mil-bar">${raw(milBar)}</div>
          ${raw(nextLine)}
          <div class="rtm-card-foot">${sum.done}/${sum.total} actions done</div>
        </div>
      `;
    };

    const renderClosedCard = (p) => {
      const lead = userByUid(p.owner_lead_uid);
      const v = computeVerdict(p);
      const border = v.code === "win" ? "var(--sage)" : v.code === "partial" ? "var(--peach)" : "var(--terracotta)";
      const actual = p.impact_actual_value != null
        ? `<b>${escape(p.impact_actual_value)} ${escape(p.impact_actual_unit || "")}</b>`
        : "—";
      const proj = p.impact_projected_value != null
        ? `<span style="color:var(--ink-tertiary)">/ เป้า ${escape(p.impact_projected_value)} ${escape(p.impact_projected_unit || "")}</span>`
        : "";
      return html`
        <div class="rtm-project-card rtm-card-closed" data-open-project="${p.id}" style="border-left-color:${escape(border)}">
          <div class="rtm-card-top">
            <div class="rtm-card-title">${p.title}</div>
            <div class="rtm-avatar-sm" style="background:${escape(lead?.color || "#4A4741")}" title="${escape(lead?.display_name || "lead")}">${escape(lead?.short_code || "?")}</div>
          </div>
          <div class="rtm-card-badges">${raw(verdictBadge(p, "sm"))}</div>
          <div class="rtm-card-kpi">🎯 ${p.kpi_text}</div>
          <div class="rtm-card-meta">${raw(actual)} ${raw(proj)}</div>
          <div class="rtm-card-foot">🔒 ปิด ${fmtDate(p.closed_at)}${p.lesson_learned ? " · 💡 มี lesson" : ""}</div>
        </div>
      `;
    };

    // ===== VIEW · project =====
    const uiProject = { open: {}, addingAction: null, addingMilestone: false, addingResource: false,
      editingAction: null, editingMilestone: null, editingResource: null };

    const viewProject = (params) => {
      const pid = params.id;
      store.set("currentProject", pid);
      uiProject.addingAction = null;
      uiProject.addingMilestone = false;
      uiProject.addingResource = false;
      uiProject.editingAction = null;
      uiProject.editingMilestone = null;
      uiProject.editingResource = null;
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`<div id="project-root"></div>`;
      const renderAll = () => renderProject(pid);
      renderAll();
      const unsubs = [
        store.subscribe("projects", renderAll),
        store.subscribe("allMilestones", renderAll),
        store.subscribe("allActions", renderAll),
        store.subscribe("allCheckins", renderAll),   // Step 10: evidence trail อ่าน check-in artifact
        store.subscribe("users", renderAll),
      ];
      return () => { unsubs.forEach(u => u()); store.set("currentProject", null); };
    };

    const renderProject = (pid) => {
      const root = document.querySelector("#project-root");
      if (!root) return;
      const p = (store.get("projects") || []).find(x => x.id === pid);
      if (!p) {
        // projects may still be loading
        const loaded = (store.get("projects") || []).length > 0;
        root.innerHTML = loaded
          ? html`<div class="rtm-empty">ไม่พบ project นี้ · <a href="#/live" style="color:var(--good-fg)">กลับ Live</a></div>`
          : html`<div style="color:var(--ink-tertiary)">loading...</div>`;
        return;
      }
      const lead = userByUid(p.owner_lead_uid);
      const sum = projectSummary(p.id);
      const closed = p.status === "closed";

      root.innerHTML = html`
        <div class="rtm-proj-breadcrumb">
          <a href="#/live">🚀 Live</a> › <span>${p.title}</span>
        </div>
        <div class="rtm-proj-head">
          <h1 style="font-size:var(--text-2xl)">${p.title}</h1>
          <div style="display:flex;gap:var(--space-2)">
            ${closed
              ? raw(`${verdictBadge(p, "sm")}<span class="rtm-badge" style="background:var(--sage-soft);color:var(--good-fg)">🔒 ปิดแล้ว</span>
                     <button class="btn-secondary" id="btn-edit-closed" style="padding:8px 14px" title="แก้ตัวเลข/result/lesson โดยไม่เปิดใหม่">✏️ แก้</button>
                     <button class="btn-secondary" id="btn-reopen-project" style="padding:8px 14px" title="กดปิดผิด? เปิดกลับมาแก้ทั้งหมด">↩️ เปิดใหม่</button>`)
              : raw(`<button class="btn-secondary" id="btn-edit-project" style="padding:8px 14px">✏️ Edit</button>
                     <button class="btn-primary" id="btn-close-project" style="padding:8px 14px">🔒 Close</button>`)}
          </div>
        </div>

        <div class="rtm-proj-framework">
          <div><span class="rtm-fw-key">WHY</span> ${p.why ? escape(p.why) : raw('<span style="color:var(--ink-tertiary)">— ไม่ระบุ —</span>')}</div>
          <div><span class="rtm-fw-key">WHAT</span> ${raw(DELIVERABLE_LABELS[p.deliverable_type] || escape(p.deliverable_type))}</div>
          <div><span class="rtm-fw-key">KPI</span> ${p.kpi_text}</div>
          <div><span class="rtm-fw-key">WHO</span> <span class="rtm-avatar-sm" style="background:${escape(lead?.color || "#4A4741")};display:inline-flex;vertical-align:middle">${escape(lead?.short_code || "?")}</span> ${escape(lead?.display_name || "—")} lead</div>
        </div>

        <div class="rtm-proj-impact">
          <div><span class="rtm-fw-key">Projected</span> ${p.impact_projected_value != null ? raw(`${escape(p.impact_projected_value)} ${escape(p.impact_projected_unit || "")}`) : "—"}</div>
          <div><span class="rtm-fw-key">Actual</span> ${p.impact_actual_value != null
            ? raw(`<b style="color:${(p.impact_actual_value >= (p.impact_projected_value ?? 0)) ? "var(--good-fg)" : "var(--warn-fg)"}">${escape(p.impact_actual_value)} ${escape(p.impact_actual_unit || "")}</b>${p.impact_verified_by_uid ? ` · verified by ${escape(userByUid(p.impact_verified_by_uid)?.short_code || "?")}` : ""}`)
            : raw('<span style="color:var(--ink-tertiary)">— (ยังไม่ปิด)</span>')}</div>
        </div>

        ${closed && p.result_text ? raw(`
          <div class="rtm-proj-result">
            <div class="rtm-proj-verdict">${verdictBadge(p, "lg")}</div>
            <div><b>Result:</b> ${escape(p.result_text)}</div>
            ${p.lesson_learned ? `<div style="margin-top:6px"><b>💡 Lesson:</b> ${escape(p.lesson_learned)}</div>` : ""}
            ${(p.lesson_tags||[]).length ? `<div style="margin-top:6px">${p.lesson_tags.map(t=>`<span class="rtm-tag-chip">${escape(t)}</span>`).join("")}</div>` : ""}
          </div>
        `) : ""}

        <div class="rtm-proj-mils-head">
          <h2>Milestones + Actions</h2>
          ${closed ? "" : raw(`<button class="rtm-btn-inline" id="btn-add-milestone">+ Milestone</button>`)}
        </div>
        <div id="mils-list"></div>
        <div id="add-mil-form"></div>
        <div id="evidence-root"></div>
      `;

      document.querySelector("#btn-close-project")?.addEventListener("click", () => store.set("modal", { name: "close-project", projectId: p.id }));
      document.querySelector("#btn-edit-project")?.addEventListener("click", () => store.set("modal", { name: "edit-project", projectId: p.id }));
      document.querySelector("#btn-edit-closed")?.addEventListener("click", () => store.set("modal", { name: "edit-closed", projectId: p.id }));
      document.querySelector("#btn-reopen-project")?.addEventListener("click", async () => {
        if (!await confirmModal({ title: `เปิด "${p.title}" กลับมาแก้?`, body: "result + impact + verdict + lesson ที่บันทึกตอนปิดจะถูกล้าง\nproject กลับไปอยู่ Live (active) · ปิดใหม่ได้", okLabel: "เปิดใหม่", danger: true })) return;
        const btn = document.querySelector("#btn-reopen-project");
        if (btn) btn.disabled = true;
        try { await reopenProject(p); toastOk("เปิด project กลับมาแก้แล้ว"); } catch (e) { toastErr("เปิดใหม่ไม่สำเร็จ", e); if (btn) btn.disabled = false; }
      });
      document.querySelector("#btn-add-milestone")?.addEventListener("click", () => { uiProject.addingMilestone = true; renderProject(pid); });

      renderMilestones(p, sum, closed);
      renderAddMilestoneForm(p, pid);
      renderEvidence(p, closed);
    };

    const renderMilestones = (p, sum, closed) => {
      const el = document.querySelector("#mils-list");
      if (!el) return;
      if (sum.mils.length === 0) {
        el.innerHTML = html`<div class="rtm-empty" style="padding:var(--space-5)">ยังไม่มี milestone · เพิ่มด้านบน</div>`;
        return;
      }
      el.innerHTML = html`${sum.mils.map(m => renderMilestoneBlock(p, m, closed))}`;
      wireMilestoneEvents(p, closed);
    };

    const renderMilestoneBlock = (p, m, closed) => {
      const acts = actionsOf(p.id, m.id).sort((a, b) =>
        (toDate(a.due_date)?.getTime() ?? Infinity) - (toDate(b.due_date)?.getTime() ?? Infinity));
      const st = acts.some(a => a.blocker_flag) ? "blocker" : milestoneDisplayStatus(acts);
      const doneCount = acts.filter(a => a.status === "done").length;
      const isOpen = uiProject.open[m.id] ?? (st !== "done");
      const editing = !closed && uiProject.editingMilestone === m.id;
      return html`
        <div class="rtm-mil-block">
          ${editing ? raw(renderEditMilestoneForm(m)) : raw(`
            <div class="rtm-mil-header" data-toggle-mil="${m.id}">
              <span class="rtm-mil-caret">${isOpen ? "▾" : "▸"}</span>
              <span class="rtm-mil-icon">${MILESTONE_ICON[st]}</span>
              <span class="rtm-mil-name">${escape(m.title)}</span>
              <span class="rtm-mil-sub">${doneCount}/${acts.length} · ${m.target_date ? "🎯 " + fmtDate(m.target_date) : "ไม่ตั้งวันที่"}</span>
              ${closed ? "" : `<button class="rtm-icon-btn" data-edit-mil="${m.id}" title="แก้ milestone">✏️</button>
                               <button class="rtm-icon-btn" data-del-mil="${m.id}" title="ลบ milestone">🗑</button>`}
            </div>
          `)}
          ${(isOpen && !editing) ? raw(renderActionRows(p, m, acts, closed)) : ""}
        </div>
      `;
    };

    const renderEditMilestoneForm = (m) => `
      <div class="rtm-add-action-form" data-mil-edit="${m.id}">
        <input type="text" id="me-title" value="${escape(m.title)}" maxlength="80" placeholder="ชื่อ milestone..." />
        <input type="date" id="me-due" value="${escape(dateInputVal(m.target_date))}" />
        <button class="rtm-btn-promote" id="me-save" data-mil="${m.id}">บันทึก</button>
        <button class="rtm-icon-btn" id="me-cancel">✕</button>
      </div>`;

    const renderActionRows = (p, m, acts, closed) => {
      const rows = acts.map(a => {
        if (!closed && uiProject.editingAction === a.id) return renderEditActionForm(a);
        const owner = userByUid(a.owner_uid);
        const stalled = isStalled(a);
        const d = daysUntil(a.due_date);
        const overdue = a.due_date && d < 0 && a.status !== "done";
        const box = a.status === "done" ? "☑" : a.status === "doing" ? "◐" : "☐";
        const dueTxt = a.due_date ? fmtDate(a.due_date) : "—";
        return `
          <div class="rtm-action-row ${a.status === "done" ? "done" : ""}">
            <button class="rtm-action-check" data-cycle="${a.id}" data-mil="${m.id}" ${closed ? "disabled" : ""} title="เปลี่ยนสถานะ">${box}</button>
            <span class="rtm-action-title">${escape(a.title)}
              ${a.blocker_flag ? `<span class="rtm-badge rtm-badge-blocker">🚩</span>${a.blocker_note ? ` <span class="rtm-blocker-note">${escape(a.blocker_note)}</span>` : ""}` : ""}
              ${stalled ? `<span class="rtm-badge rtm-badge-stalled">⏱ stalled</span>` : ""}
            </span>
            <span class="rtm-avatar-sm" style="background:${escape(owner?.color || "#4A4741")};width:18px;height:18px;font-size:10px" title="${escape(owner?.display_name || "?")}">${escape(owner?.short_code || "?")}</span>
            <span class="rtm-action-due" style="color:${overdue ? "var(--danger-fg)" : "var(--ink-tertiary)"}">${dueTxt}</span>
            ${closed ? "" : `<button class="rtm-icon-btn" data-edit-action="${a.id}" title="แก้ action">✏️</button>`}
            ${closed ? "" : `<button class="rtm-icon-btn" data-block="${a.id}" title="Blocker">${a.blocker_flag ? "🚩" : "⚐"}</button>`}
            ${closed ? "" : `<button class="rtm-icon-btn" data-del-action="${a.id}" data-mil="${m.id}" title="ลบ">🗑</button>`}
          </div>`;
      }).join("");
      const addForm = (!closed && uiProject.addingAction === m.id)
        ? renderAddActionForm(p, m)
        : (closed ? "" : `<button class="rtm-add-action-btn" data-add-action="${m.id}">+ Add action</button>`);
      return `<div class="rtm-action-list">${rows}${addForm}</div>`;
    };

    const renderEditActionForm = (a) => {
      const users = store.get("users") || [];
      return `
        <div class="rtm-add-action-form" data-act-edit="${a.id}">
          <input type="text" id="ae-title" value="${escape(a.title)}" maxlength="140" placeholder="ทำอะไร..." />
          <select id="ae-owner">
            ${users.map(u => `<option value="${escape(u.uid)}" ${u.uid === a.owner_uid ? "selected" : ""}>${escape(u.short_code || u.display_name)}</option>`).join("")}
          </select>
          <input type="date" id="ae-due" value="${escape(dateInputVal(a.due_date))}" />
          <button class="rtm-btn-promote" id="ae-save" data-act="${a.id}">บันทึก</button>
          <button class="rtm-icon-btn" id="ae-cancel">✕</button>
          <div class="rtm-form-error" id="ae-err" style="flex-basis:100%">ต้องมี title + owner</div>
        </div>`;
    };

    const renderAddActionForm = (p, m) => {
      const users = store.get("users") || [];
      return `
        <div class="rtm-add-action-form">
          <input type="text" id="aa-title" placeholder="ทำอะไร..." maxlength="140" />
          <select id="aa-owner">
            <option value="">owner</option>
            ${users.map(u => `<option value="${escape(u.uid)}">${escape(u.short_code || u.display_name)}</option>`).join("")}
          </select>
          <input type="date" id="aa-due" />
          <button class="rtm-btn-promote" id="aa-save" data-mil="${m.id}">Add</button>
          <button class="rtm-icon-btn" id="aa-cancel">✕</button>
          <div class="rtm-form-error" id="aa-err" style="flex-basis:100%">กรอก title + owner</div>
          <div class="rtm-form-hint" id="aa-warn" style="flex-basis:100%;display:none;color:var(--warn-fg)">⚠ due เกิน 7 วัน — แตกเป็น 2 action ดีกว่า</div>
        </div>`;
    };

    const wireMilestoneEvents = (p, closed) => {
      document.querySelectorAll("[data-toggle-mil]").forEach(h => h.addEventListener("click", () => {
        const id = h.dataset.toggleMil;
        const acts = actionsOf(p.id, id);
        const cur = uiProject.open[id] ?? (milestoneDisplayStatus(acts) !== "done");
        uiProject.open[id] = !cur;
        renderProject(p.id);
      }));
      if (closed) return;

      document.querySelectorAll("[data-cycle]").forEach(b => b.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = b.dataset.cycle, mil = b.dataset.mil;
        const a = actionsOf(p.id).find(x => x.id === id);
        const next = a.status === "todo" ? "doing" : a.status === "doing" ? "done" : "todo";
        b.disabled = true;
        try { await setActionStatus(p.id, id, mil, next); }
        catch (err) { toastErr("อัพเดตไม่สำเร็จ", err); b.disabled = false; }
      }));

      document.querySelectorAll("[data-block]").forEach(b => b.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = b.dataset.block;
        const a = actionsOf(p.id).find(x => x.id === id);
        let note = a.blocker_note;
        if (!a.blocker_flag) { note = await promptModal({ title: "Blocker คืออะไร?", body: "ไม่บังคับ · ปล่อยว่างได้", placeholder: "อธิบายสั้นๆ", optional: true }) || null; }
        try { await toggleActionBlocker(p.id, id, !a.blocker_flag, note); }
        catch (err) { toastErr("อัพเดต blocker ไม่สำเร็จ", err); }
      }));

      document.querySelectorAll("[data-del-action]").forEach(b => b.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = b.dataset.delAction, mil = b.dataset.mil;
        const a = actionsOf(p.id).find(x => x.id === id);
        if (!await confirmModal({ title: `ลบ action "${a?.title || ""}" ?`, okLabel: "ลบ", danger: true })) return;
        try { await deleteAction(p.id, id, mil); toastOk("ลบ action แล้ว"); }
        catch (err) { toastErr("ลบไม่สำเร็จ", err); }
      }));

      document.querySelectorAll("[data-add-action]").forEach(b => b.addEventListener("click", (e) => {
        e.stopPropagation();
        uiProject.addingAction = b.dataset.addAction;
        renderProject(p.id);
        document.querySelector("#aa-title")?.focus();
      }));

      // Milestone edit / delete (Step 10.1)
      document.querySelectorAll("[data-edit-mil]").forEach(b => b.addEventListener("click", (e) => {
        e.stopPropagation();
        uiProject.editingMilestone = b.dataset.editMil;
        renderProject(p.id);
        document.querySelector("#me-title")?.focus();
      }));
      document.querySelectorAll("[data-del-mil]").forEach(b => b.addEventListener("click", async (e) => {
        e.stopPropagation();
        const id = b.dataset.delMil;
        const mm = milestonesOf(p.id).find(x => x.id === id);
        const n = actionsOf(p.id, id).length;
        if (n > 0) { toast(`milestone "${mm?.title || ""}" มี ${n} action — ลบ/ย้าย action ออกก่อน`, "warn"); return; }
        if (!await confirmModal({ title: `ลบ milestone "${mm?.title || ""}" ?`, okLabel: "ลบ", danger: true })) return;
        try { await deleteMilestone(p.id, id); toastOk("ลบ milestone แล้ว"); }
        catch (err) { toastErr("ลบไม่สำเร็จ", err); }
      }));
      const meSave = document.querySelector("#me-save");
      if (meSave) {
        const doSave = async () => {
          const title = document.querySelector("#me-title").value.trim();
          const due = document.querySelector("#me-due").value;
          if (!title) return;
          meSave.disabled = true;
          try { await updateMilestone(p.id, meSave.dataset.mil, { title, target_date: due || null }); uiProject.editingMilestone = null; renderProject(p.id); }
          catch (err) { toastErr("บันทึกไม่สำเร็จ", err); meSave.disabled = false; }
        };
        meSave.addEventListener("click", doSave);
        document.querySelector("#me-cancel")?.addEventListener("click", () => { uiProject.editingMilestone = null; renderProject(p.id); });
        document.querySelector("#me-title")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doSave(); if (e.key === "Escape") { uiProject.editingMilestone = null; renderProject(p.id); } });
      }

      // Action edit (Step 10.1 · แก้ในที่ · กัน ref กำพร้า)
      document.querySelectorAll("[data-edit-action]").forEach(b => b.addEventListener("click", (e) => {
        e.stopPropagation();
        uiProject.editingAction = b.dataset.editAction;
        renderProject(p.id);
        document.querySelector("#ae-title")?.focus();
      }));
      const aeSave = document.querySelector("#ae-save");
      if (aeSave) {
        const doSave = async () => {
          const title = document.querySelector("#ae-title").value.trim();
          const owner = document.querySelector("#ae-owner").value;
          const due = document.querySelector("#ae-due").value;
          if (!title || !owner) { document.querySelector("#ae-err").classList.add("show"); return; }
          aeSave.disabled = true;
          try { await updateAction(p.id, aeSave.dataset.act, { title, owner_uid: owner, due_date: due || null }); uiProject.editingAction = null; renderProject(p.id); }
          catch (err) { toastErr("บันทึกไม่สำเร็จ", err); aeSave.disabled = false; }
        };
        aeSave.addEventListener("click", doSave);
        document.querySelector("#ae-cancel")?.addEventListener("click", () => { uiProject.editingAction = null; renderProject(p.id); });
        document.querySelector("#ae-title")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doSave(); if (e.key === "Escape") { uiProject.editingAction = null; renderProject(p.id); } });
      }

      wireAddActionForm(p);
    };

    const wireAddActionForm = (p) => {
      const save = document.querySelector("#aa-save");
      if (!save) return;
      const titleEl = document.querySelector("#aa-title");
      const dueEl = document.querySelector("#aa-due");
      const warnEl = document.querySelector("#aa-warn");
      const checkWarn = () => {
        const d = dueEl.value ? Math.ceil((new Date(dueEl.value).getTime() - Date.now()) / 86400000) : 0;
        warnEl.style.display = d > 7 ? "block" : "none";
      };
      dueEl?.addEventListener("change", checkWarn);
      document.querySelector("#aa-cancel")?.addEventListener("click", () => { uiProject.addingAction = null; renderProject(p.id); });
      const doAdd = async () => {
        const title = titleEl.value.trim();
        const owner = document.querySelector("#aa-owner").value;
        const due = dueEl.value;
        const mil = save.dataset.mil;
        if (!title || !owner) { document.querySelector("#aa-err").classList.add("show"); return; }
        save.disabled = true;
        try {
          await addAction(p.id, { milestone_id: mil, title, owner_uid: owner, due_date: due || null, output_text: "" });
          // keep form open for rapid entry
          renderProject(p.id);
          document.querySelector("#aa-title")?.focus();
        } catch (err) { toastErr("เพิ่ม action ไม่สำเร็จ", err); save.disabled = false; }
      };
      save.addEventListener("click", doAdd);
      titleEl?.addEventListener("keydown", (e) => { if (e.key === "Enter") doAdd(); if (e.key === "Escape") { uiProject.addingAction = null; renderProject(p.id); } });
    };

    const renderAddMilestoneForm = (p, pid) => {
      const el = document.querySelector("#add-mil-form");
      if (!el) return;
      if (!uiProject.addingMilestone) { el.innerHTML = ""; return; }
      el.innerHTML = html`
        <div class="rtm-add-action-form" style="margin-top:var(--space-3)">
          <input type="text" id="am-title" placeholder="ชื่อ milestone..." maxlength="80" />
          <input type="date" id="am-due" />
          <button class="rtm-btn-promote" id="am-save">Add</button>
          <button class="rtm-icon-btn" id="am-cancel">✕</button>
        </div>
      `;
      document.querySelector("#am-title")?.focus();
      const doAdd = async () => {
        const title = document.querySelector("#am-title").value.trim();
        const due = document.querySelector("#am-due").value;
        if (!title) return;
        const btn = document.querySelector("#am-save");
        btn.disabled = true;
        try { await addMilestone(pid, { title, target_date: due || null }); uiProject.addingMilestone = false; renderProject(pid); }
        catch (err) { toastErr("เพิ่ม milestone ไม่สำเร็จ", err); btn.disabled = false; }
      };
      document.querySelector("#am-save")?.addEventListener("click", doAdd);
      document.querySelector("#am-cancel")?.addEventListener("click", () => { uiProject.addingMilestone = false; renderProject(pid); });
      document.querySelector("#am-title")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doAdd(); if (e.key === "Escape") { uiProject.addingMilestone = false; renderProject(pid); } });
    };

    // ===== VIEW · project · evidence (Step 10) =====
    const EV_META = {
      checkin: { icon: "📅", label: "Check-in artifact" },
      action:  { icon: "✅", label: "Action output" },
      result:  { icon: "🏁", label: "Close result" },
    };
    // escape ก่อน แล้วค่อยทำ URL เป็นลิงก์ (กัน HTML injection)
    const linkify = (s) => escape(s).replace(/(https?:\/\/[^\s]+)/g,
      u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);

    const renderEvidence = (p, closed) => {
      const el = document.querySelector("#evidence-root");
      if (!el) return;
      const res = projectResources(p);
      const ev = projectEvidence(p.id);

      const resItems = res.length
        ? res.map((r, i) => {
            if (!closed && uiProject.editingResource === i) {
              return `
                <div class="rtm-add-action-form" style="margin-top:var(--space-2)" data-res-edit="${i}">
                  <input type="text" id="re-label" value="${escape(r.label)}" maxlength="120" placeholder="ชื่อ/คำอธิบาย (บังคับ)" />
                  <input type="text" id="re-url" value="${escape(r.url || "")}" placeholder="https://... (ถ้ามี)" />
                  <button class="rtm-btn-promote" id="re-save" data-idx="${i}">บันทึก</button>
                  <button class="rtm-icon-btn" id="re-cancel">✕</button>
                  <div class="rtm-form-error" id="re-err" style="flex-basis:100%">ต้องมีชื่อ · ถ้ากรอก URL ต้องขึ้นด้วย http(s)://</div>
                </div>`;
            }
            return `
            <div class="rtm-res-item">
              <span class="rtm-res-link">${r.url
                ? `<a href="${escape(r.url)}" target="_blank" rel="noopener"><span class="rtm-res-label">${escape(r.label)}</span> ↗</a>`
                : `<span class="rtm-res-label">${escape(r.label)}</span>`}</span>
              <span class="rtm-res-meta">${escape(userByUid(r.added_by)?.short_code || "?")} · ${fmtDate(r.added_at)}</span>
              ${closed ? "" : `<button class="rtm-icon-btn" data-edit-res="${i}" title="แก้ลิงก์">✏️</button>`}
              ${closed ? "" : `<button class="rtm-icon-btn" data-del-res="${i}" title="ลบลิงก์">🗑</button>`}
            </div>`;
          }).join("")
        : `<div style="font-size:var(--text-sm);color:var(--ink-tertiary)">ยังไม่มีลิงก์ที่เพิ่มเอง</div>`;

      const addForm = closed ? "" : (uiProject.addingResource
        ? `<div class="rtm-add-action-form" style="margin-top:var(--space-2)">
             <input type="text" id="ar-label" placeholder="ชื่อ/คำอธิบาย (บังคับ)" maxlength="120" />
             <input type="text" id="ar-url" placeholder="https://... (วางลิงก์ · ถ้ามี)" />
             <button class="rtm-btn-promote" id="ar-save">Add</button>
             <button class="rtm-icon-btn" id="ar-cancel">✕</button>
             <div class="rtm-form-error" id="ar-err" style="flex-basis:100%">ต้องมีชื่อ · ถ้ากรอก URL ต้องขึ้นด้วย http(s)://</div>
           </div>`
        : `<button class="rtm-add-action-btn" id="btn-add-res">+ เพิ่มลิงก์ (paste URL)</button>`);

      const evItems = ev.length
        ? ev.map(e => {
            const meta = EV_META[e.kind];
            const who = e.by ? escape(userByUid(e.by)?.short_code || "?") : "—";
            return `
              <div class="rtm-ev-item">
                <span class="rtm-ev-icon">${meta.icon}</span>
                <div class="rtm-ev-body">
                  <div class="rtm-ev-kind">${escape(meta.label)}${e.title ? " · " + escape(e.title) : ""}${e.week ? " · " + escape(e.week) : ""}</div>
                  <div class="rtm-ev-text">${linkify(e.text)}</div>
                </div>
                <span class="rtm-ev-when">${who} · ${fmtDate(e.at)}</span>
              </div>`;
          }).join("")
        : `<div style="font-size:var(--text-sm);color:var(--ink-tertiary)">ยังไม่มีหลักฐาน — check-in artifact / action output / result ตอนปิด จะโผล่ที่นี่อัตโนมัติ</div>`;

      el.innerHTML = html`
        <div class="rtm-evidence-section">
          <h2>📎 Resources / Evidence</h2>
          <div class="rtm-ev-sub">ใบเสร็จของ verdict — หลักฐานของ project นี้กองที่เดียว กลับมาดูได้</div>
          <div class="rtm-res-box">
            <div class="rtm-ev-kind" style="margin-bottom:6px">🔗 ลิงก์ที่เพิ่มเอง (${res.length})</div>
            ${raw(resItems)}
            ${raw(addForm)}
          </div>
          <div class="rtm-ev-box">
            <div class="rtm-ev-kind" style="margin-bottom:6px">🧾 Evidence trail (${ev.length}) · auto จาก check-in + action + close</div>
            ${raw(evItems)}
          </div>
        </div>
      `;
      wireEvidence(p);
    };

    const wireEvidence = (p) => {
      document.querySelector("#btn-add-res")?.addEventListener("click", () => {
        uiProject.addingResource = true; renderProject(p.id); document.querySelector("#ar-label")?.focus();
      });
      document.querySelector("#ar-cancel")?.addEventListener("click", () => { uiProject.addingResource = false; renderProject(p.id); });
      const save = document.querySelector("#ar-save");
      if (save) {
        const labelEl = document.querySelector("#ar-label");
        const urlEl = document.querySelector("#ar-url");
        const doAdd = async () => {
          const label = labelEl.value.trim();
          const url = urlEl.value.trim();
          const err = document.querySelector("#ar-err");
          if (!label || (url && !/^https?:\/\//i.test(url))) { err.classList.add("show"); return; }
          save.disabled = true;
          try { await addResource(p.id, { label, url }); uiProject.addingResource = false; renderProject(p.id); }
          catch (e) { toastErr("เพิ่มลิงก์ไม่สำเร็จ", e); save.disabled = false; }
        };
        save.addEventListener("click", doAdd);
        const keyer = (e) => { if (e.key === "Enter") doAdd(); if (e.key === "Escape") { uiProject.addingResource = false; renderProject(p.id); } };
        labelEl?.addEventListener("keydown", keyer);
        urlEl?.addEventListener("keydown", keyer);
      }
      document.querySelectorAll("[data-del-res]").forEach(b => b.addEventListener("click", async () => {
        const idx = parseInt(b.dataset.delRes, 10);
        const r = projectResources(p)[idx];
        if (!await confirmModal({ title: `ลบลิงก์ "${r?.label || ""}" ?`, okLabel: "ลบ", danger: true })) return;
        try { await removeResource(p.id, idx); toastOk("ลบลิงก์แล้ว"); }
        catch (e) { toastErr("ลบไม่สำเร็จ", e); }
      }));
      // Resource edit (Step 10.1)
      document.querySelectorAll("[data-edit-res]").forEach(b => b.addEventListener("click", () => {
        uiProject.editingResource = parseInt(b.dataset.editRes, 10); renderProject(p.id); document.querySelector("#re-label")?.focus();
      }));
      const reSave = document.querySelector("#re-save");
      if (reSave) {
        const doSave = async () => {
          const label = document.querySelector("#re-label").value.trim();
          const url = document.querySelector("#re-url").value.trim();
          const err = document.querySelector("#re-err");
          if (!label || (url && !/^https?:\/\//i.test(url))) { err.classList.add("show"); return; }
          reSave.disabled = true;
          try { await updateResource(p.id, parseInt(reSave.dataset.idx, 10), { label, url }); uiProject.editingResource = null; renderProject(p.id); }
          catch (e) { toastErr("บันทึกไม่สำเร็จ", e); reSave.disabled = false; }
        };
        reSave.addEventListener("click", doSave);
        document.querySelector("#re-cancel")?.addEventListener("click", () => { uiProject.editingResource = null; renderProject(p.id); });
      }
    };

    // ===== DATA · checkins =====
    const myUid = () => (store.get("auth").user || {}).uid;
    const draftKey = (uid, week) => `rtmhub:checkin_draft:${uid}:${week}`;
    const loadDraft = (uid, week) => { try { return JSON.parse(localStorage.getItem(draftKey(uid, week)) || "null"); } catch (e) { return null; } };
    const saveDraft = (uid, week, data) => { try { localStorage.setItem(draftKey(uid, week), JSON.stringify(data)); } catch (e) {} };
    const clearDraft = (uid, week) => { try { localStorage.removeItem(draftKey(uid, week)); } catch (e) {} };

    const subscribeMyCheckin = (uid, week) =>
      onSnapshot(doc(db, "users", uid, "checkins", week), snap =>
        store.set("myCheckin", snap.exists() ? { id: snap.id, ...snap.data() } : null), fsErr("check-in"));

    // collectionGroup: ทุก check-in ของทุกคน (Team Board อ่าน status รายสัปดาห์) — filter week ฝั่ง client
    // (ไม่ใส่ where → ไม่ต้อง setup collectionGroup index เพิ่ม · scale 4 users เล็กมาก)
    const subscribeAllCheckins = () =>
      onSnapshot(collectionGroup(db, "checkins"), snap => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, uid: d.ref.parent.parent.id, ...d.data() }));
        store.set("allCheckins", list);
      }, fsErr("check-ins"));
    const checkinFor = (uid, week) =>
      (store.get("allCheckins") || []).find(c => c.uid === uid && c.week_of === week) || null;

    // Artifact required (Non-Negotiable #3): link/screenshot = URL · text = 3+ non-empty lines
    const validateArtifact = (type, value) => {
      const v = (value || "").trim();
      if (!v) return false;
      if (type === "text") return v.split(/\n/).map(s => s.trim()).filter(Boolean).length >= 3;
      return /^(https?:\/\/|www\.)\S+/i.test(v);
    };

    const submitCheckin = async (uid, week, form) => {
      const all = store.get("allActions") || [];
      // Auto-effect (MASTER_SPEC §5): ticking an action closes it → milestone auto-close
      for (const aid of form.completed_action_ids) {
        const a = all.find(x => x.id === aid && x.owner_uid === uid);
        if (a && a.status !== "done") await setActionStatus(a.project_id, a.id, a.milestone_id, "done");
      }
      const projectIds = [...new Set(form.completed_action_ids
        .map(aid => all.find(x => x.id === aid)?.project_id).filter(Boolean))];
      await setDoc(doc(db, "users", uid, "checkins", week), {
        week_of: week,
        submitted_at: serverTimestamp(),
        completed_action_ids: form.completed_action_ids,
        artifact: { type: form.artifact_type, value: form.artifact_value.trim() },
        next_week_action_ids: form.next_week_action_ids,
        blocker_note: form.blocker_note ? form.blocker_note.trim() : null,
        project_ids: projectIds,
        tenant_id: TENANT_ID,
        dc_id: DC_ID,
      });
      clearDraft(uid, week);
    };

    // ===== VIEW · my =====
    const uiMy = { editing: false, type: "link" };

    const myWeekActions = (uid) => {
      const { sun } = weekBounds();
      return (store.get("allActions") || [])
        .filter(a => a.owner_uid === uid && a.status !== "done")
        .filter(a => {
          const due = toDate(a.due_date);
          if (!due) return a.status === "doing" || a.blocker_flag; // surface active no-due tasks
          return due.getTime() <= sun.getTime();                    // this week + overdue
        })
        .sort((a, b) => {
          const ba = a.blocker_flag ? 0 : 1, bb = b.blocker_flag ? 0 : 1;
          if (ba !== bb) return ba - bb;
          return (toDate(a.due_date)?.getTime() ?? Infinity) - (toDate(b.due_date)?.getTime() ?? Infinity);
        });
    };
    const myDoneThisWeek = (uid) =>
      (store.get("allActions") || []).filter(a =>
        a.owner_uid === uid && a.status === "done" && inThisWeek(a.done_at));

    const projTitle = (pid) => (store.get("projects") || []).find(p => p.id === pid)?.title || "—";

    const viewMy = () => {
      const uid = myUid();
      const week = isoWeekStr();
      uiMy.editing = false;
      const draft = loadDraft(uid, week);
      uiMy.type = draft?.artifact_type || "link";
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <div id="my-root">
          <div id="my-head"></div>
          <h2 class="rtm-my-h2">งานของฉันสัปดาห์นี้</h2>
          <div id="my-actions"></div>
          <div id="my-checkin"></div>
        </div>`;
      renderMyHead(uid, week);
      renderMyActions(uid);
      renderMyCheckin(uid, week);
      const unsubMs = subscribeMyCheckin(uid, week);
      const unsubs = [
        store.subscribe("allActions", () => { renderMyHead(uid, week); renderMyActions(uid); }),
        store.subscribe("myCheckin", () => { renderMyHead(uid, week); renderMyCheckin(uid, week); }),
        store.subscribe("users", () => renderMyActions(uid)),
        store.subscribe("projects", () => renderMyActions(uid)),
      ];
      return () => { unsubs.forEach(u => u()); if (unsubMs) unsubMs(); store.set("myCheckin", null); };
    };

    const renderMyHead = (uid, week) => {
      const el = document.querySelector("#my-head");
      if (!el) return;
      const ck = store.get("myCheckin");
      const day = new Date().getDay();                 // 0 Sun .. 5 Fri .. 6 Sat
      const isDue = day === 5 || day === 6 || day === 0; // Fri–Sun reminder window
      let banner;
      if (ck) {
        banner = `<div class="rtm-ck-banner good">✅ ส่ง check-in สัปดาห์นี้แล้ว · ${escape(fmtRelTime(ck.submitted_at))}</div>`;
      } else if (isDue) {
        banner = `<div class="rtm-ck-banner warn">⏰ ได้เวลา check-in — สรุปสัปดาห์นี้ก่อนศุกร์ 17:00 (เลื่อนลงไปกรอกด้านล่าง)</div>`;
      } else {
        banner = `<div class="rtm-ck-banner subtle">📅 Check-in ส่งได้ทุกเมื่อ · กำหนดส่งศุกร์ 17:00</div>`;
      }
      el.innerHTML = html`
        <div class="rtm-my-head">
          <h1 style="font-size:var(--text-2xl)">📅 My Week</h1>
          <span class="rtm-my-week">${weekLabel()} · ${week}</span>
        </div>
        ${raw(banner)}
      `;
    };

    const myActionRow = (a) => {
      const owner = userByUid(a.owner_uid);
      const stalled = isStalled(a);
      const d = daysUntil(a.due_date);
      const overdue = a.due_date && d != null && d < 0;
      const box = a.status === "doing" ? "◐" : "☐";
      const dueTxt = a.due_date ? (overdue ? `เกิน ${Math.abs(d)} วัน` : fmtDate(a.due_date)) : "—";
      return `
        <div class="rtm-action-row">
          <button class="rtm-action-check" data-my-cycle="${escape(a.id)}" data-proj="${escape(a.project_id)}" data-mil="${escape(a.milestone_id || "")}" title="เปลี่ยนสถานะ">${box}</button>
          <span class="rtm-action-title">${escape(a.title)}
            <a class="rtm-my-projlink" href="#/live/${escape(a.project_id)}">${escape(projTitle(a.project_id))}</a>
            ${a.blocker_flag ? `<span class="rtm-badge rtm-badge-blocker">🚩</span>${a.blocker_note ? ` <span class="rtm-blocker-note">${escape(a.blocker_note)}</span>` : ""}` : ""}
            ${stalled ? `<span class="rtm-badge rtm-badge-stalled">⏱ stalled</span>` : ""}
          </span>
          <span class="rtm-avatar-sm" style="background:${escape(owner?.color || "#4A4741")};width:18px;height:18px;font-size:10px" title="${escape(owner?.display_name || "?")}">${escape(owner?.short_code || "?")}</span>
          <span class="rtm-action-due" style="color:${overdue ? "var(--danger-fg)" : "var(--ink-tertiary)"}">${dueTxt}</span>
        </div>`;
    };

    const renderMyActions = (uid) => {
      const el = document.querySelector("#my-actions");
      if (!el) return;
      const acts = myWeekActions(uid);
      if (acts.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">สัปดาห์นี้ยังไม่มีงานของคุณ · รอ manager assign หรือดูโปรเจกต์ที่เกี่ยว</div>`;
        return;
      }
      el.innerHTML = html`<div class="rtm-my-actions">${raw(acts.map(myActionRow).join(""))}</div>`;
      el.querySelectorAll("[data-my-cycle]").forEach(b => b.addEventListener("click", async () => {
        const id = b.dataset.myCycle, pid = b.dataset.proj, mil = b.dataset.mil || null;
        const a = (store.get("allActions") || []).find(x => x.id === id);
        if (!a) return;
        const next = a.status === "todo" ? "doing" : a.status === "doing" ? "done" : "todo";
        b.disabled = true;
        try { await setActionStatus(pid, id, mil, next); }
        catch (err) { toastErr("อัพเดตไม่สำเร็จ", err); b.disabled = false; }
      }));
    };

    const renderMyCheckin = (uid, week) => {
      const el = document.querySelector("#my-checkin");
      if (!el) return;
      const ck = store.get("myCheckin");
      if (ck && !uiMy.editing) { renderCheckinSummary(el, ck); return; }
      renderCheckinForm(el, uid, week, ck);
    };

    const renderCheckinSummary = (el, ck) => {
      const done = (ck.completed_action_ids || []).length;
      const next = (ck.next_week_action_ids || []).length;
      const art = ck.artifact || {};
      const artView = art.type === "text"
        ? `<div class="rtm-ck-artifact-text">${escape(art.value || "")}</div>`
        : `<a href="${escape(art.value || "#")}" target="_blank" rel="noopener" class="rtm-my-projlink">${escape(art.value || "")}</a>`;
      el.innerHTML = html`
        <div class="rtm-checkin-card submitted">
          <div class="rtm-checkin-head">
            <h2>✅ Check-in สัปดาห์นี้</h2>
            <button class="btn-secondary" id="btn-ck-edit" style="padding:6px 14px">✏️ แก้ไข</button>
          </div>
          <div class="rtm-ck-sum">
            <div><b>เสร็จ:</b> ${done} action${done > 1 ? "s" : ""}</div>
            <div><b>Artifact:</b> ${raw(artView)}</div>
            <div><b>สัปดาห์หน้า:</b> ${next} action${next > 1 ? "s" : ""}</div>
            ${ck.blocker_note ? raw(`<div><b>🚩 Blocker:</b> ${escape(ck.blocker_note)}</div>`) : ""}
          </div>
        </div>
      `;
      el.querySelector("#btn-ck-edit")?.addEventListener("click", () => { uiMy.editing = true; renderMyCheckin(myUid(), isoWeekStr()); });
    };

    const renderCheckinForm = (el, uid, week, ck) => {
      const draft = loadDraft(uid, week) || {};
      const base = ck || {};
      const doneIds = new Set(draft.completed_action_ids || base.completed_action_ids ||
        myDoneThisWeek(uid).map(a => a.id));
      const nextIds = new Set(draft.next_week_action_ids || base.next_week_action_ids || []);
      const artType = uiMy.type;
      const artVal = draft.artifact_value ?? base.artifact?.value ?? "";
      const blockerVal = draft.blocker_note ?? base.blocker_note ?? "";

      // Q1 candidates = my open-this-week actions + done-this-week (dedupe)
      const cand = [...myWeekActions(uid), ...myDoneThisWeek(uid)];
      const seen = new Set(); const q1 = [];
      for (const a of cand) { if (!seen.has(a.id)) { seen.add(a.id); q1.push(a); } }
      const openActs = myWeekActions(uid);

      const pickRow = (a, kind, checkedSet) => {
        const isDone = a.status === "done";
        return `<label class="rtm-pick-row">
          <input type="checkbox" data-ck-${kind}="${escape(a.id)}" ${checkedSet.has(a.id) ? "checked" : ""} />
          <span>${escape(a.title)} <span class="rtm-my-projlink" style="text-decoration:none">· ${escape(projTitle(a.project_id))}</span>${isDone ? ' <span class="rtm-badge" style="background:var(--sage-soft);color:var(--good-fg)">done</span>' : ""}</span>
        </label>`;
      };

      el.innerHTML = html`
        <div class="rtm-checkin-card">
          <div class="rtm-checkin-head"><h2>📝 Weekly Check-in</h2>${ck ? raw('<button class="rtm-icon-btn" id="btn-ck-cancel" title="ยกเลิกการแก้ไข">✕</button>') : ""}</div>

          <div class="rtm-q">
            <div class="rtm-q-label">1 · สัปดาห์นี้เสร็จ action ไหน</div>
            ${q1.length ? raw(`<div class="rtm-pick-list">${q1.map(a => pickRow(a, "done", doneIds)).join("")}</div>`)
                        : raw('<div class="rtm-q-none">ยังไม่มี action ของคุณสัปดาห์นี้</div>')}
            <div class="rtm-q-hint">ติ๊กแล้วจะปิด action นั้นให้อัตโนมัติตอนส่ง</div>
          </div>

          <div class="rtm-q">
            <div class="rtm-q-label">2 · Artifact <span class="rtm-req">*</span></div>
            <div class="rtm-artifact-tabs">
              <button type="button" class="rtm-pill ${artType !== "text" ? "active" : ""}" data-art-type="link">🔗 วางลิงก์ (ไฟล์/รูป)</button>
              <button type="button" class="rtm-pill ${artType === "text" ? "active" : ""}" data-art-type="text">📝 ข้อความ</button>
            </div>
            ${artType === "text"
              ? raw(`<textarea id="ck-artifact" class="rtm-ta" rows="4" placeholder="สรุปสิ่งที่ทำ 3 บรรทัดขึ้นไป...">${escape(artVal)}</textarea>`)
              : raw(`<input id="ck-artifact" type="url" class="rtm-inp" placeholder="https://... (ลิงก์ไฟล์ / รูป / dashboard)" value="${escape(artVal)}" />
                     <div class="rtm-q-hint">รูป/สกรีนช็อต = อัปขึ้น Drive/LINE/Slack แล้ววางลิงก์ · ยังไม่รองรับแนบไฟล์ตรง (Kill List #11)</div>`)}
            <div class="rtm-form-error" id="ck-art-err">ต้องแนบ artifact — วางลิงก์ (http/https) หรือพิมพ์ note 3+ บรรทัด</div>
          </div>

          <div class="rtm-q">
            <div class="rtm-q-label">3 · สัปดาห์หน้าจะทำ action ไหน</div>
            ${openActs.length ? raw(`<div class="rtm-pick-list">${openActs.map(a => pickRow(a, "next", nextIds)).join("")}</div>`)
                              : raw('<div class="rtm-q-none">ไม่มี action ค้าง</div>')}
          </div>

          <div class="rtm-q">
            <div class="rtm-q-label">4 · Blocker <span class="rtm-opt">(optional)</span></div>
            <textarea id="ck-blocker" class="rtm-ta" rows="2" placeholder="ติดอะไรอยู่? ปล่อยว่างได้">${escape(blockerVal)}</textarea>
          </div>

          <div class="rtm-checkin-actions">
            <button class="btn-secondary" id="btn-ck-draft">บันทึกร่าง</button>
            <button class="btn-primary" id="btn-ck-submit">${ck ? "อัพเดต Check-in" : "ส่ง Check-in"}</button>
          </div>
        </div>
      `;
      wireCheckinForm(uid, week, ck);
    };

    const gatherCheckinForm = () => {
      const type = uiMy.type;
      const value = document.querySelector("#ck-artifact")?.value || "";
      const completed = [...document.querySelectorAll("[data-ck-done]:checked")].map(x => x.dataset.ckDone);
      const next = [...document.querySelectorAll("[data-ck-next]:checked")].map(x => x.dataset.ckNext);
      const blocker = document.querySelector("#ck-blocker")?.value || "";
      return { artifact_type: type, artifact_value: value, completed_action_ids: completed, next_week_action_ids: next, blocker_note: blocker };
    };

    const wireCheckinForm = (uid, week, ck) => {
      const el = document.querySelector("#my-checkin");
      const persist = () => saveDraft(uid, week, gatherCheckinForm());
      el.querySelectorAll("input, textarea").forEach(i => i.addEventListener("input", persist));
      el.querySelectorAll('input[type="checkbox"]').forEach(i => i.addEventListener("change", persist));

      el.querySelectorAll("[data-art-type]").forEach(b => b.addEventListener("click", () => {
        persist();                       // keep whatever is typed
        uiMy.type = b.dataset.artType;
        const d = loadDraft(uid, week) || {};
        d.artifact_type = uiMy.type;
        saveDraft(uid, week, d);
        renderCheckinForm(el, uid, week, ck);
      }));

      el.querySelector("#btn-ck-cancel")?.addEventListener("click", () => { uiMy.editing = false; renderMyCheckin(uid, week); });

      el.querySelector("#btn-ck-draft")?.addEventListener("click", () => {
        persist();
        const b = el.querySelector("#btn-ck-draft");
        b.textContent = "บันทึกแล้ว ✓"; b.disabled = true;
        setTimeout(() => { const x = document.querySelector("#btn-ck-draft"); if (x) { x.textContent = "บันทึกร่าง"; x.disabled = false; } }, 1500);
      });

      el.querySelector("#btn-ck-submit")?.addEventListener("click", async () => {
        const form = gatherCheckinForm();
        const errEl = el.querySelector("#ck-art-err");
        if (!validateArtifact(form.artifact_type, form.artifact_value)) {
          errEl.classList.add("show");
          document.querySelector("#ck-artifact")?.focus();
          return;
        }
        errEl.classList.remove("show");
        const btn = el.querySelector("#btn-ck-submit");
        btn.disabled = true; btn.textContent = "กำลังส่ง...";
        try {
          await submitCheckin(uid, week, form);
          uiMy.editing = false;               // myCheckin snapshot → re-render to summary
        } catch (err) {
          toastErr("ส่ง check-in ไม่สำเร็จ", err);
          btn.disabled = false; btn.textContent = ck ? "อัพเดต Check-in" : "ส่ง Check-in";
        }
      });
    };

    // ===== VIEW · team =====
    // Manager scan ทั้ง portfolio 1 หน้า: matrix (project × member) + alerts + weekly highlights
    // read-only ทุก role (ไม่มี mutation) · reuse allActions/allMilestones (Step 4) + allCheckins (Step 7)
    const teamMembers = () =>
      (store.get("users") || []).slice().sort((a, b) => {
        const ra = a.role === "manager" ? 1 : 0, rb = b.role === "manager" ? 1 : 0;
        if (ra !== rb) return ra - rb;                       // members ก่อน · manager ท้าย
        return (a.short_code || "").localeCompare(b.short_code || "");
      });
    const activeActionsOf = (pid, uid) =>
      (store.get("allActions") || []).filter(a =>
        a.project_id === pid && a.owner_uid === uid && a.status !== "done");
    const uiTeam = { openCheckin: null };   // uid ที่กางอ่าน check-in อยู่

    const viewTeam = () => {
      uiTeam.openCheckin = null;
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <div class="rtm-team-head">
          <h1 style="font-size:var(--text-2xl)">👥 Team Board</h1>
          <span class="rtm-team-week">${weekLabel()} · ${isoWeekStr()}</span>
        </div>
        <div id="team-matrix"></div>
        <div id="team-checkin"></div>
        <div id="team-alerts"></div>
        <div id="team-hl"></div>`;
      const renderAll = () => { renderTeamMatrix(); renderTeamCheckin(); renderTeamAlerts(); renderTeamHighlights(); };
      renderAll();
      const unsubs = [
        store.subscribe("projects", renderAll),
        store.subscribe("allActions", renderAll),
        store.subscribe("allMilestones", renderAll),
        store.subscribe("allCheckins", renderAll),
        store.subscribe("users", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const renderTeamMatrix = () => {
      const el = document.querySelector("#team-matrix");
      if (!el) return;
      const members = teamMembers();
      const projects = activeProjects();
      const week = isoWeekStr();

      if (projects.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">ยังไม่มี active project · เริ่มจาก Idea Wall</div>`;
        return;
      }
      if (members.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">ยังไม่มีสมาชิกทีม · รอ member login ครั้งแรก</div>`;
        return;
      }

      // header
      const head = members.map(m =>
        `<th scope="col"><span class="rtm-tm-colhead"><span class="rtm-tm-avatar" style="background:${escape(m.color || "#4A4741")}" title="${escape(m.display_name || m.short_code || "")}">${escape(m.short_code || "?")}</span>${escape(m.short_code || "?")}</span></th>`
      ).join("");

      // body rows
      const rows = projects.map(p => {
        let rowTotal = 0, projHasBlocker = false;
        const cells = members.map(m => {
          const acts = activeActionsOf(p.id, m.uid);
          rowTotal += acts.length;
          const blocker = acts.some(a => a.blocker_flag);
          if (blocker) projHasBlocker = true;
          if (acts.length === 0) return `<td><span class="rtm-tm-cell-empty" aria-label="ไม่มีงาน">—</span></td>`;
          const dots = "▪".repeat(Math.min(acts.length, 5));
          const tip = acts.map(a =>
            `${a.status === "doing" ? "◐" : "☐"} ${a.title}${a.blocker_flag ? " 🚩" : ""}`).join("\n");
          return `<td title="${escape(tip)}">${acts.length} <span class="rtm-tm-dots" style="color:${escape(m.color || "#4A4741")}">${dots}</span>${blocker ? " 🚩" : ""}</td>`;
        }).join("");
        return `<tr>
            <th scope="row" class="rtm-tm-proj" data-open="${escape(p.id)}" title="เปิดโปรเจกต์">${escape(p.title)}${projHasBlocker ? " 🚩" : ""}</th>
            ${cells}
            <td class="rtm-tm-total">${rowTotal}</td>
          </tr>`;
      }).join("");

      // footer summary per member (scope = active projects)
      const activeIds = new Set(projects.map(p => p.id));
      const memberActive = m => (store.get("allActions") || []).filter(a =>
        activeIds.has(a.project_id) && a.owner_uid === m.uid && a.status !== "done");
      const footTotal = members.map(m => `<td>${memberActive(m).length}</td>`).join("");
      const footDoing = members.map(m => `<td>${memberActive(m).filter(a => a.status === "doing").length}</td>`).join("");
      const footDone = members.map(m => `<td>${myDoneThisWeek(m.uid).length}</td>`).join("");   // velocity รายคน (§7) · all projects
      const footBlock = members.map(m => { const n = memberActive(m).filter(a => a.blocker_flag).length; return `<td>${n ? n + " 🚩" : "0"}</td>`; }).join("");
      const footCheck = members.map(m => {
        const has = checkinFor(m.uid, week);
        const icon = has ? `<span class="rtm-alert-good">✅</span>` : `<span>⏳</span>`;
        return `<td><button class="rtm-ci-cell" data-ci-uid="${escape(m.uid)}" title="ดู check-in">${icon}</button></td>`;
      }).join("");
      const teamDoneWk = (store.get("allActions") || []).filter(a => a.status === "done" && inThisWeek(a.done_at)).length;

      el.innerHTML = html`${raw(`
        <div class="rtm-team-scroll">
          <table class="rtm-team-matrix">
            <thead>
              <tr><th scope="col" style="text-align:left">Project</th>${head}<th scope="col">รวม</th></tr>
            </thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr><th>Active actions</th>${footTotal}<td class="rtm-tm-total">—</td></tr>
              <tr><th>Doing</th>${footDoing}<td>—</td></tr>
              <tr><th>เสร็จสัปดาห์นี้</th>${footDone}<td class="rtm-tm-total">${teamDoneWk}</td></tr>
              <tr><th>Blocker</th>${footBlock}<td>—</td></tr>
              <tr><th>Check-in ${escape(week)}</th>${footCheck}<td>—</td></tr>
            </tfoot>
          </table>
        </div>`)}`;
      el.querySelectorAll("[data-open]").forEach(th =>
        th.addEventListener("click", () => go("/live/" + th.dataset.open)));
      el.querySelectorAll("[data-ci-uid]").forEach(b =>
        b.addEventListener("click", (e) => {
          e.stopPropagation();
          const uid = b.dataset.ciUid;
          uiTeam.openCheckin = uiTeam.openCheckin === uid ? null : uid;   // toggle
          renderTeamCheckin();
        }));
    };

    // check-in อ่านเนื้อได้ (H feedback v0.7.2) — คลิก ✅/⏳ ในแถว Check-in → กางอ่าน
    const renderTeamCheckin = () => {
      const el = document.querySelector("#team-checkin");
      if (!el) return;
      const uid = uiTeam.openCheckin;
      if (!uid) { el.innerHTML = ""; return; }
      const m = userByUid(uid);
      const week = isoWeekStr();
      const ck = checkinFor(uid, week);
      const titleOf = id => (store.get("allActions") || []).find(a => a.id === id)?.title || "(action ถูกลบ)";
      let inner;
      if (!ck) {
        inner = `<div class="rtm-ci-empty">⏳ <b>${escape(m?.display_name || m?.short_code || "?")}</b> ยังไม่ส่ง check-in สัปดาห์นี้</div>`;
      } else {
        const art = ck.artifact || {};
        const artHtml = /^(https?:\/\/|www\.)/i.test(art.value || "")
          ? `<a href="${escape(art.value)}" target="_blank" rel="noopener">${escape(art.value)}</a>`
          : `<span class="rtm-ci-text">${escape(art.value || "—")}</span>`;
        const listOf = ids => (ids && ids.length)
          ? `<ul>${ids.map(id => `<li>${escape(titleOf(id))}</li>`).join("")}</ul>`
          : `<div class="rtm-ci-muted">—</div>`;
        const blocker = ck.blocker_note
          ? `<div class="rtm-ci-blocker">🚩 Blocker: ${escape(ck.blocker_note)}</div>` : "";
        inner = `
          <div class="rtm-ci-head"><b>${escape(m?.display_name || m?.short_code || "?")}</b> · ส่งเมื่อ ${escape(fmtRelTime(ck.submitted_at))}</div>
          <div class="rtm-ci-grid">
            <div><div class="rtm-ci-label">📎 Artifact</div>${artHtml}</div>
            <div><div class="rtm-ci-label">✅ เสร็จสัปดาห์นี้</div>${listOf(ck.completed_action_ids)}</div>
            <div><div class="rtm-ci-label">➡ สัปดาห์หน้า</div>${listOf(ck.next_week_action_ids)}</div>
          </div>${blocker}`;
      }
      el.innerHTML = html`${raw(`<div class="rtm-team-ci"><button class="rtm-ci-close" data-ci-close title="ปิด">✕</button>${inner}</div>`)}`;
      el.querySelector("[data-ci-close]")?.addEventListener("click", () => { uiTeam.openCheckin = null; renderTeamCheckin(); });
    };

    const renderTeamAlerts = () => {
      const el = document.querySelector("#team-alerts");
      if (!el) return;
      const projects = activeProjects();
      const activeIds = new Set(projects.map(p => p.id));
      const members = teamMembers();
      const week = isoWeekStr();
      const short = uid => userByUid(uid)?.short_code || "?";

      // 1 action = 1 row · list ราย action ให้ manager ตามต่อได้ (ไม่ใช่แค่ตัวเลข)
      // แต่ละ action ติด flag ได้หลายอัน (blocker/overdue/stalled/due-soon) แต่โชว์แถวเดียว
      const enrich = a => {
        const d = a.due_date ? daysUntil(a.due_date) : null;
        return { a, d,
          blocker: !!a.blocker_flag,
          stalled: isStalled(a),
          overdue: d != null && d < 0,
          dueSoon: d != null && d >= 0 && d <= 3 };
      };
      const issues = (store.get("allActions") || [])
        .filter(a => activeIds.has(a.project_id) && a.status !== "done")
        .map(enrich)
        .filter(x => x.blocker || x.stalled || x.overdue || x.dueSoon);
      // severity: blocker → overdue → stalled → due-soon (แย่สุดบน · Principle #5)
      const sev = x => x.blocker ? 0 : x.overdue ? 1 : x.stalled ? 2 : 3;
      issues.sort((p, q) => (sev(p) - sev(q)) || ((p.d ?? Infinity) - (q.d ?? Infinity)));

      const dueLabel = d => d === 0 ? "ครบกำหนดวันนี้" : d === 1 ? "ครบกำหนดพรุ่งนี้" : `อีก ${d} วัน`;
      const rows = issues.map(x => {
        const a = x.a;
        const icon = x.blocker ? "🚩" : x.overdue ? "⚠" : x.stalled ? "⏱" : "🕒";
        const mainTxt = x.blocker ? (a.blocker_note || a.title) : a.title;
        const tags = [];
        if (x.overdue) tags.push(`<span class="rtm-alert-danger">เลยกำหนด ${Math.abs(x.d)} วัน</span>`);
        else if (x.dueSoon) tags.push(`<span class="rtm-alert-warn">${dueLabel(x.d)}</span>`);
        if (x.stalled) tags.push(`<span class="rtm-alert-warn">stalled ${daysSince(a.status_changed_at)} วัน</span>`);
        const suffix = tags.length ? ` · ${tags.join(" · ")}` : "";
        return `<div class="rtm-alert-row">${icon} <span>${escape(short(a.owner_uid))}: “${escape(mainTxt)}”${suffix}</span> <a href="#/live/${escape(a.project_id)}">${escape(projTitle(a.project_id))} →</a></div>`;
      });

      // check-in blocker (Q4) → เข้า alerts ด้วย (H feedback) — คนเขียนว่าตัวเองติดอะไร = signal สูง → ไว้บนสุด
      const ciBlockers = members
        .map(m => ({ m, ck: checkinFor(m.uid, week) }))
        .filter(x => x.ck && x.ck.blocker_note);
      const ciRows = ciBlockers.map(x =>
        `<div class="rtm-alert-row">🚩 <span>${escape(x.m.short_code || "?")}: “${escape(x.ck.blocker_note)}” <span class="rtm-alert-warn">(จาก check-in)</span></span></div>`);

      // missing check-in — เฉพาะ due window (ศ–อา) เพื่อไม่ให้ noise กลางสัปดาห์ (Principle #3 = passive)
      const day = new Date().getDay();
      const dueWindow = day === 5 || day === 6 || day === 0;
      const missing = dueWindow ? members.filter(m => !checkinFor(m.uid, week)) : [];
      const missRows = missing.map(m =>
        `<div class="rtm-alert-row">⏱ <span>${escape(m.short_code || "?")}: check-in ยังไม่ส่ง</span></div>`);

      const allRows = [...ciRows, ...rows, ...missRows];

      // summary subline — quick scan ว่ามีกี่อันแต่ละแบบ
      const cnt = { blocker: 0, overdue: 0, stalled: 0, dueSoon: 0 };
      issues.forEach(x => { if (x.blocker) cnt.blocker++; if (x.overdue) cnt.overdue++; if (x.stalled) cnt.stalled++; if (x.dueSoon && !x.overdue) cnt.dueSoon++; });
      const subParts = [];
      if (cnt.blocker) subParts.push(`🚩 ${cnt.blocker} blocker`);
      if (ciBlockers.length) subParts.push(`🚩 ${ciBlockers.length} check-in blocker`);
      if (cnt.overdue) subParts.push(`<span class="rtm-alert-danger">⚠ ${cnt.overdue} overdue</span>`);
      if (cnt.stalled) subParts.push(`⏱ ${cnt.stalled} stalled`);
      if (cnt.dueSoon) subParts.push(`🕒 ${cnt.dueSoon} due ≤3 วัน`);
      if (missing.length) subParts.push(`⏱ ${missing.length} ยังไม่ check-in`);
      const sub = subParts.length ? `<div class="rtm-alert-sub">${subParts.join(" · ")}</div>` : "";

      const body = allRows.length
        ? allRows.join("")
        : `<div class="rtm-alert-row"><span class="rtm-alert-good">✅ ทีมไม่มี alert · ทุกอย่าง on-track</span></div>`;
      el.innerHTML = html`${raw(`
        <div class="rtm-team-alerts">
          <h3>⚠ Alerts</h3>
          ${sub}
          ${body}
        </div>`)}`;
    };

    const renderTeamHighlights = () => {
      const el = document.querySelector("#team-hl");
      if (!el) return;
      const doneWk = (store.get("allActions") || []).filter(a => a.status === "done" && inThisWeek(a.done_at)).length;
      const milWk = (store.get("allMilestones") || []).filter(m => m.status === "done" && inThisWeek(m.closed_at)).length;
      const lessonWk = (store.get("projects") || []).filter(p =>
        p.status === "closed" && p.lesson_learned && inThisWeek(p.closed_at)).length;
      const closedWk = (store.get("projects") || []).filter(p =>
        (p.status === "closed" || p.status === "killed") && inThisWeek(p.closed_at));
      const vc = { win: 0, partial: 0, miss: 0 };
      closedWk.forEach(p => { const c = computeVerdict(p).code; if (vc[c] != null) vc[c]++; });
      const verdictLine = closedWk.length
        ? `<div class="rtm-hl-row rtm-hl-verdict">
             <span>🔒 <span class="rtm-hl-num">${closedWk.length}</span> ปิดสัปดาห์นี้:</span>
             <span class="rtm-vd-win">🟢 ${vc.win} Win</span>
             <span class="rtm-vd-partial">🟡 ${vc.partial} Partial</span>
             <span class="rtm-vd-miss">🔴 ${vc.miss} Miss</span>
             <a href="#/scoreboard" style="margin-left:auto;color:var(--good-fg)">Scoreboard →</a>
           </div>`
        : "";
      el.innerHTML = html`${raw(`
        <div class="rtm-team-hl">
          <h3>สัปดาห์นี้</h3>
          <div class="rtm-hl-row">
            <span>✅ <span class="rtm-hl-num">${doneWk}</span> actions done</span>
            <span>🎯 <span class="rtm-hl-num">${milWk}</span> milestones closed</span>
            <span>📚 <span class="rtm-hl-num">${lessonWk}</span> lessons added</span>
          </div>
          ${verdictLine}
        </div>`)}`;
    };

    // ===== VIEW · lessons =====
    const viewLessons = () => {
      const outlet = document.querySelector("#route-outlet");
      let q = "";
      let tag = null;
      outlet.innerHTML = html`
        <h1>📚 Lessons Library</h1>
        <p style="color:var(--ink-secondary);margin-top:8px">บทเรียนจาก project ที่ปิดแล้ว · ค้นก่อนเริ่มของใหม่ = ไม่พลาดซ้ำ</p>
        <div class="rtm-lesson-search">
          <input id="lesson-search" placeholder="🔍 ค้นหา keyword / tag..." autocomplete="off" maxlength="120" />
        </div>
        <div class="rtm-filter-row" id="lesson-tags"></div>
        <div id="lessons-list" style="margin-top:16px"></div>
      `;

      const searchEl = outlet.querySelector("#lesson-search");
      searchEl.addEventListener("input", () => { q = searchEl.value; renderList(); });

      const renderTags = () => {
        const el = outlet.querySelector("#lesson-tags");
        if (!el) return;
        const tags = allLessonTags();
        if (!tags.length) { el.innerHTML = ""; return; }
        el.innerHTML = html`
          <button class="rtm-pill ${tag === null ? 'active' : ''}" data-tag="">ทั้งหมด</button>
          ${tags.map(t => html`<button class="rtm-pill ${tag === t ? 'active' : ''}" data-tag="${t}">${t}</button>`)}
        `;
        el.querySelectorAll("[data-tag]").forEach(b => b.addEventListener("click", () => {
          tag = b.dataset.tag || null; renderTags(); renderList();
        }));
      };

      const renderList = () => {
        const el = outlet.querySelector("#lessons-list");
        if (!el) return;
        if (!(store.get("lessons") || []).length) {
          el.innerHTML = html`<div class="rtm-empty">ยังไม่มี lesson — ปิด project พร้อมเขียน lesson แล้วจะโผล่ที่นี่</div>`;
          return;
        }
        const list = searchLessons(q, tag);
        if (!list.length) {
          el.innerHTML = html`<div class="rtm-empty">ไม่พบ lesson ที่เกี่ยวข้อง — ไอเดียนี้เป็นเรื่องใหม่ของทีม</div>`;
          return;
        }
        el.innerHTML = html`<div class="rtm-lesson-grid">${list.map(renderLessonCard)}</div>`;
      };

      const renderAll = () => { renderTags(); renderList(); };
      renderAll();

      const unsubs = [
        store.subscribe("lessons", renderAll),
        store.subscribe("projects", renderList),
        store.subscribe("users", renderList),
      ];
      return () => unsubs.forEach(u => u());
    };

    const renderLessonCard = (l) => {
      const p = projectById(l.project_id);
      const deliv = DELIVERABLE_LABELS[l.deliverable_type] || l.deliverable_type || "—";
      let impactRow = "";
      if (p && p.impact_actual_value != null) {
        const good = p.impact_actual_value >= (p.impact_projected_value ?? 0);
        const proj = p.impact_projected_value != null
          ? ` <span style="color:var(--ink-tertiary)">(projected ${escape(p.impact_projected_value)} ${escape(p.impact_projected_unit || "")})</span>`
          : "";
        impactRow = `<div class="rtm-lesson-impact">Actual: <b style="color:${good ? "var(--good-fg)" : "var(--danger-fg)"}">${escape(p.impact_actual_value)} ${escape(p.impact_actual_unit || "")}</b>${proj}</div>`;
      }
      const tags = (l.tags || []).map(t => `<span class="rtm-tag-chip">${escape(t)}</span>`).join("");
      return html`
        <div class="rtm-lesson-card">
          <div class="rtm-lesson-head">
            <span class="rtm-lesson-title">${l.project_title}</span>
            <span class="rtm-lesson-date">${p ? raw(verdictBadge(p, "sm")) : ""} closed ${fmtDate(l.closed_at)}</span>
          </div>
          <div class="rtm-lesson-deliv">${deliv}</div>
          <div class="rtm-lesson-text">💡 ${l.lesson_text}</div>
          ${tags ? raw(`<div class="rtm-lesson-tags">${tags}</div>`) : ""}
          ${raw(impactRow)}
