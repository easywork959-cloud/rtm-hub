<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTM Hub</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg-primary: #FAF7F2;
      --bg-elevated: #FFFFFF;
      --bg-subtle: #F2EDE3;
      --border: #E6DFD1;
      --border-strong: #C9BFA8;

      --ink-primary: #2C2A26;
      --ink-secondary: #6B655A;
      --ink-tertiary: #A39B8A;

      --sage: #7A9B7E;      --sage-soft: #DCE7DD;
      --peach: #E8A67C;     --peach-soft: #F7E3D2;
      --terracotta: #C87565;--terra-soft: #F2DDD5;
      --plum: #8B6B8E;      --plum-soft: #E4D9E5;
      --ink-dot: #4A4741;

      --good-fg: #4F7A5A;
      --warn-fg: #A8622A;
      --danger-fg: #8C3E30;
      --danger-bg: #F2DDD5;

      --font-body: "IBM Plex Sans Thai", system-ui, sans-serif;

      --text-xs: .75rem;   --text-sm: .875rem;  --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.375rem; --text-2xl: 1.75rem;

      --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
      --space-4: 16px; --space-5: 24px; --space-6: 32px;
      --space-8: 48px;

      --radius-sm: 6px;  --radius-md: 10px;
      --radius-lg: 16px; --radius-xl: 20px;
    }

    /* ===== BASE ===== */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--ink-primary);
      background: var(--bg-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-weight: 600; line-height: 1.25; margin: 0; }
    h1 { font-size: var(--text-2xl); }
    h2 { font-size: var(--text-xl); }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ===== SHELL ===== */
    .app-shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--bg-subtle);
      border-right: 1px solid var(--border);
      padding: var(--space-5) var(--space-3);
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      padding: 0 12px 24px;
      font-weight: 600;
    }
    .sidebar .brand small {
      font-size: 12px;
      color: var(--ink-tertiary);
      display: block;
      font-weight: 400;
    }
    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: block;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      color: var(--ink-secondary);
      margin-bottom: var(--space-1);
    }
    .sidebar nav a.active {
      background: var(--bg-elevated);
      color: var(--ink-primary);
      font-weight: 500;
      border-left: 3px solid var(--sage);
    }
    .sidebar .user {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-2);
      border-top: 1px solid var(--border);
      margin-top: var(--space-4);
    }
    .sidebar .user-info { flex: 1; min-width: 0; }
    .sidebar .user-name {
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
    }
    .sidebar .user button {
      color: var(--ink-tertiary);
      padding: var(--space-2);
      font-size: var(--text-xs);
    }
    .sidebar .user button:hover { color: var(--danger-fg); }
    .main {
      padding: var(--space-6);
      max-width: 1280px;
    }

    /* ===== AVATAR ===== */
    .rtm-avatar {
      width: 28px; height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: var(--text-sm);
      font-weight: 600;
      flex-shrink: 0;
    }
    .rtm-avatar-sm {
      width: 22px; height: 22px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ===== AUTH GATE ===== */
    .auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-6);
    }
    .auth-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-6);
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(44,42,38,.06);
    }
    .auth-card h1 { margin-bottom: var(--space-2); }
    .auth-card p {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-6);
    }
    .btn-primary {
      background: var(--sage);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-weight: 500;
    }
    .btn-primary:hover { background: #6B8B70; }
    .btn-primary:disabled { background: var(--ink-tertiary); cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--border-strong);
      color: var(--ink-primary);
      padding: 10px 20px;
      border-radius: var(--radius-md);
    }
    .btn-secondary:hover { background: var(--bg-subtle); }
    .auth-error {
      color: var(--danger-fg);
      font-size: var(--text-sm);
      margin-top: var(--space-4);
    }

    /* ===== IDEA WALL ===== */
    .rtm-session-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      margin: var(--space-4) 0;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .rtm-session-active {
      background: var(--sage-soft);
      border-color: var(--sage);
    }
    .rtm-session-idle {
      background: var(--bg-subtle);
      color: var(--ink-secondary);
    }
    .rtm-session-dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--sage);
      box-shadow: 0 0 0 3px rgba(122,155,126,0.2);
      animation: rtm-pulse 2s infinite;
    }
    @keyframes rtm-pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .rtm-session-count {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin-left: auto;
      margin-right: var(--space-2);
    }
    .rtm-btn-inline {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      color: var(--ink-primary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
    }
    .rtm-btn-inline:hover { background: var(--bg-primary); }

    .rtm-quick-add {
      margin: var(--space-4) 0 var(--space-2);
    }
    .rtm-quick-add input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      font: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rtm-quick-add input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-quick-add input:disabled { opacity: 0.5; }

    .rtm-filter-row {
      display: flex;
      gap: var(--space-2);
      margin: var(--space-4) 0;
    }
    .rtm-pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--ink-secondary);
      font-size: var(--text-sm);
    }
    .rtm-pill:hover { background: var(--bg-subtle); }
    .rtm-pill.active {
      background: var(--ink-primary);
      color: var(--bg-primary);
      border-color: var(--ink-primary);
    }

    .rtm-idea-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-3);
    }
    .rtm-idea-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04));
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .rtm-idea-card:hover {
      box-shadow: 0 2px 8px rgba(44,42,38,.08);
      transform: translateY(-1px);
    }
    .rtm-idea-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
      flex-wrap: wrap;
    }
    .rtm-idea-actions {
      margin-left: auto;
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .rtm-idea-card:hover .rtm-idea-actions,
    .rtm-idea-card:focus-within .rtm-idea-actions {
      opacity: 1;
    }
    .rtm-icon-btn {
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--ink-secondary);
      opacity: 0.7;
    }
    .rtm-icon-btn:hover {
      background: var(--bg-subtle);
      opacity: 1;
    }
    .rtm-inline-edit {
      width: 100%;
      padding: 4px 6px;
      border: 1.5px solid var(--sage);
      border-radius: var(--radius-sm);
      font: inherit;
      font-size: var(--text-base);
      outline: none;
      background: var(--bg-elevated);
    }
    .rtm-session-picker {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin: var(--space-3) 0;
    }
    .rtm-session-option {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .rtm-session-option:last-child { border-bottom: none; }
    .rtm-session-option:hover { background: var(--bg-subtle); }
    .rtm-session-option input { margin: 0; flex-shrink: 0; }
    .rtm-tag-active {
      margin-left: auto;
      font-size: var(--text-xs);
      color: var(--good-fg);
    }

    /* ===== DECIDE VIEW ===== */
    .rtm-decide-section {
      margin-bottom: var(--space-6);
    }
    .rtm-decide-section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .rtm-decide-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    .rtm-decide-col {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
    }
    .rtm-decide-col-header {
      font-weight: 600;
      margin-bottom: var(--space-3);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rtm-decide-col-donow .rtm-decide-col-header { border-color: var(--sage); color: var(--good-fg); }
    .rtm-decide-col-park .rtm-decide-col-header { border-color: var(--peach); color: var(--warn-fg); }
    .rtm-decide-col-kill .rtm-decide-col-header { border-color: var(--border-strong); color: var(--ink-tertiary); }
    .rtm-decide-col-count {
      font-size: var(--text-sm);
      color: var(--ink-tertiary);
      font-weight: 400;
    }
    .rtm-decide-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      margin-bottom: var(--space-2);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .rtm-decide-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .rtm-decide-card-title {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: var(--text-sm);
    }
    .rtm-decide-card-meta {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .rtm-decide-card-pareto {
      color: var(--good-fg);
      font-weight: 600;
    }
    .rtm-decide-card-park-days {
      color: var(--warn-fg);
      font-size: var(--text-xs);
    }
    .rtm-decide-card-park-days.warn {
      color: var(--danger-fg);
      font-weight: 600;
    }
    .rtm-decide-card-kill-reason {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      font-style: italic;
      margin-top: 4px;
    }
    .rtm-decide-untriaged {
      background: var(--peach-soft);
      border: 1px solid var(--peach);
      padding: var(--space-4);
      border-radius: var(--radius-md);
    }
    .rtm-decide-untriaged-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--space-2);
    }
    .rtm-btn-promote {
      background: var(--sage);
      color: #fff;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 500;
    }
    .rtm-btn-promote:hover { background: #6B8B70; }
    .rtm-decide-card-actions {
      margin-top: var(--space-2);
      display: flex;
      gap: var(--space-1);
      justify-content: flex-end;
    }

    /* ===== FORM ===== */
    .rtm-form-row { margin-bottom: var(--space-3); }
    .rtm-form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .rtm-form-label .req { color: var(--danger-fg); }
    .rtm-form-hint {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      margin-top: 2px;
    }
    .rtm-form-error {
      font-size: var(--text-xs);
      color: var(--danger-fg);
      margin-top: 4px;
      display: none;
    }
    .rtm-form-error.show { display: block; }
    .rtm-form-row-inline {
      display: flex;
      gap: var(--space-2);
      align-items: end;
    }
    .rtm-form-row-inline > * { flex: 1; }
    .rtm-modal input[type="number"],
    .rtm-modal input[type="text"],
    .rtm-modal select,
    .rtm-modal textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      outline: none;
      background: var(--bg-elevated);
    }
    .rtm-modal input:focus,
    .rtm-modal select:focus,
    .rtm-modal textarea:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-modal textarea { resize: vertical; min-height: 60px; }
    .rtm-pareto-display {
      padding: var(--space-3);
      background: var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--ink-secondary);
      margin-bottom: var(--space-3);
    }
    .rtm-pareto-display b {
      color: var(--good-fg);
      font-size: var(--text-base);
    }
    .rtm-triage-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }
    .rtm-btn-donow, .rtm-btn-park, .rtm-btn-kill {
      padding: 12px;
      border-radius: var(--radius-md);
      font-weight: 500;
      border: 1.5px solid;
      transition: all 0.15s;
    }
    .rtm-btn-donow {
      background: var(--sage-soft);
      color: var(--good-fg);
      border-color: var(--sage);
    }
    .rtm-btn-donow:hover { background: var(--sage); color: #fff; }
    .rtm-btn-park {
      background: var(--peach-soft);
      color: var(--warn-fg);
      border-color: var(--peach);
    }
    .rtm-btn-park:hover { background: var(--peach); color: #fff; }
    .rtm-btn-kill {
      background: var(--bg-subtle);
      color: var(--ink-secondary);
      border-color: var(--border-strong);
    }
    .rtm-btn-kill:hover {
      background: var(--danger-bg);
      color: var(--danger-fg);
      border-color: var(--danger-fg);
    }
    .rtm-kill-reason {
      margin-top: var(--space-3);
      display: none;
    }
    .rtm-kill-reason.show { display: block; }

    @media (max-width: 767px) {
      .rtm-decide-cols { grid-template-columns: 1fr; }
      .rtm-triage-actions { grid-template-columns: 1fr; }
    }
    .rtm-session-tag {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      padding: 2px 8px;
      background: var(--bg-subtle);
      border-radius: 999px;
    }
    .rtm-idea-title {
      font-size: var(--text-base);
      color: var(--ink-primary);
      line-height: 1.4;
    }
    .rtm-idea-time {
      font-size: var(--text-xs);
      color: var(--ink-tertiary);
      margin-top: var(--space-2);
    }

    .rtm-empty {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--ink-tertiary);
      background: var(--bg-elevated);
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
    }

    /* ===== LIVE VIEW ===== */
    .rtm-wip-banner {
      background: var(--danger-bg);
      color: var(--danger-fg);
      border: 1px solid var(--danger-fg);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      margin-top: var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
    }
    .rtm-live-controls { margin-top: var(--space-4); }
    .rtm-live-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--space-4);
    }
    .rtm-project-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      cursor: pointer;
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04));
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .rtm-project-card:hover { box-shadow: 0 2px 8px rgba(44,42,38,.08); transform: translateY(-1px); }
    .rtm-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-2); }
    .rtm-card-title { font-weight: 600; font-size: var(--text-lg); line-height: 1.3; }
    .rtm-card-badges { display: flex; gap: var(--space-1); flex-wrap: wrap; margin-top: var(--space-2); }
    .rtm-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px;
      font-size: var(--text-xs); font-weight: 500;
    }
    .rtm-badge-blocker { background: var(--danger-bg); color: var(--danger-fg); }
    .rtm-badge-stalled { background: var(--peach-soft); color: var(--warn-fg); }
    .rtm-card-kpi { margin-top: var(--space-2); font-size: var(--text-sm); }
    .rtm-card-meta {
      margin-top: var(--space-2); font-size: var(--text-xs);
      color: var(--ink-secondary); display: flex; gap: 6px; flex-wrap: wrap;
    }
    .rtm-mil-bar { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-3); }
    .rtm-mil-chip {
      font-size: var(--text-xs); color: var(--ink-secondary);
      background: var(--bg-subtle); padding: 3px 8px; border-radius: var(--radius-sm);
    }
    .rtm-card-next { margin-top: var(--space-3); font-size: var(--text-sm); color: var(--ink-secondary); }
    .rtm-card-foot {
      margin-top: var(--space-3); padding-top: var(--space-2);
      border-top: 1px solid var(--border);
      font-size: var(--text-xs); color: var(--ink-tertiary);
    }

    /* ===== PROJECT DETAIL ===== */
    .rtm-proj-breadcrumb { font-size: var(--text-sm); color: var(--ink-secondary); margin-bottom: var(--space-3); }
    .rtm-proj-breadcrumb a { color: var(--good-fg); }
    .rtm-proj-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
    .rtm-proj-framework, .rtm-proj-impact, .rtm-proj-result {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: var(--space-4) var(--space-5);
      margin-top: var(--space-4); font-size: var(--text-sm);
    }
    .rtm-proj-framework > div, .rtm-proj-impact > div { margin: 6px 0; }
    .rtm-proj-impact { display: flex; gap: var(--space-8); flex-wrap: wrap; }
    .rtm-fw-key {
      display: inline-block; min-width: 72px;
      font-size: var(--text-xs); font-weight: 600; color: var(--ink-tertiary);
      letter-spacing: 0.03em;
    }
    .rtm-proj-result { background: var(--sage-soft); border-color: var(--sage); }
    .rtm-tag-chip {
      display: inline-block; font-size: var(--text-xs);
      background: var(--bg-elevated); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 999px; margin-right: 4px;
    }
    .rtm-proj-mils-head {
      display: flex; align-items: center; justify-content: space-between;
      margin: var(--space-6) 0 var(--space-3);
    }
    .rtm-mil-block {
      border: 1px solid var(--border); border-radius: var(--radius-md);
      margin-bottom: var(--space-3); overflow: hidden; background: var(--bg-elevated);
    }
    .rtm-mil-header {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-4); cursor: pointer;
      background: var(--bg-subtle);
    }
    .rtm-mil-header:hover { background: var(--bg-primary); }
    .rtm-mil-caret { color: var(--ink-tertiary); width: 14px; }
    .rtm-mil-name { font-weight: 600; }
    .rtm-mil-sub { margin-left: auto; font-size: var(--text-xs); color: var(--ink-tertiary); }
    .rtm-action-list { padding: var(--space-2) var(--space-3) var(--space-3); }
    .rtm-action-row {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-2);
      border-bottom: 1px solid var(--border);
    }
    .rtm-action-row:last-child { border-bottom: none; }
    .rtm-action-row.done .rtm-action-title { color: var(--ink-tertiary); text-decoration: line-through; }
    .rtm-action-check {
      font-size: var(--text-lg); line-height: 1; color: var(--sage);
      padding: 2px 4px; border-radius: var(--radius-sm);
    }
    .rtm-action-check:hover { background: var(--sage-soft); }
    .rtm-action-check:disabled { color: var(--ink-tertiary); cursor: default; }
    .rtm-action-title { flex: 1; font-size: var(--text-sm); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .rtm-action-due { font-size: var(--text-xs); min-width: 52px; text-align: right; }
    .rtm-add-action-btn {
      margin-top: var(--space-2); font-size: var(--text-sm);
      color: var(--good-fg); padding: 4px 8px; border-radius: var(--radius-sm);
    }
    .rtm-add-action-btn:hover { background: var(--sage-soft); }
    .rtm-add-action-form {
      display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center;
      padding: var(--space-3); margin-top: var(--space-2);
      background: var(--bg-subtle); border-radius: var(--radius-sm);
    }
    .rtm-add-action-form input[type="text"] { flex: 1; min-width: 140px; }
    .rtm-add-action-form input, .rtm-add-action-form select {
      padding: 8px 10px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font: inherit; background: var(--bg-elevated); outline: none;
    }
    .rtm-add-action-form input:focus, .rtm-add-action-form select:focus {
      border-color: var(--sage); box-shadow: 0 0 0 3px var(--sage-soft);
    }

    @media (max-width: 767px) {
      .rtm-live-grid { grid-template-columns: 1fr; }
      .rtm-proj-impact { gap: var(--space-4); }
    }

    /* ===== MODAL ===== */
    .rtm-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44,42,38,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      z-index: 200;
    }
    .rtm-modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(44,42,38,.15);
    }
    .rtm-modal h2 { margin-bottom: var(--space-3); }
    .rtm-modal-hint {
      color: var(--ink-secondary);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-4);
    }
    .rtm-modal input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      outline: none;
    }
    .rtm-modal input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }
    .rtm-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
      margin-top: var(--space-5);
    }
    .rtm-summary {
      background: var(--bg-subtle);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin: var(--space-2) 0 var(--space-4);
      font-size: var(--text-sm);
    }
    .rtm-summary > div { margin: 2px 0; }

    /* ===== STEP 11 · A11Y (focus ring + reduced motion) ===== */
    :focus:not(:focus-visible) { outline: none; }
    button:focus-visible, a:focus-visible, input:focus-visible,
    select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible,
    [role="button"]:focus-visible {
      outline: 3px solid var(--sage);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ===== STEP 11 · BUTTONS (secondary/danger for dialogs) ===== */
    .btn-secondary {
      padding: 10px 18px;
      background: var(--bg-subtle);
      color: var(--ink-primary);
      border-radius: var(--radius-md);
      font-weight: 500;
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger {
      padding: 10px 18px;
      background: var(--terracotta);
      color: #fff;
      border-radius: var(--radius-md);
      font-weight: 600;
    }
    .btn-danger:hover { background: #B4604F; }
    .btn-danger:disabled, .btn-secondary:disabled { opacity: .55; cursor: not-allowed; }

    /* ===== STEP 11 · TOAST ===== */
    #toast-root {
      position: fixed;
      z-index: 400;
      bottom: var(--space-5);
      right: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      max-width: min(360px, calc(100vw - 32px));
      pointer-events: none;
    }
    .rtm-toast {
      pointer-events: auto;
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left: 4px solid var(--ink-tertiary);
      box-shadow: 0 6px 20px rgba(44,42,38,.16);
      font-size: var(--text-sm);
      color: var(--ink-primary);
      animation: rtm-toast-in .18s ease;
    }
    @keyframes rtm-toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .rtm-toast-success { border-left-color: var(--sage); }
    .rtm-toast-error   { border-left-color: var(--terracotta); background: var(--terra-soft); }
    .rtm-toast-warn    { border-left-color: var(--peach); background: var(--peach-soft); }
    .rtm-toast-info    { border-left-color: var(--plum); }
    .rtm-toast-icon { flex: 0 0 auto; line-height: 1.4; }
    .rtm-toast-msg { flex: 1 1 auto; line-height: 1.4; word-break: break-word; }
    .rtm-toast-x {
      flex: 0 0 auto;
      color: var(--ink-tertiary);
      font-size: var(--text-sm);
      padding: 0 2px;
      line-height: 1.4;
    }
    .rtm-toast-x:hover { color: var(--ink-primary); }

    /* ===== STEP 11 · DIALOG (confirm/prompt) ===== */
    #dialog-root .rtm-modal-backdrop { z-index: 500; }
    .rtm-dialog { max-width: 420px; }
    .rtm-dialog h2 { font-size: var(--text-lg); margin-bottom: var(--space-2); }
    .rtm-dialog input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font: inherit;
      outline: none;
      margin-top: var(--space-2);
    }
    .rtm-dialog input[type="text"]:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }

    /* ===== STEP 11 · ERROR BANNER (Firestore/network fail) ===== */
    #err-banner-root { position: fixed; top: 0; left: 0; right: 0; z-index: 450; }
    .rtm-err-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: 10px 16px;
      background: var(--danger-fg);
      color: #fff;
      font-size: var(--text-sm);
      text-align: center;
      box-shadow: 0 2px 8px rgba(44,42,38,.2);
    }
    .rtm-err-banner button {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
      padding: 0 4px;
    }
    .rtm-icon-btn { line-height: 1; }

    /* ===== MOBILE ===== */
    @media (max-width: 767px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; bottom: 0; left: 0; right: 0; top: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: var(--space-2);
        z-index: 100;
        border-top: 1px solid var(--border);
        border-right: none;
      }
      .sidebar .brand, .sidebar .user { display: none; }
      .sidebar nav { display: flex; width: 100%; justify-content: space-around; }
      .sidebar nav a { margin: 0; padding: var(--space-2); text-align: center; font-size: var(--text-xs); }
      .main { padding: var(--space-4); padding-bottom: 80px; }
      .rtm-idea-grid { grid-template-columns: 1fr; }
      .rtm-checkin-card { padding: var(--space-4); }
      .rtm-checkin-actions { flex-direction: column-reverse; }
      .rtm-checkin-actions button { width: 100%; }
    }

    /* ===== MY WEEK + CHECK-IN ===== */
    .rtm-my-head { display: flex; align-items: baseline; gap: var(--space-3); flex-wrap: wrap; }
    .rtm-my-week { font-size: var(--text-sm); color: var(--ink-secondary); }
    .rtm-my-h2 { font-size: var(--text-xl); margin: var(--space-5) 0 var(--space-2); }
    .rtm-ck-banner {
      margin-top: var(--space-3); padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md); font-size: var(--text-sm); border: 1px solid var(--border);
    }
    .rtm-ck-banner.good { background: var(--sage-soft); color: var(--good-fg); border-color: var(--sage); }
    .rtm-ck-banner.warn { background: var(--peach-soft); color: var(--warn-fg); border-color: var(--peach); }
    .rtm-ck-banner.subtle { background: var(--bg-subtle); color: var(--ink-secondary); }
    .rtm-my-actions {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: var(--space-2) var(--space-4);
    }
    .rtm-my-projlink { color: var(--good-fg); font-size: var(--text-xs); }
    .rtm-my-projlink:hover { text-decoration: underline; }

    .rtm-checkin-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: var(--space-5);
      margin-top: var(--space-6); box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04));
    }
    .rtm-checkin-card.submitted { background: var(--sage-soft); border-color: var(--sage); }
    .rtm-checkin-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
    .rtm-checkin-head h2 { font-size: var(--text-xl); }
    .rtm-ck-sum > div { margin: 6px 0; font-size: var(--text-sm); }
    .rtm-ck-artifact-text { white-space: pre-line; color: var(--ink-secondary); }
    .rtm-q { margin-bottom: var(--space-5); }
    .rtm-q-label { font-weight: 600; font-size: var(--text-sm); margin-bottom: var(--space-2); }
    .rtm-req { color: var(--danger-fg); }
    .rtm-opt { color: var(--ink-tertiary); font-weight: 400; font-size: var(--text-xs); }
    .rtm-q-hint { font-size: var(--text-xs); color: var(--ink-tertiary); margin-top: 6px; }
    .rtm-q-none { font-size: var(--text-sm); color: var(--ink-tertiary); padding: var(--space-2) 0; }
    .rtm-pick-list { display: flex; flex-direction: column; gap: 2px; }
    .rtm-pick-row {
      display: flex; align-items: flex-start; gap: var(--space-2);
      padding: var(--space-2); border-radius: var(--radius-sm); cursor: pointer; font-size: var(--text-sm);
    }
    .rtm-pick-row:hover { background: var(--bg-subtle); }
    .rtm-pick-row input { margin-top: 3px; accent-color: var(--sage); }
    .rtm-artifact-tabs { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); }
    .rtm-inp, .rtm-ta {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font: inherit; background: var(--bg-elevated);
      outline: none; color: var(--ink-primary);
    }
    .rtm-ta { resize: vertical; line-height: var(--lh-normal); }
    .rtm-inp:focus, .rtm-ta:focus { border-color: var(--sage); box-shadow: 0 0 0 3px var(--sage-soft); }
    .rtm-checkin-actions { display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-4); }
    .rtm-form-error#ck-art-err { display: none; margin-top: 6px; }
    .rtm-form-error#ck-art-err.show { display: block; }
    .rtm-blocker-note { color: var(--danger-fg); font-size: var(--text-xs); }

    /* ===== TEAM BOARD ===== */
    .rtm-team-head { display: flex; align-items: baseline; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-4); }
    .rtm-team-week { font-size: var(--text-sm); color: var(--ink-secondary); }
    .rtm-team-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-elevated); box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04)); }
    .rtm-team-matrix { border-collapse: collapse; width: 100%; min-width: 520px; font-size: var(--text-sm); }
    .rtm-team-matrix th, .rtm-team-matrix td { padding: var(--space-3); text-align: center; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .rtm-team-matrix thead th { background: var(--bg-subtle); font-weight: 600; }
    .rtm-tm-colhead { display: inline-flex; align-items: center; gap: 6px; }
    .rtm-tm-avatar { width: 16px; height: 16px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; font-weight: 600; flex-shrink: 0; }
    .rtm-tm-proj { text-align: left; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .rtm-tm-proj:hover { color: var(--good-fg); }
    .rtm-tm-total { color: var(--ink-secondary); font-variant-numeric: tabular-nums; }
    .rtm-tm-cell-empty { color: var(--ink-tertiary); }
    .rtm-tm-dots { letter-spacing: 1px; }
    .rtm-team-matrix tbody tr:hover td, .rtm-team-matrix tbody tr:hover th { background: var(--bg-subtle); }
    .rtm-team-matrix tfoot th, .rtm-team-matrix tfoot td { background: var(--bg-subtle); font-size: var(--text-xs); border-bottom: none; }
    .rtm-team-matrix tfoot th { text-align: left; color: var(--ink-secondary); font-weight: 500; }
    .rtm-team-alerts, .rtm-team-hl { margin-top: var(--space-5); background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5); }
    .rtm-team-alerts h3, .rtm-team-hl h3 { font-size: var(--text-sm); color: var(--ink-secondary); margin-bottom: var(--space-3); font-weight: 600; }
    .rtm-alert-row { display: flex; gap: var(--space-2); align-items: baseline; padding: var(--space-2) 0; border-bottom: 1px dashed var(--border); font-size: var(--text-sm); }
    .rtm-alert-row:last-child { border-bottom: none; }
    .rtm-alert-row a { color: var(--good-fg); text-decoration: none; white-space: nowrap; }
    .rtm-alert-good { color: var(--good-fg); }
    .rtm-alert-danger { color: var(--danger-fg); font-weight: 500; }
    .rtm-alert-warn { color: var(--warn-fg); }
    .rtm-alert-sub { display: flex; gap: var(--space-3); flex-wrap: wrap; font-size: var(--text-xs); color: var(--ink-secondary); margin-bottom: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--border); }
    .rtm-hl-row { display: flex; gap: var(--space-6); flex-wrap: wrap; font-size: var(--text-base); }
    .rtm-hl-num { font-weight: 600; font-size: var(--text-lg); }
    .rtm-ci-cell { background: none; border: none; cursor: pointer; font: inherit; padding: 2px 8px; border-radius: var(--radius-sm); }
    .rtm-ci-cell:hover { background: var(--bg-elevated); box-shadow: 0 0 0 1.5px var(--sage) inset; }
    .rtm-team-ci { margin-top: var(--space-4); background: var(--bg-elevated); border: 1px solid var(--border); border-left: 3px solid var(--sage); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5); position: relative; }
    .rtm-ci-close { position: absolute; top: var(--space-3); right: var(--space-3); background: none; border: none; cursor: pointer; color: var(--ink-tertiary); font-size: var(--text-base); line-height: 1; }
    .rtm-ci-close:hover { color: var(--ink-primary); }
    .rtm-ci-head { font-size: var(--text-sm); color: var(--ink-secondary); margin-bottom: var(--space-3); }
    .rtm-ci-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-4); }
    .rtm-ci-label { font-size: var(--text-xs); color: var(--ink-tertiary); font-weight: 600; margin-bottom: 4px; }
    .rtm-ci-grid ul { margin: 0; padding-left: var(--space-4); font-size: var(--text-sm); }
    .rtm-ci-grid a { color: var(--good-fg); word-break: break-all; font-size: var(--text-sm); }
    .rtm-ci-muted { color: var(--ink-tertiary); font-size: var(--text-sm); }
    .rtm-ci-text { font-size: var(--text-sm); white-space: pre-line; }
    .rtm-ci-blocker { margin-top: var(--space-3); color: var(--danger-fg); font-size: var(--text-sm); background: var(--terra-soft); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); }
    .rtm-ci-empty { color: var(--ink-secondary); font-size: var(--text-sm); }
    /* ===== LESSONS + AUTO-SURFACE (Step 8) ===== */
    .rtm-lesson-search { margin: var(--space-4) 0 var(--space-2); }
    .rtm-lesson-search input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      background: var(--bg-elevated); font: inherit; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rtm-lesson-search input:focus { border-color: var(--sage); box-shadow: 0 0 0 3px var(--sage-soft); }
    .rtm-lesson-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-3);
    }
    .rtm-lesson-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-left: 3px solid var(--sage);
      border-radius: var(--radius-md); padding: var(--space-4);
      box-shadow: var(--shadow-sm, 0 1px 2px rgba(44,42,38,.04));
      display: flex; flex-direction: column; gap: var(--space-2);
    }
    .rtm-lesson-head { display: flex; align-items: baseline; gap: var(--space-2); justify-content: space-between; flex-wrap: wrap; }
    .rtm-lesson-title { font-weight: var(--fw-semibold); font-size: var(--text-lg); color: var(--ink-primary); }
    .rtm-lesson-date { font-size: var(--text-xs); color: var(--ink-tertiary); white-space: nowrap; }
    .rtm-lesson-deliv { font-size: var(--text-sm); color: var(--ink-secondary); }
    .rtm-lesson-text { font-size: var(--text-base); line-height: var(--lh-relaxed); color: var(--ink-primary); }
    .rtm-lesson-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .rtm-tag-chip {
      padding: 2px 10px; border-radius: 999px; font-size: var(--text-xs);
      background: var(--sage-soft); color: var(--good-fg);
    }
    .rtm-lesson-impact { font-size: var(--text-sm); color: var(--ink-secondary); }
    .rtm-lesson-open {
      align-self: flex-start; font-size: var(--text-sm); color: var(--good-fg);
      text-decoration: none; font-weight: var(--fw-medium); margin-top: var(--space-1);
    }
    .rtm-lesson-open:hover { text-decoration: underline; }

    .rtm-surface {
      display: flex; align-items: center; gap: var(--space-3);
      background: var(--peach-soft); border: 1px solid var(--peach);
      border-radius: var(--radius-md); padding: 10px 14px;
      margin-bottom: var(--space-2);
      animation: rtm-surface-in 0.2s ease;
    }
    @keyframes rtm-surface-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .rtm-surface-txt { font-size: var(--text-sm); color: var(--warn-fg); }
    .rtm-surface-link { margin-left: auto; font-size: var(--text-sm); font-weight: var(--fw-medium); color: var(--warn-fg); text-decoration: none; white-space: nowrap; }
    .rtm-surface-link:hover { text-decoration: underline; }
    .rtm-surface-x { color: var(--warn-fg); opacity: 0.6; padding: 2px 6px; font-size: var(--text-sm); }
    .rtm-surface-x:hover { opacity: 1; }
    @media (prefers-reduced-motion: reduce) { .rtm-surface { animation: none; } }

    /* ===== VERDICT + SCOREBOARD (Step 9) ===== */
    .rtm-verdict {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      font-size: var(--text-xs); font-weight: var(--fw-medium); white-space: nowrap;
    }
    .rtm-vd-win     { background: var(--sage-soft);  color: var(--good-fg);   border: 1px solid var(--sage); }
    .rtm-vd-partial { background: var(--peach-soft); color: var(--warn-fg);   border: 1px solid var(--peach); }
    .rtm-vd-miss    { background: var(--terra-soft); color: var(--danger-fg); border: 1px solid var(--terracotta); }
    .rtm-vd-reason  { font-weight: var(--fw-normal); opacity: 0.85; }
    .rtm-proj-verdict { margin-bottom: var(--space-2); }
    .rtm-card-closed .rtm-card-meta { margin-top: var(--space-1); }
    .rtm-hl-verdict { gap: var(--space-3); flex-wrap: wrap; align-items: center; margin-top: var(--space-2); font-size: var(--text-sm); }
    .rtm-hl-verdict .rtm-vd-win { color: var(--good-fg); }
    .rtm-hl-verdict .rtm-vd-partial { color: var(--warn-fg); }
    .rtm-hl-verdict .rtm-vd-miss { color: var(--danger-fg); }

    .rtm-sb-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); flex-wrap: wrap; }
    .rtm-sb-controls { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
    .rtm-sb-period { color: var(--ink-secondary); margin: 4px 0 var(--space-5); font-size: var(--text-sm); }
    .rtm-sb-tally { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
    .rtm-sb-tile { border-radius: var(--radius-xl); padding: var(--space-5); text-align: center; border: 1px solid var(--border); background: var(--bg-elevated); }
    .rtm-sb-tile.rtm-vd-win     { background: var(--sage-soft);  border-color: var(--sage); }
    .rtm-sb-tile.rtm-vd-partial { background: var(--peach-soft); border-color: var(--peach); }
    .rtm-sb-tile.rtm-vd-miss    { background: var(--terra-soft); border-color: var(--terracotta); }
    .rtm-sb-tile-total { background: var(--bg-subtle); }
    .rtm-sb-num { font-size: var(--text-3xl); font-weight: var(--fw-semibold); line-height: 1; }
    .rtm-sb-lbl { font-size: var(--text-sm); margin-top: var(--space-2); color: var(--ink-secondary); }
    .rtm-sb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
    .rtm-sb-panel { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); box-shadow: var(--shadow-sm); }
    .rtm-sb-panel h3 { font-size: var(--text-lg); margin-bottom: var(--space-3); }
    .rtm-sb-impact-row { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-3); padding: var(--space-2) 0; border-bottom: 1px solid var(--border); }
    .rtm-sb-impact-row:last-of-type { border-bottom: none; }
    .rtm-sb-impact-val { font-size: var(--text-xl); font-weight: var(--fw-semibold); color: var(--good-fg); }
    .rtm-sb-impact-unit { font-size: var(--text-sm); color: var(--ink-secondary); font-weight: var(--fw-normal); }
    .rtm-sb-impact-meta { font-size: var(--text-xs); color: var(--ink-tertiary); white-space: nowrap; }
    .rtm-sb-note { font-size: var(--text-xs); color: var(--ink-tertiary); margin-top: var(--space-3); }
    .rtm-sb-funnel { display: flex; flex-direction: column; gap: 2px; }
    .rtm-sb-fn-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid var(--border); font-size: var(--text-sm); }
    .rtm-sb-fn-row:last-child { border-bottom: none; }
    .rtm-sb-fn-row b { font-size: var(--text-base); }
    .rtm-sb-closed-list { display: flex; flex-direction: column; gap: var(--space-1); }
    .rtm-sb-closed-row { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: var(--space-3); padding: var(--space-2) var(--space-2); border-radius: var(--radius-sm); text-decoration: none; color: var(--ink-primary); }
    .rtm-sb-closed-row:hover { background: var(--bg-subtle); }
    .rtm-sb-closed-title { font-weight: var(--fw-medium); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rtm-sb-closed-impact { font-size: var(--text-sm); color: var(--ink-secondary); white-space: nowrap; }
    .rtm-sb-closed-date { font-size: var(--text-xs); color: var(--ink-tertiary); white-space: nowrap; }
    @media (max-width: 720px) {
      .rtm-sb-tally { grid-template-columns: repeat(2, 1fr); }
      .rtm-sb-grid { grid-template-columns: 1fr; }
      .rtm-sb-closed-row { grid-template-columns: auto 1fr; }
      .rtm-sb-closed-impact, .rtm-sb-closed-date { grid-column: 2; }
    }
    @media print {
      .sidebar, .no-print { display: none !important; }
      .main, #route-outlet { padding: 0 !important; }
      .rtm-sb-panel, .rtm-sb-tile { box-shadow: none !important; break-inside: avoid; }
      body { background: #fff !important; }
    }

    /* ===== RESOURCES + EVIDENCE (Step 10) ===== */
    .rtm-evidence-section { margin-top: var(--space-6); }
    .rtm-evidence-section h2 { font-size: var(--text-xl); }
    .rtm-ev-sub { font-size: var(--text-xs); color: var(--ink-tertiary); margin: 4px 0 var(--space-3); }
    .rtm-res-box, .rtm-ev-box {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-3);
    }
    .rtm-res-box { border-left: 3px solid var(--peach); }
    .rtm-res-item {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) 0; border-bottom: 1px solid var(--border); font-size: var(--text-sm);
    }
    .rtm-res-item:last-child { border-bottom: none; }
    .rtm-res-link { flex: 1; word-break: break-all; }
    .rtm-res-link a { color: var(--good-fg); }
    .rtm-res-label { color: var(--ink-primary); font-weight: 500; }
    .rtm-res-meta { font-size: var(--text-xs); color: var(--ink-tertiary); white-space: nowrap; }
    .rtm-ev-item {
      display: flex; gap: var(--space-3); padding: var(--space-3) 0;
      border-bottom: 1px solid var(--border); font-size: var(--text-sm);
    }
    .rtm-ev-item:last-child { border-bottom: none; }
    .rtm-ev-icon { font-size: var(--text-lg); line-height: 1.4; width: 24px; text-align: center; flex-shrink: 0; }
    .rtm-ev-body { flex: 1; min-width: 0; }
    .rtm-ev-kind { font-size: var(--text-xs); font-weight: 600; color: var(--ink-tertiary); letter-spacing: .03em; }
    .rtm-ev-text { margin: 2px 0; white-space: pre-wrap; word-break: break-word; }
    .rtm-ev-text a { color: var(--good-fg); word-break: break-all; }
    .rtm-ev-when { font-size: var(--text-xs); color: var(--ink-tertiary); white-space: nowrap; flex-shrink: 0; }

  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="false"></div>
  <div id="dialog-root"></div>
  <div id="err-banner-root"></div>

  <script type="module">
    // ==========================================================
    // RTM Hub · Single HTML
    // อ่านก่อนแก้: 00_MASTER_SPEC · 01_DATA_MODEL · 04_APP_SKELETON
    // ==========================================================

    // ===== FIREBASE =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, collectionGroup, doc, addDoc, setDoc, updateDoc, deleteDoc, getDoc, getDocs,
      onSnapshot, query, where, orderBy, limit, serverTimestamp, increment
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC1ViE5rJ0lADkU-7haInW-0lbYQr7XzmU",
      authDomain: "rtm-hub-bd668.firebaseapp.com",
      projectId: "rtm-hub-bd668",
      storageBucket: "rtm-hub-bd668.firebasestorage.app",
      messagingSenderId: "633629861435",
      appId: "1:633629861435:web:e5096aa44cbda8702a9e1e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const TENANT_ID = "rtm-tha";
    const DC_ID = "tha";

    // ===== ALLOWLIST =====
    const ALLOWLIST = new Set([
      "pojaman.j@gmail.com",
      "thapanik.p@gmail.com",
      "jamee.pt@gmail.com",
      "easywork959@gmail.com",
    ]);

    // ===== HELPERS =====
    const escape = s => String(s ?? "").replace(/[&<>"']/g,
      c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

    const html = (strings, ...values) => strings.reduce((acc, str, i) => {
      const v = values[i];
      if (v == null) return acc + str;
      if (Array.isArray(v)) return acc + str + v.join("");
      if (typeof v === "object" && "__raw" in v) return acc + str + v.__raw;
      return acc + str + escape(v);
    }, "");

    const raw = s => ({ __raw: s });

    const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

    const fmtRelTime = (ts) => {
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60) return "เมื่อกี้";
      if (diff < 3600) return `${Math.floor(diff/60)} นาทีที่แล้ว`;
      if (diff < 86400) return `${Math.floor(diff/3600)} ชม.ที่แล้ว`;
      return `${Math.floor(diff/86400)} วันที่แล้ว`;
    };

    const TH_MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    const toDate = ts => !ts ? null : (ts.toDate ? ts.toDate() : new Date(ts));
    const fmtDate = ts => { const d = toDate(ts); return d ? `${d.getDate()} ${TH_MONTHS[d.getMonth()]}` : "—"; };
    const dateInputVal = ts => { const d = toDate(ts); if (!d) return ""; const p = n => String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
    const daysUntil = ts => { const d = toDate(ts); return d == null ? null : Math.ceil((d.getTime() - Date.now()) / 86400000); };
    const daysSince = ts => { const d = toDate(ts); return d == null ? null : Math.floor((Date.now() - d.getTime()) / 86400000); };
    const DELIVERABLE_LABELS = {
      dashboard: "📊 Dashboard", powerbi: "📊 Power BI", sop: "📋 SOP",
      excel: "📈 Excel", report: "📄 Report", training: "🎓 Training",
    };
    const STALLED_DAYS = 14;

    // ISO week + week window (My Week / Check-in) — Mon..Sun, local time
    const isoWeekStr = (ref = new Date()) => {
      const d = new Date(Date.UTC(ref.getFullYear(), ref.getMonth(), ref.getDate()));
      const dayNum = (d.getUTCDay() + 6) % 7;            // Mon=0 .. Sun=6
      d.setUTCDate(d.getUTCDate() - dayNum + 3);          // nearest Thursday
      const year = d.getUTCFullYear();
      const firstThu = new Date(Date.UTC(year, 0, 4));
      const firstDayNum = (firstThu.getUTCDay() + 6) % 7;
      firstThu.setUTCDate(firstThu.getUTCDate() - firstDayNum + 3);
      const week = 1 + Math.round((d.getTime() - firstThu.getTime()) / (7 * 86400000));
      return `${year}-W${String(week).padStart(2, "0")}`;
    };
    const weekBounds = (ref = new Date()) => {
      const d = new Date(ref); const dow = (d.getDay() + 6) % 7; // Mon=0
      const mon = new Date(d); mon.setDate(d.getDate() - dow); mon.setHours(0, 0, 0, 0);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23, 59, 59, 999);
      return { mon, sun };
    };
    const weekLabel = (ref = new Date()) => {
      const { mon, sun } = weekBounds(ref);
      return `${mon.getDate()} ${TH_MONTHS[mon.getMonth()]} – ${sun.getDate()} ${TH_MONTHS[sun.getMonth()]}`;
    };
    const inThisWeek = (ts) => { const d = toDate(ts); if (!d) return false; const { mon, sun } = weekBounds(); return d >= mon && d <= sun; };

    // ===== STORE =====
    const state = {
      auth: { user: null, profile: null, ready: false, blocked: false },
      route: { path: "/ideas", params: {} },
      ideas: [], projects: [], users: [], sessions: [], activeSession: null,
      currentProject: null, myActions: [], lessons: [],
      allMilestones: [], allActions: [], myCheckin: null, allCheckins: [],
      modal: null, toasts: [],
      ideasFilter: "all",
      liveFilter: "all", liveSort: "due",
    };
    const subs = new Map();
    const store = {
      get: key => state[key],
      set(key, value) {
        state[key] = value;
        (subs.get(key) || []).forEach(fn => fn(value));
      },
      subscribe(key, fn) {
        if (!subs.has(key)) subs.set(key, new Set());
        subs.get(key).add(fn);
        return () => subs.get(key).delete(fn);
      },
    };

    // ===== STEP 11 · TOAST (แทน alert) =====
    const TOAST_MS = 4000;
    let toastSeq = 0;
    const TOAST_ICON = { success: "✅", error: "⚠️", warn: "⚠️", info: "•" };
    const toast = (msg, kind = "info", ms = TOAST_MS) => {
      const id = ++toastSeq;
      store.set("toasts", (store.get("toasts") || []).concat([{ id, msg: String(msg ?? ""), kind }]));
      if (ms > 0) setTimeout(() => dismissToast(id), ms);
      return id;
    };
    const dismissToast = (id) =>
      store.set("toasts", (store.get("toasts") || []).filter(t => t.id !== id));
    // error helper: "prefix · message"
    const toastErr = (prefix, e) =>
      toast(prefix + (e && e.message ? " · " + e.message : ""), "error", 6000);
    const toastOk = (msg) => toast(msg, "success");

    const mountToasts = () => {
      const root = document.querySelector("#toast-root");
      if (!root) return;
      const list = store.get("toasts") || [];
      root.innerHTML = html`${list.map(t => html`
        <div class="rtm-toast rtm-toast-${t.kind}" role="${t.kind === "error" ? "alert" : "status"}" data-toast="${t.id}">
          <span class="rtm-toast-icon" aria-hidden="true">${TOAST_ICON[t.kind] || "•"}</span>
          <span class="rtm-toast-msg">${t.msg}</span>
          <button class="rtm-toast-x" data-dismiss="${t.id}" aria-label="ปิดข้อความ" title="ปิด">✕</button>
        </div>`)}`;
      root.querySelectorAll("[data-dismiss]").forEach(b =>
        b.addEventListener("click", () => dismissToast(Number(b.dataset.dismiss))));
    };

    // ===== STEP 11 · CONFIRM / PROMPT DIALOG (แทน confirm/prompt · promise) =====
    const confirmModal = (opts) => new Promise((resolve) => {
      const o = typeof opts === "string" ? { title: opts } : (opts || {});
      const { title = "ยืนยัน?", body = "", okLabel = "ตกลง", cancelLabel = "ยกเลิก", danger = false } = o;
      const root = document.querySelector("#dialog-root");
      if (!root) { resolve(false); return; }
      root.innerHTML = html`
        <div class="rtm-modal-backdrop" data-dlg-cancel>
          <div class="rtm-modal rtm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="dlg-title">
            <h2 id="dlg-title">${title}</h2>
            ${body ? html`<p class="rtm-modal-hint" style="white-space:pre-line">${body}</p>` : raw("")}
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-dlg-cancel type="button">${cancelLabel}</button>
              <button class="${danger ? "btn-danger" : "btn-primary"}" data-dlg-ok type="button">${okLabel}</button>
            </div>
          </div>
        </div>`;
      const done = (val) => { root.innerHTML = ""; document.removeEventListener("keydown", onKey); resolve(val); };
      const onKey = (e) => { if (e.key === "Escape") done(false); else if (e.key === "Enter") done(true); };
      document.addEventListener("keydown", onKey);
      root.querySelector("[data-dlg-ok]").addEventListener("click", () => done(true));
      root.querySelectorAll("[data-dlg-cancel]").forEach(el =>
        el.addEventListener("click", (e) => { if (e.target === el) done(false); }));
      root.querySelector("[data-dlg-ok]").focus();
    });

    const promptModal = (opts) => new Promise((resolve) => {
      const o = typeof opts === "string" ? { title: opts } : (opts || {});
      const { title = "กรอกข้อมูล", body = "", placeholder = "", value = "",
              okLabel = "บันทึก", cancelLabel = "ยกเลิก", optional = false } = o;
      const root = document.querySelector("#dialog-root");
      if (!root) { resolve(null); return; }
      root.innerHTML = html`
        <div class="rtm-modal-backdrop" data-dlg-cancel>
          <div class="rtm-modal rtm-dialog" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
            <h2 id="dlg-title">${title}</h2>
            ${body ? html`<p class="rtm-modal-hint">${body}</p>` : raw("")}
            <input id="dlg-input" type="text" value="${value}" placeholder="${placeholder}" aria-labelledby="dlg-title">
            <div class="rtm-modal-actions">
              <button class="btn-secondary" data-dlg-cancel type="button">${cancelLabel}</button>
              <button class="btn-primary" data-dlg-ok type="button">${okLabel}</button>
            </div>
          </div>
        </div>`;
      const input = root.querySelector("#dlg-input");
      const done = (val) => { root.innerHTML = ""; document.removeEventListener("keydown", onKey); resolve(val); };
      const submit = () => { const v = input.value.trim(); done(v === "" ? (optional ? "" : null) : v); };
      const onKey = (e) => { if (e.key === "Escape") done(null); else if (e.key === "Enter") submit(); };
      document.addEventListener("keydown", onKey);
      root.querySelector("[data-dlg-ok]").addEventListener("click", submit);
      root.querySelectorAll("[data-dlg-cancel]").forEach(el =>
        el.addEventListener("click", (e) => { if (e.target === el) done(null); }));
      input.focus();
    });

    // ===== STEP 11 · ERROR BANNER (Firestore/network fail — ไม่ให้ค้างเงียบ) =====
    const fsErrors = new Set();
    const mountErrBanner = () => {
      const root = document.querySelector("#err-banner-root");
      if (!root) return;
      if (!fsErrors.size) { root.innerHTML = ""; return; }
      root.innerHTML = html`
        <div class="rtm-err-banner" role="alert">
          <span aria-hidden="true">⚠️</span>
          <span>การเชื่อมต่อขัดข้อง — ข้อมูลบางส่วนอาจไม่อัพเดต</span>
          <button type="button" data-err-reload>รีเฟรช</button>
        </div>`;
      root.querySelector("[data-err-reload]")?.addEventListener("click", () => location.reload());
    };
    // Firestore onSnapshot error handler factory
    const fsErr = (label) => (e) => {
      console.error("Firestore[" + label + "]:", e);
      fsErrors.add(label);
      mountErrBanner();
      toast("โหลด " + label + " ไม่สำเร็จ · เช็คการเชื่อมต่อ", "error", 6000);
    };

    // ===== ROUTER =====
    const routes = [];
    let currentCleanup = null;
    const route = (pattern, view) => routes.push({ pattern, view });

    const matchRoute = hash => {
      const path = hash.replace(/^#/, "") || "/ideas";
      for (const { pattern, view } of routes) {
        const parts = pattern.split("/"), got = path.split("/");
        if (parts.length !== got.length) continue;
        const params = {};
        const ok = parts.every((p, i) =>
          p.startsWith(":") ? (params[p.slice(1)] = got[i], true) : p === got[i]);
        if (ok) return { view, params, path };
      }
      return null;
    };

    const renderRoute = () => {
      if (typeof currentCleanup === "function") currentCleanup();
      const m = matchRoute(location.hash);
      store.set("route", { path: m?.path || "404", params: m?.params || {} });
      currentCleanup = m ? m.view(m.params) : renderNotFound();
    };

    const renderNotFound = () => {
      const el = document.querySelector("#route-outlet");
      if (el) el.innerHTML =
        `<div style="padding:48px;text-align:center;color:var(--ink-secondary)">404 · ไม่พบหน้านี้</div>`;
      return null;
    };

    const go = path => { location.hash = path; };

    // ===== VIEW · auth-gate =====
    const mountAuthGate = ({ blocked = false, blockedEmail = "" } = {}) => {
      document.querySelector("#app").innerHTML = html`
        <div class="auth-gate">
          <div class="auth-card">
            <h1>RTM Hub</h1>
            <p>Execution tool สำหรับทีม RTM · THA</p>
            ${raw(blocked ? `
              <div class="auth-error">
                Email <b>${escape(blockedEmail)}</b> ไม่มีสิทธิ์เข้าใช้<br />
                ติดต่อ manager
              </div>
              <div style="margin-top:24px">
                <button id="btn-signout" class="btn-secondary">ออกจากระบบ</button>
              </div>
            ` : `

    // เก็บเป็น array field บน project doc · read-modify-write (resources เล็ก · serverTimestamp() ใช้ใน array ไม่ได้ → Date.now())
    const projectResources = (p) => Array.isArray(p?.resources) ? p.resources : [];
    const addResource = async (projectId, { label, url }) => {
      const p = (store.get("projects") || []).find(x => x.id === projectId);

    const removeResource = async (projectId, idx) => {

    const updateResource = async (projectId, idx, { label, url }) => {
      const p = (store.get("projects") || []).find(x => x.id === projectId);
      const list = projectResources(p);
      const cur = list[idx];
      if (!cur) throw new Error("resource not found");
      const lb = (label != null ? label : cur.label).trim();
      if (!lb) throw new Error("label required");
      const u = (url != null ? url : (cur.url || "")).trim();

    // ===== DATA · milestones =====

      await addDoc(collection(db, "projects", projectId, "milestones"), {

    const syncMilestone = async (projectId, milestoneId) => {
      if (!milestoneId) return;
      const snap = await getDocs(collection(db, "projects", projectId, "actions"));
      const acts = [];
      snap.forEach(d => { const a = d.data(); if (a.milestone_id === milestoneId) acts.push(a); });
      const allDone = acts.length > 0 && acts.every(a => a.status === "done");
      const cur = (store.get("allMilestones") || []).find(m => m.id === milestoneId && m.project_id === projectId)?.status;
      if (allDone && cur !== "done") {
        await updateDoc(doc(db, "projects", projectId, "milestones", milestoneId), { status: "done", closed_at: serverTimestamp() });

    // sync lesson doc ให้ตรง: มี→อัพเดต · เพิ่มใหม่→เขียน · ลบข้อความ→ลบ doc (คง closed_at เดิมของ lesson ไว้ ไม่เด้งขึ้นบน list)
    const syncLessonOnEdit = async (project, lessonText, lessonTags) => {
      const existing = (store.get("lessons") || []).filter(l => l.project_id === project.id);

    const updateClosedReport = async (project, patch) => {

    // Step 8: read-side. writeLesson() (Step 5) already writes lessons/ on close.
    const subscribeLessons = () => {
      const q = query(collection(db, "lessons"), orderBy("closed_at", "desc"));
      return onSnapshot(q, snap => {
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));

    // haystack for a lesson = title + text + tags (lowercased)
    const lessonText = (l) => [l.project_title, l.lesson_text, ...(l.tags || [])].join(" ").toLowerCase();

    // Lessons view search: substring of the whole query + optional tag chip
    const searchLessons = (queryStr, tag) => {
      const q = String(queryStr || "").trim().toLowerCase();
      return (store.get("lessons") || []).filter(l => {
        if (tag && !(l.tags || []).includes(tag)) return false;
        if (!q) return true;
        return lessonText(l).includes(q);
      });
    };

    // Auto-surface: tokenize the typed idea, match if ANY token (≥3 chars) hits a lesson
    const LESSON_TOKEN_MIN = 3;
    const matchLessons = (phrase) => {
      const toks = String(phrase || "").toLowerCase().split(/[\s,./|·]+/).filter(t => t.length >= LESSON_TOKEN_MIN);
      if (!toks.length) return [];
      return (store.get("lessons") || []).filter(l => {
        const t = lessonText(l);
        return toks.some(tok => t.includes(tok));
      });

    const projectById = (id) => (store.get("projects") || []).find(p => p.id === id) || null;
    const allLessonTags = () => {
      const set = new Set();

      return [...set].sort();

    // ===== DERIVED · project summary =====
    const milestoneDisplayStatus = (acts) => {
      if (acts.length === 0) return "empty";
      const done = acts.filter(a => a.status === "done").length;
      if (done === acts.length) return "done";
      if (acts.some(a => a.status === "doing" || a.status === "done")) return "progress";
      return "todo";
    };
    const MILESTONE_ICON = { done: "✅", progress: "🟡", todo: "⬜", empty: "⬜", blocker: "🚩" };

    const isStalled = (a) => a.status === "doing" && (daysSince(a.status_changed_at) || 0) > STALLED_DAYS;

    const projectSummary = (projectId) => {
      const acts = actionsOf(projectId);
      const mils = milestonesOf(projectId);
      const total = acts.length;
      const done = acts.filter(a => a.status === "done").length;
      const hasBlocker = acts.some(a => a.blocker_flag);
      const stalled = acts.some(isStalled);
      const stalledDays = Math.max(0, ...acts.filter(isStalled).map(a => daysSince(a.status_changed_at) || 0));
      const nextAction = acts
        .filter(a => a.status !== "done")
        .sort((a, b) => (toDate(a.due_date)?.getTime() ?? Infinity) - (toDate(b.due_date)?.getTime() ?? Infinity))[0] || null;
      return { acts, mils, total, done, hasBlocker, stalled, stalledDays, nextAction };
    };

    // ===== DERIVED · evidence trail (Step 10 · North Star §3) =====
    // รวมหลักฐานที่มีอยู่แล้วมากองที่เดียว — derived · ไม่แก้ schema
    //   check-in artifact (project_ids มี pid) + action output_text + close result_text
    // เรียงใหม่สุดก่อน (ล่าสุด = relevant สุด · ตรง convention app)
    const projectEvidence = (pid) => {
      const items = [];
      (store.get("allCheckins") || []).forEach(c => {
        const val = ((c.artifact && c.artifact.value) || "").trim();
        if (val && (c.project_ids || []).includes(pid)) {
          items.push({ kind: "checkin", by: c.uid, at: c.submitted_at, text: val, artifactType: c.artifact.type, week: c.week_of });
        }
      });
      actionsOf(pid).forEach(a => {
        const out = (a.output_text || "").trim();
        if (out) items.push({ kind: "action", by: a.owner_uid, at: a.done_at || a.status_changed_at || a.created_at, text: out, title: a.title });
      });
      const p = (store.get("projects") || []).find(x => x.id === pid);
      if (p && p.status === "closed" && (p.result_text || "").trim()) {
        items.push({ kind: "result", by: p.impact_verified_by_uid || null, at: p.closed_at, text: p.result_text.trim() });
      }
      return items.sort((a, b) => (toDate(b.at)?.getTime() ?? 0) - (toDate(a.at)?.getTime() ?? 0));
    };

    // ===== DERIVED · verdict (North Star teeth — Step 9) =====
    // Go/No-Go stamp. Derived only — ไม่แก้ schema. เทียบ actual vs projected.
    //   win     = actual ≥ projected (ถึง/เกินเป้า)
    //   partial = มีผลจริง (>0) แต่ต่ำเป้า · หรือไม่มีเป้าให้เทียบ · หรือหน่วยคนละอย่าง (เทียบ win ไม่ได้)
    //   miss    = ไม่มีผล (≤0) · ปิดแบบไม่มี actual · หรือ killed
    //   none    = ยังไม่ปิด (active) → ไม่มี verdict
    const VERDICT_META = {
      win:     { code: "win",     label: "Win",     icon: "🟢", cls: "rtm-vd-win" },
      partial: { code: "partial", label: "Partial", icon: "🟡", cls: "rtm-vd-partial" },
      miss:    { code: "miss",    label: "Miss",    icon: "🔴", cls: "rtm-vd-miss" },
      none:    { code: "none",    label: "—",       icon: "",   cls: "rtm-vd-none" },
    };
    const computeVerdict = (p) => {
      if (!p) return { ...VERDICT_META.none, reason: "no project" };
      if (p.status === "killed") return { ...VERDICT_META.miss, reason: "killed" };
      if (p.status !== "closed")  return { ...VERDICT_META.none, reason: "ยังไม่ปิด" };
      const actual = p.impact_actual_value;
      const proj   = p.impact_projected_value;
      if (actual == null)          return { ...VERDICT_META.miss, reason: "ปิดแบบไม่มี actual" };
      if (actual <= 0)             return { ...VERDICT_META.miss, reason: "ผลจริง ≤ 0" };
      if (proj == null)            return { ...VERDICT_META.partial, reason: "ไม่มีเป้าให้เทียบ" };
      // หน่วยคนละอย่าง = เทียบเชิงเลขไม่ได้ → ไม่ประทับ win
      const aUnit = (p.impact_actual_unit || "").trim();
      const pUnit = (p.impact_projected_unit || "").trim();
      if (aUnit && pUnit && aUnit !== pUnit) return { ...VERDICT_META.partial, reason: "หน่วยต่างกัน · เทียบ win ไม่ได้" };
      const ratio = proj !== 0 ? actual / proj : (actual > 0 ? Infinity : 0);
      if (actual >= proj) return { ...VERDICT_META.win,     reason: "actual ≥ projected", ratio };
      return                      { ...VERDICT_META.partial, reason: "actual < projected", ratio };
    };
    // badge HTML · size: "sm" (pill เล็ก) | "lg" (พร้อม reason)
    const verdictBadge = (p, size = "sm") => {
      const v = computeVerdict(p);
      if (v.code === "none") return "";
      const r = (size === "lg" && v.reason) ? ` <span class="rtm-vd-reason">· ${escape(v.reason)}</span>` : "";
      return `<span class="rtm-verdict ${v.cls}" title="${escape(v.reason || v.label)}">${v.icon} ${escape(v.label)}${r}</span>`;
    };

    // ===== VIEW · ideas =====
    const viewIdeas = () => {
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <h1>💡 Idea Wall</h1>
        <div id="session-bar-wrap"></div>
        <div class="rtm-quick-add">
          <input id="idea-input" placeholder="พิมพ์ไอเดีย... กด Enter เพื่อโยน" autocomplete="off" maxlength="200" />
        </div>
        <div id="auto-surface" aria-live="polite"></div>
        <div class="rtm-filter-row" id="filter-row"></div>
        <div id="ideas-list"></div>
      `;

      const input = document.querySelector("#idea-input");
      const surfaceEl = document.querySelector("#auto-surface");
      input.focus();
      input.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter") return;
        const val = input.value.trim();
        if (!val) return;
        input.value = "";
        if (surfaceEl) surfaceEl.innerHTML = "";
        input.disabled = true;
        try { await createIdea(val); }
        catch (err) {
          console.error(err);
          toastErr("โยนไอเดียไม่สำเร็จ", err);
          input.value = val;
        }
        input.disabled = false;
        input.focus();
      });

      // Auto-surface (North Star §10): typing an idea surfaces related old lessons.
      // Non-blocking · debounced · dismissible. Kill Test: >3 no-click = noise.
      const runSurface = debounce((val) => {
        if (!surfaceEl) return;
        const matches = matchLessons(val);
        if (!matches.length) { surfaceEl.innerHTML = ""; return; }
        surfaceEl.innerHTML = html`
          <div class="rtm-surface">
            <span class="rtm-surface-txt">📚 เคยทำคล้ายกัน <b>${String(matches.length)}</b> ครั้ง — เช็คก่อนเริ่ม</span>
            <a class="rtm-surface-link" href="#/lessons">ดู →</a>
            <button class="rtm-surface-x" title="ปิด" aria-label="ปิด">✕</button>
          </div>
        `;
        surfaceEl.querySelector(".rtm-surface-x")?.addEventListener("click", () => { surfaceEl.innerHTML = ""; });
      }, 500);
      input.addEventListener("input", () => runSurface(input.value));

      const renderAll = () => {
        renderSessionBar();
        renderFilterRow();
        renderIdeasList();
      };
      renderAll();

      const unsubs = [
        store.subscribe("ideas", renderAll),
        store.subscribe("activeSession", renderAll),
        store.subscribe("users", renderAll),
        store.subscribe("ideasFilter", renderAll),
      ];
      return () => unsubs.forEach(u => u());
    };

    const renderSessionBar = () => {
      const el = document.querySelector("#session-bar-wrap");
      if (!el) return;
      const active = store.get("activeSession");
      el.innerHTML = active ? html`
        <div class="rtm-session-bar rtm-session-active">
          <span class="rtm-session-dot"></span>
          <span>Session: <b>${active.name}</b></span>
          <span class="rtm-session-count">${active.idea_count || 0} ideas</span>
          <button class="rtm-btn-inline" id="btn-end-session">🏁 End Session</button>
        </div>
      ` : html`
        <div class="rtm-session-bar rtm-session-idle">
          <span>ไม่มี session ที่กำลังทำอยู่</span>
          <span style="margin-left:auto"></span>
          <button class="rtm-btn-inline" id="btn-start-session">▶ เริ่ม Session</button>
        </div>
      `;
      document.querySelector("#btn-start-session")?.addEventListener("click",
        () => store.set("modal", { name: "session-start" }));
      document.querySelector("#btn-end-session")?.addEventListener("click",
        () => store.set("modal", { name: "session-end" }));
    };

    // Idea Wall shows ONLY status=new ideas (untriaged)
    // Triaged ideas move to Decide view
    const getNewIdeas = () => (store.get("ideas") || []).filter(i => i.status === "new");

    const renderFilterRow = () => {
      const el = document.querySelector("#filter-row");
      if (!el) return;
      const filter = store.get("ideasFilter") || "all";
      const uid = store.get("auth").user?.uid;
      const all = getNewIdeas();
      const mineCount = all.filter(i => i.created_by === uid).length;
      el.innerHTML = html`
        <button class="rtm-pill ${filter === 'all' ? 'active' : ''}" data-filter="all">ทั้งหมด · ${all.length}</button>
        <button class="rtm-pill ${filter === 'mine' ? 'active' : ''}" data-filter="mine">ของฉัน · ${mineCount}</button>
        <a href="#/decide" class="rtm-pill" style="margin-left:auto;background:var(--sage-soft);color:var(--good-fg);border-color:var(--sage)">🎯 ไป Decide →</a>
      `;
      el.querySelectorAll("[data-filter]").forEach(b => {
        b.addEventListener("click", () => store.set("ideasFilter", b.dataset.filter));
      });
    };

    const renderIdeasList = () => {
      const el = document.querySelector("#ideas-list");
      if (!el) return;
      const filter = store.get("ideasFilter") || "all";
      const uid = store.get("auth").user?.uid;
      const all = getNewIdeas();
      const ideas = filter === "mine" ? all.filter(i => i.created_by === uid) : all;
      if (ideas.length === 0) {
        el.innerHTML = html`<div class="rtm-empty">${filter === "mine" ? "คุณไม่มีไอเดียที่รอ triage" : "ยังไม่มีไอเดีย — พิมพ์บรรทัดแรกด้านบน"}</div>`;
        return;
      }
      el.innerHTML = html`<div class="rtm-idea-grid">${ideas.map(renderIdeaCard)}</div>`;
      wireIdeaCardEvents();
    };

    const renderIdeaCard = (idea) => {
      const user = userByUid(idea.created_by);
      const color = user?.color || "#4A4741";
      const short = user?.short_code || "?";
      return html`
        <div class="rtm-idea-card" data-idea-id="${idea.id}" style="border-left-color:${escape(color)}">
          <div class="rtm-idea-header">
            <div class="rtm-avatar-sm" style="background:${escape(color)}">${escape(short)}</div>
            ${idea.session_tag ? raw(`<span class="rtm-session-tag">🏷 ${escape(idea.session_tag)}</span>`) : ""}
            <div class="rtm-idea-actions">
              <button class="rtm-icon-btn" data-action="tag" title="Assign session">🏷</button>
              <button class="rtm-icon-btn" data-action="edit" title="แก้ไข">✏️</button>
              <button class="rtm-icon-btn" data-action="delete" title="ลบ">🗑</button>
            </div>
          </div>
          <div class="rtm-idea-title" data-title>${idea.title}</div>
          <div class="rtm-idea-time">${fmtRelTime(idea.created_at)}</div>
        </div>
      `;
    };

    // ===== INTERACTIONS · idea card =====
    const wireIdeaCardEvents = () => {
      document.querySelectorAll(".rtm-idea-card").forEach(card => {
        const id = card.dataset.ideaId;
        card.querySelector('[data-action="tag"]')?.addEventListener("click", (e) => {
          e.stopPropagation();
          store.set("modal", { name: "session-picker", ideaId: id });
        });
        card.querySelector('[data-action="edit"]')?.addEventListener("click", (e) => {
          e.stopPropagation();
          startInlineEdit(card, id);
        });
        card.querySelector('[data-action="delete"]')?.addEventListener("click", async (e) => {
          e.stopPropagation();
          const title = card.querySelector("[data-title]")?.textContent || "";
          if (!await confirmModal({ title: `ลบไอเดีย "${title}" ?`, okLabel: "ลบ", danger: true })) return;
          try { await deleteIdea(id); toastOk("ลบไอเดียแล้ว"); }
          catch (err) { toastErr("ลบไม่สำเร็จ", err); }
        });
      });
    };

    const startInlineEdit = (card, id) => {
      const titleEl = card.querySelector("[data-title]");
      const current = titleEl.textContent;
      const input = document.createElement("input");
      input.type = "text";
      input.value = current;
      input.className = "rtm-inline-edit";
      input.maxLength = 200;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      const commit = async () => {
        const val = input.value.trim();
        if (!val || val === current) { input.replaceWith(titleEl); return; }
        try { await updateIdeaTitle(id, val); }
        catch (err) { toastErr("แก้ไขไม่สำเร็จ", err); input.replaceWith(titleEl); }
      };
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(); }
        if (e.key === "Escape") { input.replaceWith(titleEl); }
      });
      input.addEventListener("blur", commit);
    };

    // ===== VIEW · decide =====
    const viewDecide = () => {
      const outlet = document.querySelector("#route-outlet");
      outlet.innerHTML = html`
        <h1>🎯 Decision Board</h1>
        <p style="color:var(--ink-secondary);margin-top:8px">ประเมิน impact/effort · ตัดสิน Do Now / Park / Kill</p>
        <div id="decide-content" style="margin-top:24px"></div>
      `;

      const renderAll = () => renderDecideContent();
      renderAll();

      const unsubs = [
        store.subscribe("ideas", renderAll),
        store.subscribe("users", renderAll),
      ];
